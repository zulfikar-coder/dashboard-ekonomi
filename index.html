<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 DASHBOARD EKONOMI KOTA PALU</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <style>
        :root {
            --orange: #FF8C00; --orange-dark: #cc7000;
            --green: #27ae60; --blue: #3498db;
            --bg: #fffcf5; --text: #2c3e50; --card-bg: #ffffff;
            --border: #e0e0e0; --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .dark {
            --bg: #0f0f12; --text: #f1f1f1; --card-bg: #1e1e25;
            --border: #333340;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            padding: 16px; transition: all 0.3s ease;
        }
        .header {
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            color: white; padding: 24px; border-radius: 16px;
            margin-bottom: 20px; box-shadow: var(--shadow);
        }
        .header h1 { font-size: clamp(1.3rem, 4vw, 1.8rem); margin-bottom: 12px; }
        .status {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 16px; background: rgba(255,255,255,0.25);
            border-radius: 20px; font-size: 0.9rem;
        }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #ffd700; animation: pulse 1.5s infinite;
        }
        .status-dot.success { background: #2ecc71; animation: none; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        
        .controls {
            background: var(--card-bg); padding: 20px; border-radius: 16px;
            margin-bottom: 20px; box-shadow: var(--shadow);
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; align-items: end;
        }
        .control-group label {
            font-weight: 600; font-size: 0.85rem; color: var(--orange);
            text-transform: uppercase; display: block; margin-bottom: 6px;
        }
        select {
            width: 100%; padding: 12px; border-radius: 10px;
            border: 2px solid var(--border); background: var(--bg);
            color: var(--text); font-size: 0.95rem; cursor: pointer;
        }
        select:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button {
            padding: 12px 20px; border-radius: 10px; border: none;
            font-weight: 600; cursor: pointer; color: white;
            transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-png { background: var(--green); }
        .btn-pdf { background: var(--blue); }
        .btn-dark { background: #555; }
        
        .card {
            background: var(--card-bg); padding: 24px; border-radius: 16px;
            box-shadow: var(--shadow); max-width: 1200px; margin: 0 auto;
            border-top: 4px solid var(--orange);
        }
        .card h3 { margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
        .chart-container { 
            position: relative; height: clamp(350px, 50vh, 500px); 
            background: var(--bg); border-radius: 12px; padding: 16px;
        }
        .loading {
            text-align: center; padding: 60px 20px; color: var(--orange);
        }
        @media (max-width: 768px) {
            .controls { grid-template-columns: 1fr; }
            .btn-group { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📊 DASHBOARD STATISTIK EKONOMI KOTA PALU</h1>
    <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Memuat data...</span>
    </div>
</div>

<div class="controls">
    <div class="control-group">
        <label>📈 Jenis Grafik</label>
        <select id="menuGrafik" onchange="handleFilterChange()" disabled>
            <option value="">Memuat...</option>
        </select>
    </div>
    <div class="control-group">
        <label>📅 Periode</label>
        <select id="filterTahun" onchange="updateChart()" disabled>
            <option value="">Memuat...</option>
        </select>
    </div>
    <div class="btn-group">
        <button class="btn-png" onclick="downloadChart('png')" id="btnPng" disabled>📥 PNG</button>
        <button class="btn-pdf" onclick="downloadChart('pdf')" id="btnPdf" disabled>📄 PDF</button>
        <button class="btn-dark" onclick="toggleDarkMode()">🌙 Gelap</button>
    </div>
</div>

<div class="card">
    <h3 id="judulGrafik">Visualisasi Data Ekonomi</h3>
    <div class="chart-container">
        <div class="loading" id="loadingText">⏳ Memuat data...</div>
        <canvas id="mainChart" style="display:none"></canvas>
    </div>
</div>

<script>
// ===== KONFIGURASI =====
const CONFIG = {
    USE_MOCK_DATA: true  // Pakai data mock dulu
};

// ===== STATE - DIPERBAIKI SYNTAX ====
const state = {
    chart: null,
    data: { 
        laju: {}, 
        adhb: {}, 
        adhk: {}, 
        distribusi: {} 
    },
    years: [],
    isLoaded: false
};

// ===== GENERATE MOCK DATA =====
function generateMockData() {
    state.years = ['2019', '2020', '2021', '2022', '2023', '2024', '2025', '2026'];
    
    state.years.forEach((year, index) => {
        state.data.laju[year] = 4.5 + Math.sin(index) * 2 + (Math.random() - 0.5) * 1.5;
        state.data.adhb[year] = 12000 + index * 1800 + Math.random() * 1000;
        state.data.adhk[year] = 9000 + index * 1200 + Math.random() * 800;
    });
    
    state.data.distribusi = {
        'Pertanian': 11.9,
        'Industri': 11.3,
        'Konstruksi': 18.8,
        'Perdagangan': 25.5,
        'Jasa': 32.5
    };
}

// ===== FORMAT UTILITIES =====
const fmt = {
    id: function(n, d) {
        if (d === undefined) d = 1;
        if (n === null || n === undefined || isNaN(n)) return '-';
        return new Intl.NumberFormat('id-ID', {
            minimumFractionDigits: d,
            maximumFractionDigits: d
        }).format(n);
    },
    pct: function(n) {
        return fmt.id(n, 2) + '%';
    },
    rp: function(n) {
        if (n === null || n === undefined) return '-';
        return n >= 1000 ? 'Rp ' + fmt.id(n / 1000, 1) + ' T' : 'Rp ' + fmt.id(n, 1) + ' M';
    }
};

// ===== POPULATE FILTERS =====
function populateFilters() {
    var menu = document.getElementById('menuGrafik');
    var filter = document.getElementById('filterTahun');
    
    // Populate menu grafik
    menu.innerHTML = 
        '<option value="laju">📈 Laju Pertumbuhan (%)</option>' +
        '<option value="nilai">📊 PDRB ADHB & ADHK</option>' +
        '<option value="distribusi">🥧 Distribusi Sektor</option>';
    
    // Populate tahun
    filter.innerHTML = '';
    
    if (menu.value === 'distribusi') {
        // Pie chart: pilih 1 tahun
        for (var i = state.years.length - 1; i >= 0; i--) {
            var opt = document.createElement('option');
            opt.value = state.years[i];
            opt.textContent = 'Tahun ' + state.years[i];
            filter.add(opt);
        }
    } else {
        // Line/Bar: pilih range
        var lastYear = state.years[state.years.length - 1];
        var firstYear = state.years[0];
        var ranges = [
            { t: '5 Tahun Terakhir', v: '2021-' + lastYear },
            { t: '2016-2020', v: '2016-2020' },
            { t: 'Full Period', v: firstYear + '-' + lastYear }
        ];
        
        for (var j = 0; j < ranges.length; j++) {
            var opt2 = document.createElement('option');
            opt2.value = ranges[j].v;
            opt2.textContent = ranges[j].t;
            filter.add(opt2);
        }
    }
    
    if (filter.options.length > 0) {
        filter.value = filter.options[0].value;
    }
}

// ===== HANDLE FILTER CHANGE =====
function handleFilterChange() {
    populateFilters();
    updateChart();
}

// ===== GET YEARS IN RANGE =====
function getYearsInRange(range) {
    if (range.indexOf('-') !== -1) {
        var parts = range.split('-');
        var start = parseInt(parts[0]);
        var end = parseInt(parts[1]);
        var years = [];
        for (var y = start; y <= end; y++) {
            years.push(String(y));
        }
        return years;
    }
    return [range];
}

// ===== UPDATE CHART =====
function updateChart() {
    if (!state.isLoaded) return;
    
    var ctx = document.getElementById('mainChart').getContext('2d');
    var menu = document.getElementById('menuGrafik').value;
    var range = document.getElementById('filterTahun').value;
    var labels = getYearsInRange(range);
    
    if (state.chart) {
        state.chart.destroy();
    }
    
    var isDark = document.body.classList.contains('dark');
    var textColor = isDark ? '#eee' : '#333';
    var gridColor = isDark ? '#444' : '#ddd';
    
    var commonOpts = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { 
                labels: { color: textColor, padding: 12 } 
            },
            tooltip: {
                backgroundColor: 'rgba(30,30,40,0.95)',
                titleColor: '#fff',
                bodyColor: '#eee',
                callbacks: {
                    label: function(ctx) {
                        var v = ctx.parsed.y !== undefined ? ctx.parsed.y : ctx.parsed;
                        if (menu === 'laju') return ' ' + fmt.pct(v);
                        if (menu === 'nilai') return ' ' + fmt.rp(v);
                        if (menu === 'distribusi') return ' ' + fmt.pct(v);
                        return ' ' + fmt.id(v);
                    }
                }
            },
            datalabels: {
                anchor: 'end',
                align: 'top',
                formatter: function(v) {
                    if (!v && v !== 0) return '';
                    if (menu === 'laju') return fmt.pct(v);
                    if (menu === 'nilai') return v >= 1000 ? (v / 1000).toFixed(1) + 'T' : v.toFixed(0);
                    if (menu === 'distribusi') return v.toFixed(1) + '%';
                    return fmt.id(v);
                },
                font: { weight: 'bold', size: 9 },
                color: textColor,
                backgroundColor: 'rgba(255,255,255,0.9)',
                borderRadius: 4,
                padding: 4
            }
        },
        scales: menu !== 'distribusi' ? {
            y: { 
                beginAtZero: true, 
                grid: { color: gridColor }, 
                ticks: { color: textColor } 
            },
            x: { 
                grid: { display: false }, 
                ticks: { color: textColor } 
            }
        } : {}
    };
    
    var config;
    
    if (menu === 'nilai') {
        var adhbData = [];
        var adhkData = [];
        for (var i = 0; i < labels.length; i++) {
            adhbData.push(state.data.adhb[labels[i]] || 0);
            adhkData.push(state.data.adhk[labels[i]] || 0);
        }
        
        config = {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'ADHB',
                        data: adhbData,
                        backgroundColor: 'rgba(255,140,0,0.85)',
                        borderColor: '#FF8C00',
                        borderWidth: 2,
                        borderRadius: 4
                    },
                    {
                        label: 'ADHK',
                        data: adhkData,
                        backgroundColor: 'rgba(39,174,96,0.85)',
                        borderColor: '#27ae60',
                        borderWidth: 2,
                        borderRadius: 4
                    }
                ]
            },
            options: commonOpts
        };
    } else if (menu === 'laju') {
        var lajuData = [];
        for (var j = 0; j < labels.length; j++) {
            lajuData.push(state.data.laju[labels[j]] || 0);
        }
        
        config = {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Laju Pertumbuhan (%)',
                    data: lajuData,
                    borderColor: '#27ae60',
                    backgroundColor: 'rgba(39,174,96,0.15)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 5,
                    pointBackgroundColor: '#27ae60'
                }]
            },
            options: commonOpts
        };
    } else {
        var distLabels = Object.keys(state.data.distribusi);
        var distValues = Object.values(state.data.distribusi);
        
        config = {
            type: 'doughnut',
            data: {
                labels: distLabels,
                datasets: [{
                    data: distValues,
                    backgroundColor: ['#FF8C00', '#27ae60', '#3498db', '#f1c40f', '#9b59b6'],
                    borderColor: isDark ? '#1e1e25' : '#fff',
                    borderWidth: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { 
                        labels: { color: textColor, padding: 12 } 
                    },
                    tooltip: {
                        backgroundColor: 'rgba(30,30,40,0.95)',
                        titleColor: '#fff',
                        bodyColor: '#eee',
                        callbacks: {
                            label: function(ctx) {
                                return ' ' + fmt.pct(ctx.parsed);
                            }
                        }
                    },
                    datalabels: {
                        anchor: 'center',
                        align: 'center',
                        formatter: function(v) {
                            return v.toFixed(1) + '%';
                        },
                        font: { weight: 'bold', size: 10 },
                        color: '#fff'
                    }
                },
                cutout: '55%'
            }
        };
    }
    
    Chart.register(ChartDataLabels);
    state.chart = new Chart(ctx, config);
    
    var menuText = document.getElementById('menuGrafik').options[document.getElementById('menuGrafik').selectedIndex].text;
    document.getElementById('judulGrafik').textContent = menuText.split('(')[0].trim() + ' • ' + range;
}

// ===== DOWNLOAD CHART =====
function downloadChart(format) {
    var canvas = document.getElementById('mainChart');
    try {
        if (format === 'png') {
            var link = document.createElement('a');
            link.download = 'Ekonomi-Palu-' + new Date().toISOString().slice(0, 10) + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        } else {
            window.print();
        }
    } catch (e) {
        alert('Gagal export: ' + e.message);
    }
}

// ===== TOGGLE DARK MODE =====
function toggleDarkMode() {
    document.body.classList.toggle('dark');
    if (state.chart) {
        updateChart();
    }
}

// ===== INITIALIZATION =====
window.addEventListener('DOMContentLoaded', function() {
    console.log('🚀 Dashboard initialized');
    
    // Generate mock data
    generateMockData();
    console.log('✅ Mock data generated:', state.years);
    
    // Update UI
    document.getElementById('loadingText').style.display = 'none';
    document.getElementById('mainChart').style.display = 'block';
    
    // Enable controls
    document.getElementById('menuGrafik').disabled = false;
    document.getElementById('filterTahun').disabled = false;
    document.getElementById('btnPng').disabled = false;
    document.getElementById('btnPdf').disabled = false;
    
    // Populate and render
    populateFilters();
    updateChart();
    state.isLoaded = true;
    
    // Update status
    document.getElementById('statusDot').className = 'status-dot success';
    document.getElementById('statusText').textContent = '✅ Data aktif • ' + state.years.length + ' tahun';
});
</script>
</body>
</html>
