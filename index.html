<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD STATISTIK EKONOMI - ZULFIKAR</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root { --orange: #FF8C00; --green: #27ae60; --bg: #fffcf5; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        /* Header dengan 3 Kolom untuk Logo */
        .header { 
            background: var(--orange); 
            color: white;
            padding: 15px 30px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            margin-bottom: 20px; 
        }

        .header h1 { 
            text-transform: uppercase; 
            font-size: 1.5rem; 
            margin: 0; 
            text-align: center; 
            flex-grow: 1; 
            letter-spacing: 1px;
        }

        .logo { 
            height: 70px; /* Ukuran tinggi logo */
            width: auto; 
            background: white;
            padding: 5px;
            border-radius: 8px;
        }

        .controls { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid var(--green); box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; gap: 20px; flex-wrap: wrap; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid var(--orange); max-width: 900px; margin: 0 auto; }
        .chart-container { position: relative; margin: auto; height: 420px; width: 100%; }
        
        h3 { text-transform: uppercase; color: #333; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; text-align: center; font-size: 1.1rem; }
        label { text-transform: uppercase; font-weight: bold; font-size: 0.8rem; color: var(--green); display: block; margin-bottom: 5px; }
        select { padding: 10px; border-radius: 6px; border: 1px solid var(--orange); font-weight: bold; min-width: 200px; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/28/Lambang_Badan_Pusat_Statistik_%28BPS%29_Indonesia.svg" alt="Logo BPS" class="logo">
    
    <h1>DASHBOARD STATISTIK EKONOMI</h1>
    
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Coat_of_arms_of_Central_Sulawesi.svg" alt="Logo Sulawesi Tengah" class="logo">
</div>

<div class="controls">
    <div>
        <label>PILIH JENIS GRAFIK:</label>
        <select id="menuGrafik" onchange="sesuaikanFilter()">
            <option value="laju">LAJU PERTUMBUHAN EKONOMI (GARIS)</option>
            <option value="nilai">NILAI ADHB & ADHK (BATANG)</option>
            <option value="distribusi">DISTRIBUSI ADHB (PIE)</option>
            <option value="sumber">SUMBER PERTUMBUHAN (BATANG)</option>
        </select>
    </div>
    <div>
        <label id="labelFilter">PILIH PERIODE:</label>
        <select id="filterTahun" onchange="updateChart()"></select>
    </div>
</div>

<div class="card">
    <h3 id="judulGrafik">VISUALISASI DATA</h3>
    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    const ctx = document.getElementById('mainChart').getContext('2d');
    let currentChart;
    const tahunLengkap = Array.from({length: 16}, (_, i) => (2011 + i).toString());
    
    function sesuaikanFilter() {
        const menu = document.getElementById('menuGrafik').value;
        const filter = document.getElementById('filterTahun');
        filter.innerHTML = ""; 

        if (menu === 'laju' || menu === 'nilai') {
            const opsi = [
                {text: "2021 - 2026", val: "2021-2026"},
                {text: "2016 - 2020", val: "2016-2020"},
                {text: "2011 - 2015", val: "2011-2015"}
            ];
            opsi.forEach(o => {
                let el = document.createElement("option");
                el.text = o.text; el.value = o.val; filter.add(el);
            });
        } else {
            [...tahunLengkap].reverse().forEach(t => {
                let el = document.createElement("option");
                el.text = t; el.value = t; filter.add(el);
            });
        }
        updateChart();
    }

    function updateChart() {
        const menu = document.getElementById('menuGrafik').value;
        const periode = document.getElementById('filterTahun').value;
        if (currentChart) currentChart.destroy();

        let config = {
            plugins: [ChartDataLabels],
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    datalabels: {
                        anchor: 'end', align: 'top',
                        formatter: (val) => val + (menu === 'laju' || menu === 'distribusi' ? '%' : ''),
                        font: { weight: 'bold', size: 12 }
                    },
                    legend: { position: 'bottom' }
                }
            }
        };

        // ... (Logika data tetap sama seperti sebelumnya) ...
        if (menu === 'laju') {
            const labels = periode === "2021-2026" ? ['2021','2022','2023','2024','2025','2026'] : 
                           periode === "2016-2020" ? ['2016','2017','2018','2019','2020'] : ['2011','2012','2013','2014','2015'];
            config.type = 'line';
            config.data = {
                labels: labels,
                datasets: [{
                    label: 'LAJU PERTUMBUHAN (%)',
                    data: labels.map(() => (Math.random() * 3 + 2).toFixed(1)),
                    borderColor: '#27ae60', backgroundColor: 'rgba(39, 174, 96, 0.1)',
                    fill: true, tension: 0.3, pointRadius: 6
                }]
            };
        } 
        else if (menu === 'nilai') {
            const labels = periode === "2021-2026" ? ['2021','2022','2023','2024','2025','2026'] : 
                           periode === "2016-2020" ? ['2016','2017','2018','2019','2020'] : ['2011','2012','2013','2014','2015'];
            config.type = 'bar';
            config.data = {
                labels: labels,
                datasets: [
                    { label: 'ADHB', data: labels.map(() => Math.floor(Math.random() * 500 + 1500)), backgroundColor: '#FF8C00' },
                    { label: 'ADHK', data: labels.map(() => Math.floor(Math.random() * 500 + 1000)), backgroundColor: '#27ae60' }
                ]
            };
        }
        else if (menu === 'distribusi') {
            config.type = 'pie';
            config.data = {
                labels: ['PERTANIAN', 'INDUSTRI', 'JASA', 'LAINNYA'],
                datasets: [{ data: [25, 30, 20, 25], backgroundColor: ['#FF8C00', '#27ae60', '#F39C12', '#2ECC71'] }]
            };
            config.options.plugins.datalabels.anchor = 'center';
            config.options.plugins.datalabels.align = 'center';
            config.options.plugins.datalabels.color = '#fff';
        }
        else if (menu === 'sumber') {
            config.type = 'bar';
            config.data = {
                labels: ['KONSUMSI', 'INVESTASI', 'EKSPOR', 'PEMERINTAH'],
                datasets: [{ label: 'KONTRIBUSI (POIN)', data: [2.5, 1.8, 1.2, 0.7], backgroundColor: '#FF8C00' }]
            };
        }

        currentChart = new Chart(ctx, config);
        document.getElementById('judulGrafik').innerText = document.getElementById('menuGrafik').options[document.getElementById('menuGrafik').selectedIndex].text + " (" + periode + ")";
    }

    sesuaikanFilter();
</script>

</body>
</html>
