<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD STATISTIK EKONOMI KOTA PALU</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <style>
        :root {
            --orange: #FF8C00;
            --orange-dark: #e67e00;
            --green: #27ae60;
            --bg: #f8fafc;
            --text: #0f172a;
            --surface: #ffffff;
            --border: #e2e8f0;
            --radius: 16px;
        }
        
        .dark {
            --bg: #0f172a;
            --text: #f1f5f9;
            --surface: #1e293b;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text); 
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header { 
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            color: white; 
            padding: 30px; 
            border-radius: var(--radius);
            margin-bottom: 24px;
        }

        .header h1 { 
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0;
        }

        .controls { 
            background: var(--surface); 
            padding: 24px; 
            border-radius: var(--radius);
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex; 
            gap: 20px; 
            flex-wrap: wrap; 
        }

        .control-group { 
            flex: 1;
            min-width: 200px;
        }

        label { 
            display: block;
            font-weight: 700; 
            font-size: 0.75rem; 
            color: var(--orange);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        select { 
            width: 100%;
            padding: 12px 16px; 
            border-radius: 8px; 
            border: 2px solid var(--border); 
            font-weight: 600; 
            background: var(--surface); 
            color: var(--text);
            font-size: 0.9rem;
        }

        select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f1f5f9;
        }

        .btn-group { 
            display: flex; 
            gap: 12px; 
            margin-left: auto;
        }

        button { 
            padding: 12px 24px; 
            border-radius: 8px; 
            border: none; 
            font-weight: 700; 
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        button:hover:not(:disabled) { 
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-download { 
            background: var(--green);
            color: white;
        }

        .btn-dark { 
            background: #334155;
            color: white;
        }

        .card { 
            background: var(--surface); 
            border-radius: var(--radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .card-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
        }

        h3 { 
            margin: 0;
            font-size: 1.2rem;
            font-weight: 800;
        }

        .card-body {
            padding: 28px;
        }

        .chart-container { 
            position: relative; 
            height: 450px; 
            width: 100%;
        }

        /* Alert Boxes */
        .alert {
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .alert.show { display: block; }

        .alert-warning {
            background: #fff7ed;
            border-left: 4px solid #f97316;
            color: #c2410c;
        }

        .alert-error {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            color: #dc2626;
        }

        .alert-success {
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            color: #16a34a;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--orange);
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .loading-sub {
            color: var(--text);
            opacity: 0.6;
            font-size: 0.9rem;
        }

        .retry-btn {
            margin-top: 16px;
            background: var(--orange);
            color: white;
            display: inline-block;
        }

        @media (max-width: 768px) {
            .controls { flex-direction: column; }
            .btn-group { margin-left: 0; width: 100%; }
            button { flex: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 DASHBOARD STATISTIK EKONOMI KOTA PALU</h1>
        <div style="margin-top: 10px; opacity: 0.9; font-size: 0.9rem;">
            <span id="statusText">⏳ Memuat data...</span>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>JENIS GRAFIK</label>
            <select id="menuGrafik" onchange="handleFilterChange()" disabled>
                <option value="">Memuat...</option>
            </select>
        </div>
        <div class="control-group">
            <label>PILIH PERIODE</label>
            <select id="filterTahun" onchange="updateChart()" disabled>
                <option value="">Memuat...</option>
            </select>
        </div>
        <div class="btn-group">
            <button class="btn-download" onclick="downloadChart()" id="btnDownload" disabled>
                📥 UNDUH
            </button>
            <button class="btn-dark" onclick="toggleDarkMode()">🌙 GELAP</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h3 id="judulGrafik">VISUALISASI DATA</h3>
        </div>
        <div class="card-body">
            <div id="alertContainer"></div>
            
            <div class="chart-container">
                <div class="loading" id="loadingBox">
                    <div class="spinner"></div>
                    <div class="loading-text">MENGHUBUNGKAN KE DATABASE...</div>
                    <div class="loading-sub">Mohon tunggu, sedang mengambil data</div>
                    <button class="retry-btn" onclick="retryLoad()" style="display:none" id="retryBtn">
                        🔄 COBA LAGI
                    </button>
                </div>
                <canvas id="mainChart" style="display:none"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
// ===== CONFIG =====
const CONFIG = {
    sheetUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV7Av7slh5mSdhPbe1pp2ttvv2jCc992JE_t1KaVRBzj0m2_NfYRplK6evfXaG1g/pub?output=csv",
    timeout: 8000,
    useMockData: true
};

// ===== STATE =====
let state = {
    chart: null,
     { laju: {}, adhb: {}, adhk: {}, distribusi: {} },
    years: [],
    loaded: false,
    attempt: 0
};

// ===== UTILITY =====
function showAlert(message, type = 'warning') {
    const container = document.getElementById('alertContainer');
    const alert = document.createElement('div');
    alert.className = `alert alert-${type} show`;
    alert.innerHTML = message;
    container.innerHTML = '';
    container.appendChild(alert);
    setTimeout(() => alert.classList.remove('show'), 8000);
}

function updateStatus(text) {
    document.getElementById('statusText').textContent = text;
}

function cleanNumber(val) {
    if (!val || val === '-' || val === 'n.a') return 0;
    let s = String(val).trim().replace(/^"|"$/g, '');
    if (s.includes(',') && s.includes('.')) {
        s = s.replace(/\./g, '').replace(',', '.');
    } else if (s.includes(',')) {
        s = s.replace(',', '.');
    }
    return parseFloat(s) || 0;
}

// ===== DATA LOADING =====
async function loadData() {
    state.attempt++;
    console.log(`Load attempt #${state.attempt}`);
    
    try {
        updateStatus('⏳ Mengunduh data dari Google Sheets...');
        
        const controller = new AbortController();
        const timeout = setTimeout(() => {
            controller.abort();
            throw new Error('Timeout setelah 8 detik');
        }, CONFIG.timeout);
        
        console.log('Fetching:', CONFIG.sheetUrl);
        const response = await fetch(CONFIG.sheetUrl, { 
            signal: controller.signal,
            headers: { 'Cache-Control': 'no-cache' }
        });
        clearTimeout(timeout);
        
        console.log('Response status:', response.status);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const csv = await response.text();
        console.log('CSV length:', csv.length);
        
        if (csv.length < 100) {
            throw new Error('Data CSV terlalu pendek/tidak valid');
        }
        
        parseData(csv);
        
        if (state.years.length === 0) {
            throw new Error('Tidak ada tahun ditemukan dalam data');
        }
        
        // SUCCESS
        console.log('✅ Data loaded:', state.years);
        updateStatus(`✅ Database terhubung - ${state.years.length} tahun`);
        showAlert('✅ Data berhasil dimuat dari Google Sheets!', 'success');
        enableControls();
        hideLoading();
        state.loaded = true;
        populateFilters();
        updateChart();
        
    } catch (error) {
        console.error('❌ Load error:', error.message);
        
        if (CONFIG.useMockData && state.attempt <= 2) {
            updateStatus('⚠️ Menggunakan data simulasi...');
            showAlert(`
                <strong>⚠️ Google Sheets Tidak Dapat Diakses</strong><br>
                ${error.message}. Menggunakan data simulasi. 
                Pastikan spreadsheet sudah di-<strong>Publish to Web</strong>.
            `, 'warning');
            
            generateMockData();
            enableControls();
            hideLoading();
            state.loaded = true;
            populateFilters();
            updateChart();
        } else {
            updateStatus('❌ Gagal memuat data');
            showAlert(`
                <strong>❌ Gagal Memuat Data</strong><br>
                ${error.message}. 
                <button onclick="retryLoad()" style="margin-top:8px;padding:8px 16px;background:#f97316;color:white;border:none;border-radius:4px;cursor:pointer">🔄 Coba Lagi</button>
            `, 'error');
            document.getElementById('retryBtn').style.display = 'inline-block';
        }
    }
}

function parseData(csv) {
    const rows = csv.split('\n').map(r => r.trim()).filter(r => r);
    const sep = rows[0].includes(';') ? ';' : ',';
    
    let headerIdx = -1;
    for (let i = 0; i < Math.min(10, rows.length); i++) {
        if (rows[i].includes('2011') || rows[i].includes('2020')) {
            headerIdx = i;
            break;
        }
    }
    
    if (headerIdx === -1) throw new Error('Header tidak ditemukan');
    
    const headers = rows[headerIdx].split(sep).map(h => h.trim());
    state.years = headers.slice(1).filter(h => /^\d{4}$/.test(h));
    
    for (let i = headerIdx + 1; i < rows.length; i++) {
        const cols = rows[i].split(sep);
        const label = (cols[0] || '').toUpperCase();
        
        state.years.forEach((year, idx) => {
            const val = cleanNumber(cols[idx + 1]);
            
            if (label.includes('LAJU') && label.includes('PERTUMBUHAN')) {
                state.data.laju[year] = val;
            } else if (label.includes('ADHB') && !label.includes('DISTRIBUSI')) {
                state.data.adhb[year] = val;
            } else if (label.includes('ADHK')) {
                state.data.adhk[year] = val;
            } else if (label.includes('DISTRIBUSI')) {
                const match = label.match(/DISTRIBUSI\s+(\w+)/i);
                if (match && val !== 0) {
                    if (!state.data.distribusi[year]) state.data.distribusi[year] = {};
                    state.data.distribusi[year][match[1].toUpperCase()] = val;
                }
            }
        });
    }
    
    state.years.forEach(year => {
        if (!state.data.distribusi[year] || Object.keys(state.data.distribusi[year]).length === 0) {
            state.data.distribusi[year] = {
                'PERTANIAN': 11.9, 'INDUSTRI': 11.3, 'KONSTRUKSI': 18.8,
                'PERDAGANGAN': 25.5, 'JASA': 32.5
            };
        }
    });
}

function generateMockData() {
    state.years = ['2019','2020','2021','2022','2023','2024','2025','2026'];
    
    state.years.forEach((y, i) => {
        state.data.laju[y] = 4.5 + Math.sin(i) * 2 + (Math.random() - 0.5) * 1.5;
        state.data.adhb[y] = 12000 + i * 1800 + Math.random() * 1000;
        state.data.adhk[y] = 9000 + i * 1200 + Math.random() * 800;
        state.data.distribusi[y] = {
            'PERTANIAN': 10 + Math.random() * 3,
            'INDUSTRI': 10 + Math.random() * 3,
            'KONSTRUKSI': 17 + Math.random() * 3,
            'PERDAGANGAN': 23 + Math.random() * 4,
            'JASA': 30 + Math.random() * 5
        };
    });
}

function enableControls() {
    document.getElementById('menuGrafik').disabled = false;
    document.getElementById('filterTahun').disabled = false;
    document.getElementById('btnDownload').disabled = false;
}

function hideLoading() {
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('mainChart').style.display = 'block';
}

function retryLoad() {
    state.attempt = 0;
    document.getElementById('retryBtn').style.display = 'none';
    document.getElementById('loadingBox').style.display = 'block';
    document.getElementById('mainChart').style.display = 'none';
    loadData();
}

function populateFilters() {
    const menu = document.getElementById('menuGrafik');
    const filter = document.getElementById('filterTahun');
    
    menu.innerHTML = `
        <option value="laju">📈 LAJU PERTUMBUHAN (GARIS)</option>
        <option value="nilai">📊 ADHB & ADHK (BATANG)</option>
        <option value="distribusi">🥧 DISTRIBUSI (PIE)</option>
    `;
    
    filter.innerHTML = '';
    
    if (menu.value === 'distribusi') {
        [...state.years].reverse().forEach(y => {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = 'Tahun ' + y;
            filter.add(opt);
        });
    } else {
        const last = state.years[state.years.length - 1];
        const first = state.years[0];
        [
            { t: '2021 - ' + last, v: '2021-' + last },
            { t: '2016 - 2020', v: '2016-2020' },
            { t: first + ' - 2015', v: first + '-2015' }
        ].forEach(r => {
            const opt = document.createElement('option');
            opt.value = r.v;
            opt.textContent = r.t;
            filter.add(opt);
        });
    }
}

function handleFilterChange() {
    populateFilters();
    updateChart();
}

function getYears(range) {
    if (range.includes('-')) {
        const [s, e] = range.split('-').map(Number);
        return Array.from({length: e-s+1}, (_, i) => String(s+i));
    }
    return [range];
}

function updateChart() {
    if (!state.loaded) return;
    
    const ctx = document.getElementById('mainChart').getContext('2d');
    const menu = document.getElementById('menuGrafik').value;
    const periode = document.getElementById('filterTahun').value;
    const labels = getYears(periode);
    const isDark = document.body.classList.contains('dark');
    
    if (state.chart) { state.chart.destroy(); state.chart = null; }
    
    const textColor = isDark ? '#eee' : '#333';
    const gridColor = isDark ? '#444' : '#ddd';
    const dataLabelColor = isDark ? '#000' : '#333';
    const dataLabelBg = isDark ? '#fff' : 'rgba(255,255,255,0.9)';
    
    const baseConfig = {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 600 },
        plugins: {
            legend: { labels: { color: textColor } },
            tooltip: {
                backgroundColor: 'rgba(30,30,40,0.95)',
                callbacks: {
                    label: (ctx) => {
                        const v = ctx.parsed.y ?? ctx.parsed;
                        if (menu === 'laju') return v.toFixed(2) + '%';
                        if (menu === 'nilai') return 'Rp ' + (v >= 1000 ? (v/1000).toFixed(1) + ' T' : v.toFixed(0) + ' M');
                        return v.toFixed(1) + '%';
                    }
                }
            },
            datalabels: {
                anchor: 'end', align: 'top',
                formatter: (val) => {
                    if (!val && val !== 0) return '';
                    if (menu === 'laju') return val.toFixed(1) + '%';
                    if (menu === 'nilai') return val >= 1000 ? (val/1000).toFixed(1) + 'T' : val.toFixed(0);
                    return val.toFixed(1) + '%';
                },
                font: { weight: 'bold', size: 10 },
                color: dataLabelColor,
                backgroundColor: dataLabelBg,
                borderRadius: 6,
                padding: 5
            }
        },
        scales: menu !== 'distribusi' ? {
            y: { beginAtZero: true, ticks: { color: textColor }, grid: { color: gridColor } },
            x: { ticks: { color: textColor }, grid: { display: false } }
        } : {}
    };
    
    let config;
    
    if (menu === 'nilai') {
        config = {
            type: 'bar',
             {
                labels: labels,
                datasets: [
                    { label: 'ADHB',  labels.map(t => state.data.adhb[t] || 0), backgroundColor: 'rgba(255,140,0,0.85)', borderColor: '#FF8C00', borderWidth: 2, borderRadius: 6 },
                    { label: 'ADHK',  labels.map(t => state.data.adhk[t] || 0), backgroundColor: 'rgba(39,174,96,0.85)', borderColor: '#27ae60', borderWidth: 2, borderRadius: 6 }
                ]
            },
            options: baseConfig
        };
    } else if (menu === 'laju') {
        config = {
            type: 'line',
             {
                labels: labels,
                datasets: [{
                    label: 'LAJU PERTUMBUHAN (%)',
                     labels.map(t => state.data.laju[t] || 0),
                    borderColor: '#27ae60',
                    backgroundColor: 'rgba(39,174,96,0.15)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 6,
                    pointBackgroundColor: '#27ae60'
                }]
            },
            options: baseConfig
        };
    } else {
        const distData = state.data.distribusi[periode] || {};
        config = {
            type: 'doughnut',
             {
                labels: Object.keys(distData),
                datasets: [{
                     Object.values(distData),
                    backgroundColor: ['#FF8C00','#27ae60','#2980b9','#f1c40f','#8e44ad'],
                    borderWidth: 3,
                    borderColor: isDark ? '#1e293b' : '#fff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { color: textColor } },
                    datalabels: { 
                        anchor: 'center', align: 'center',
                        formatter: v => v >= 5 ? v.toFixed(1) + '%' : '',
                        color: '#fff', font: { weight: 'bold', size: 11 }
                    }
                },
                cutout: '55%'
            }
        };
    }
    
    Chart.register(ChartDataLabels);
    state.chart = new Chart(ctx, config);
    
    const menuText = document.getElementById('menuGrafik').options[document.getElementById('menuGrafik').selectedIndex].text;
    document.getElementById('judulGrafik').textContent = menuText.split('(')[0].trim() + ' (' + periode + ')';
}

function toggleDarkMode() {
    document.body.classList.toggle('dark');
    if (state.chart) updateChart();
}

function downloadChart() {
    const canvas = document.getElementById('mainChart');
    const link = document.createElement('a');
    link.download = 'Dashboard-Ekonomi-Palu-' + new Date().toISOString().slice(0,10) + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
}

// ===== INIT =====
window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
