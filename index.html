<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD EKONOMI KOTA PALU</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root { 
            --orange: #FF8C00; --green: #27ae60; --bg: #fffcf5; 
            --text: #333; --card-bg: #ffffff; --border: #eee;
        }
        body.dark { 
            --bg: #121212; --text: #eee; --card-bg: #1e1e1e; --border: #333;
        }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); 
            color: var(--text); margin: 0; padding: 20px; transition: 0.3s;
        }
        .header { background: var(--orange); color: white; padding: 15px 30px; border-radius: 12px; display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .controls { 
            background: var(--card-bg); padding: 20px; border-radius: 12px; 
            margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;
        }
        select { padding: 10px; border-radius: 6px; border: 1px solid var(--orange); background: var(--card-bg); color: var(--text); }
        .btn-group { display: flex; gap: 10px; margin-left: auto; }
        button { padding: 10px 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        .btn-download { background: var(--green); color: white; }
        .btn-dark { background: #444; color: white; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; border-top: 4px solid var(--orange); box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 1000px; margin: 0 auto; }
        .chart-container { position: relative; height: 450px; width: 100%; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-text">
        <h1 style="margin:0; font-size: 1.5rem;">DASHBOARD EKONOMI KOTA PALU</h1>
        <h3 style="margin:5px 0; font-weight: normal;">Visualisasi PDRB Periode 2011-2026</h3>
        <small id="status" style="opacity: 0.8;">MENGHUBUNGKAN KE DATABASE...</small>
    </div>
</div>

<div class="controls">
    <div style="display:flex; flex-direction:column; gap:5px;">
        <label style="font-weight:bold; font-size:0.7rem; color:var(--orange);">JENIS GRAFIK</label>
        <select id="menuGrafik" onchange="sesuaikanFilter()">
            <option value="nilai">ADHB & ADHK (BATANG)</option>
            <option value="laju">LAJU PERTUMBUHAN (GARIS)</option>
            <option value="distribusi">DISTRIBUSI PDRB (PIE)</option>
            <option value="sumber">SUMBER PERTUMBUHAN (BATANG)</option>
        </select>
    </div>
    <div style="display:flex; flex-direction:column; gap:5px;">
        <label style="font-weight:bold; font-size:0.7rem; color:var(--orange);">PERIODE</label>
        <select id="filterTahun" onchange="updateChart()"></select>
    </div>
    <div class="btn-group">
        <button class="btn-dark" onclick="toggleDarkMode()">MODE MALAM</button>
    </div>
</div>

<div class="card">
    <h3 id="judulGrafik" style="text-align:center; font-size:1rem; margin-bottom: 20px;">VISUALISASI DATA</h3>
    <div class="chart-container"><canvas id="mainChart"></canvas></div>
</div>

<script>
    const ctx = document.getElementById('mainChart').getContext('2d');
    let currentChart;
    let database = { laju: {}, adhb: {}, adhk: {}, distribusi: {}, sumber: {} };
    
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV7Av7slh5mSdhPbe1pp2ttvv2jCc992JE_t1KaVRBzj0m2_NfYRplK6evfXaG1g/pub?output=csv";

    async function fetchData() {
        try {
            const response = await fetch(sheetUrl);
            const csvText = await response.text();
            const rows = csvText.split('\n').map(r => r.replace(/[\r]/g, '').trim()).filter(r => r !== "");
            
            // Mencari header tahun
            let headerRow = rows[0].split(',');
            let tahunIndexes = {};
            headerRow.forEach((cell, idx) => {
                let match = cell.match(/20\d{2}/);
                if(match) tahunIndexes[match[0]] = idx;
            });

            const cleanNum = (val) => {
                if (!val || ["", "-", "n.a"].includes(val)) return 0;
                let s = val.replace(/\./g, '').replace(',', '.');
                return parseFloat(s) || 0;
            };

            rows.slice(1).forEach(row => {
                let cols = row.split(',');
                let label = cols[0].toUpperCase();

                for (let thn in tahunIndexes) {
                    let val = cleanNum(cols[tahunIndexes[thn]]);
                    if (label.includes("LAJU") || label.includes("PERTUMBUHAN")) {
                        database.laju[thn] = val;
                    } else if (label.includes("ADHB") && !label.includes("DISTRIBUSI")) {
                        database.adhb[thn] = val;
                    } else if (label.includes("ADHK")) {
                        database.adhk[thn] = val;
                    } else if (label.includes("SUMBER")) {
                        database.sumber[thn] = val;
                    } else if (label.includes("DISTRIBUSI")) {
                        let kat = label.replace("DISTRIBUSI", "").replace("(%)", "").trim();
                        if (!database.distribusi[kat]) database.distribusi[kat] = {};
                        database.distribusi[kat][thn] = val;
                    }
                }
            });

            document.getElementById('status').innerText = "DATABASE TERHUBUNG (AKTIF)";
            sesuaikanFilter();
        } catch (error) {
            console.error(error);
            document.getElementById('status').innerText = "GAGAL MEMUAT DATA";
        }
    }

    function sesuaikanFilter() {
        const menu = document.getElementById('menuGrafik').value;
        const filter = document.getElementById('filterTahun');
        filter.innerHTML = "";
        
        if (menu !== 'distribusi') {
            const ranges = ["2021-2026", "2016-2020", "2011-2015"];
            ranges.forEach(r => {
                let opt = new Option(r, r);
                filter.add(opt);
            });
        } else {
            Object.keys(database.adhb).sort().reverse().forEach(t => {
                filter.add(new Option(t, t));
            });
        }
        updateChart();
    }

    function updateChart() {
        const menu = document.getElementById('menuGrafik').value;
        const periode = document.getElementById('filterTahun').value;
        const isDark = document.body.classList.contains('dark');
        
        if (currentChart) currentChart.destroy();
        
        let labels = [];
        if (periode.includes("-")) {
            let [s, e] = periode.split("-").map(Number);
            for(let i=s; i<=e; i++) labels.push(i.toString());
        } else { labels = [periode]; }

        let chartData = { labels: labels, datasets: [] };
        let type = 'bar';

        if (menu === 'nilai') {
            chartData.datasets.push({ label: 'ADHB', data: labels.map(t => database.adhb[t] || 0), backgroundColor: '#FF8C00' });
            chartData.datasets.push({ label: 'ADHK', data: labels.map(t => database.adhk[t] || 0), backgroundColor: '#27ae60' });
        } else if (menu === 'laju') {
            type = 'line';
            chartData.datasets.push({ 
                label: 'LAJU (%)', 
                data: labels.map(t => database.laju[t] || 0), 
                borderColor: '#27ae60', 
                tension: 0.3, 
                fill: true,
                backgroundColor: 'rgba(39, 174, 96, 0.1)'
            });
        } else if (menu === 'distribusi') {
            type = 'pie';
            let categories = Object.keys(database.distribusi);
            chartData.labels = categories;
            chartData.datasets.push({
                data: categories.map(c => database.distribusi[c][periode] || 0),
                backgroundColor: ['#FF8C00', '#27ae60', '#3498DB', '#F1C40F', '#E74C3C', '#9B59B6']
            });
        } else if (menu === 'sumber') {
            chartData.datasets.push({ label: 'SUMBER', data: labels.map(t => database.sumber[t] || 0), backgroundColor: '#FF8C00' });
        }

        currentChart = new Chart(ctx, {
            type: type,
            data: chartData,
            plugins: [ChartDataLabels],
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: isDark ? '#fff' : '#333' } },
                    datalabels: {
                        anchor: 'end',
                        align: 'top',
                        color: isDark ? '#fff' : '#444',
                        font: { weight: 'bold' },
                        formatter: (v) => v ? v.toLocaleString('id-ID') + (menu==='laju'?'%':'') : ''
                    }
                },
                scales: type !== 'pie' ? {
                    y: { grid: { color: isDark ? '#333' : '#eee' }, ticks: { color: isDark ? '#bbb' : '#666' } },
                    x: { ticks: { color: isDark ? '#bbb' : '#666' } }
                } : {}
            }
        });

        document.getElementById('judulGrafik').innerText = 
            document.getElementById('menuGrafik').options[document.getElementById('menuGrafik').selectedIndex].text + " (" + periode + ")";
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark');
        updateChart();
    }

    fetchData();
</script>
</body>
</html>
