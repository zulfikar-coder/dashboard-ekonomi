<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DASHBOARD STATISTIK EKONOMI KOTA PALU</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

<style>
:root { --orange:#FF8C00; --green:#27ae60; --bg:#fffcf5; }

body {
    font-family:'Segoe UI',Arial;
    background:var(--bg);
    margin:0; padding:20px;
    text-transform:uppercase;
}

/* HEADER */
.header {
    background:var(--orange);
    color:white;
    padding:15px 30px;
    border-radius:12px;
    display:flex;
    align-items:center;
    gap:20px;
}

.logo-img { height:70px; }

/* CONTROL */
.controls {
    background:white;
    padding:20px;
    border-radius:12px;
    margin:20px 0;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

/* KPI */
.kpi-container {
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.kpi-card {
    flex:1;
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    border-top:4px solid var(--orange);
}

.kpi-card p {
    font-weight:bold;
    font-size:18px;
}

/* CARD */
.card {
    background:white;
    padding:20px;
    border-radius:12px;
    max-width:900px;
    margin:auto;
}

.chart-container {
    height:400px;
}

/* DARK MODE */
.dark {
    background:#1e1e1e;
    color:white;
}
.dark .card,.dark .controls,.dark .kpi-card {
    background:#2c2c2c;
}
</style>
</head>

<body>

<div class="header">
    <img src="logo-bps.png" class="logo-img">
    <div>
        <h2>DASHBOARD STATISTIK EKONOMI KOTA PALU</h2>
        <small>SUMBER GOOGLE SHEET</small>
    </div>
</div>

<div class="controls">
    <select id="menuGrafik" onchange="sesuaikanFilter()">
        <option value="laju">LAJU</option>
        <option value="nilai">ADHB & ADHK</option>
        <option value="distribusi">DISTRIBUSI</option>
    </select>

    <select id="filterTahun" onchange="updateChart()"></select>
</div>

<!-- KPI -->
<div class="kpi-container">
    <div class="kpi-card">
        <p id="kpiAdhb">0</p>
        <small>ADHB</small>
    </div>
    <div class="kpi-card">
        <p id="kpiAdhk">0</p>
        <small>ADHK</small>
    </div>
    <div class="kpi-card">
        <p id="kpiGrowth">0%</p>
        <small>PERTUMBUHAN</small>
    </div>
</div>

<div style="text-align:right;margin-bottom:10px;">
    <button onclick="downloadChart()">Download</button>
    <button onclick="toggleDarkMode()">Dark</button>
</div>

<div class="card">
    <canvas id="mainChart"></canvas>
</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRxFyk-OotNf1VPI4Ly66xecHZ_CbRQN2T3vpdMT2FXfIqcj18BQWiz9TWk71Ome2G4VrZByb8PhUxG/pub?output=csv";

let dataSheet = [];
let currentChart;

// 🔥 PARSE ANGKA (FIX UTAMA)
function parseNumber(val){
    if(!val) return 0;
    return parseFloat(
        val.replace(/\./g,'')
           .replace(',','.')
           .replace(/\s/g,'')
    ) || 0;
}

// 🔥 AMBIL DATA
async function ambilData(){
    const res = await fetch(sheetURL);
    const text = await res.text();

    const rows = text.trim().split("\n").slice(1);

    dataSheet = rows.map(r=>{
        let c = r.split(",");
        return {
            tahun:c[0],
            adhb:parseNumber(c[1]),
            adhk:parseNumber(c[2])
        };
    }).sort((a,b)=>a.tahun-b.tahun);

    sesuaikanFilter();
}

// 🔥 KPI
function updateKPI(data){
    let adhb = data.reduce((a,b)=>a+b.adhb,0);
    let adhk = data.reduce((a,b)=>a+b.adhk,0);

    document.getElementById("kpiAdhb").innerText = adhb.toLocaleString();
    document.getElementById("kpiAdhk").innerText = adhk.toLocaleString();
}

// 🔥 FILTER
function sesuaikanFilter(){
    let f = document.getElementById("filterTahun");
    f.innerHTML="";

    ["2011-2015","2016-2020","2021-2026"].forEach(p=>{
        let o=document.createElement("option");
        o.value=p;
        o.text=p;
        f.appendChild(o);
    });

    updateChart();
}

// 🔥 CHART
function updateChart(){
    let menu = document.getElementById("menuGrafik").value;
    let periode = document.getElementById("filterTahun").value;

    if(currentChart) currentChart.destroy();

    let tahun = periode=="2011-2015"?['2011','2012','2013','2014','2015']:
                periode=="2016-2020"?['2016','2017','2018','2019','2020']:
                ['2021','2022','2023','2024','2025','2026'];

    let data = dataSheet.filter(d=>tahun.includes(d.tahun));

    updateKPI(data);

    let config = {
        plugins:[ChartDataLabels],
        options:{
            plugins:{
                legend:{position:'bottom'}
            }
        }
    };

    // 🔹 BAR
    if(menu=="nilai"){
        config.type='bar';
        config.data={
            labels:data.map(d=>d.tahun),
            datasets:[
                {label:'ADHB',data:data.map(d=>d.adhb),backgroundColor:'#FF8C00'},
                {label:'ADHK',data:data.map(d=>d.adhk),backgroundColor:'#27ae60'}
            ]
        };
    }

    // 🔹 LINE
    else if(menu=="laju"){
        config.type='line';
        let laju=[];
        for(let i=1;i<data.length;i++){
            laju.push(((data[i].adhk-data[i-1].adhk)/data[i-1].adhk*100).toFixed(2));
        }
        config.data={
            labels:tahun.slice(1),
            datasets:[{
                label:'PERTUMBUHAN %',
                data:laju,
                borderColor:'#27ae60'
            }]
        };
    }

    // 🔹 PIE (FIX TOTAL)
    else if(menu=="distribusi"){
        config.type='pie';

        // 🔥 contoh distribusi dari ADHB
        let total = data.reduce((a,b)=>a+b.adhb,0);

        let nilai = data.map(d=>((d.adhb/total)*100).toFixed(1));

        config.data={
            labels:data.map(d=>d.tahun),
            datasets:[{
                data:nilai,

                // 🔥 WARNA BERBEDA
                backgroundColor:[
                    '#FF6384','#36A2EB','#FFCE56',
                    '#4BC0C0','#9966FF','#FF9F40'
                ]
            }]
        };

        config.options.plugins.datalabels={
            color:'#fff',
            formatter:(v)=>v+'%',
            anchor:'center',
            align:'center',
            font:{size:14,weight:'bold'}
        };
    }

    currentChart = new Chart(document.getElementById("mainChart"),config);
}

// 🔥 DOWNLOAD
function downloadChart(){
    let a=document.createElement("a");
    a.href=document.getElementById("mainChart").toDataURL();
    a.download="chart.png";
    a.click();
}

// 🔥 DARK MODE
function toggleDarkMode(){
    document.body.classList.toggle("dark");
}

// START
ambilData();
</script>

</body>
</html>
