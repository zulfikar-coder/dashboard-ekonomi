<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DASHBOARD EKONOMI KOTA PALU</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

<style>
:root { 
    --orange:#FF8C00; --green:#27ae60; --bg:#fffcf5; 
    --text:#333; --card:#fff;
}
.dark { --bg:#121212; --text:#eee; --card:#1e1e1e; }

body{
    font-family:Segoe UI; background:var(--bg);
    color:var(--text); padding:20px; text-transform:uppercase;
}

.header{
    background:var(--orange); color:#fff;
    padding:15px; border-radius:10px;
    display:flex; gap:15px; align-items:center;
}

.controls{
    background:var(--card); padding:15px;
    border-radius:10px; margin-top:15px;
    display:flex; gap:10px; flex-wrap:wrap;
}

button, select{
    padding:8px; border-radius:6px;
    font-weight:bold;
}

.card{
    background:var(--card); padding:20px;
    border-radius:10px; margin-top:15px;
}

.chart-container{ height:400px; }
</style>
</head>

<body>

<div class="header">
    <h2>DASHBOARD EKONOMI KOTA PALU</h2>
    <small id="status">LOADING...</small>
</div>

<div class="controls">
    <select id="menuGrafik" onchange="updateChart()">
        <option value="nilai">ADHB & ADHK</option>
        <option value="laju">LAJU</option>
    </select>

    <select id="filterTahun" onchange="updateChart()"></select>

    <button onclick="toggleDarkMode()">MODE</button>
</div>

<div class="card">
    <canvas id="mainChart"></canvas>
</div>

<script>
const ctx = document.getElementById('mainChart').getContext('2d');
let currentChart;

let database = { laju:{}, adhb:{}, adhk:{} };
let tahunIndexes = {};

const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV7Av7slh5mSdhPbe1pp2ttvv2jCc992JE_t1KaVRBzj0m2_NfYRplK6evfXaG1g/pub?output=csv";

async function fetchData(){
    const res = await fetch(sheetUrl);
    const text = await res.text();

    const rows = text.split("\n").map(r=>r.trim());
    const separator = rows[0].includes(";") ? ";" : ",";

    const data = rows.map(r=>r.split(separator));

    // 🔥 Ambil posisi kolom tahun
    data.forEach(cols=>{
        cols.forEach((c,i)=>{
            const m = c.match(/20\d{2}/);
            if(m){
                tahunIndexes[m[0]] = i;
            }
        });
    });

    console.log("TAHUN:", tahunIndexes);

    const clean = v=>{
        if(!v) return 0;
        let s = v.replace(/\./g,'').replace(',', '.');
        return parseFloat(s)||0;
    };

    // 🔥 Ambil data
    data.forEach(cols=>{
        const a = cols[0]?.toUpperCase()||"";

        if(a.includes("LAJU")){
            for(let t in tahunIndexes){
                database.laju[t] = clean(cols[tahunIndexes[t]]);
            }
        }

        else if(a.includes("ADHB") && !a.includes("DISTRIBUSI")){
            for(let t in tahunIndexes){
                database.adhb[t] = clean(cols[tahunIndexes[t]]);
            }
        }

        else if(a.includes("ADHK")){
            for(let t in tahunIndexes){
                database.adhk[t] = clean(cols[tahunIndexes[t]]);
            }
        }
    });

    // isi dropdown
    const filter = document.getElementById("filterTahun");
    Object.keys(tahunIndexes).sort().forEach(t=>{
        let o=document.createElement("option");
        o.value=t; o.text=t;
        filter.add(o);
    });

    document.getElementById("status").innerText="AKTIF";
    updateChart();
}

function updateChart(){
    const menu = document.getElementById("menuGrafik").value;
    const thn = document.getElementById("filterTahun").value;

    if(currentChart) currentChart.destroy();

    let config={
        plugins:[ChartDataLabels],
        options:{
            responsive:true,
            plugins:{
                datalabels:{
                    anchor:'end',
                    formatter:v=>v
                }
            }
        }
    };

    if(menu==="nilai"){
        config.type="bar";
        config.data={
            labels:[thn],
            datasets:[
                {label:"ADHB", data:[database.adhb[thn]||0], backgroundColor:"#FF8C00"},
                {label:"ADHK", data:[database.adhk[thn]||0], backgroundColor:"#27ae60"}
            ]
        };
    }

    if(menu==="laju"){
        config.type="line";
        config.data={
            labels:Object.keys(database.laju),
            datasets:[{
                label:"LAJU",
                data:Object.values(database.laju),
                borderColor:"#27ae60"
            }]
        };
    }

    currentChart=new Chart(ctx,config);
}

function toggleDarkMode(){
    document.body.classList.toggle("dark");
    updateChart();
}

fetchData();
</script>

</body>
</html>
