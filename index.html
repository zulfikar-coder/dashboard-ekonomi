<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Statistik Ekonomi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        .filter { margin-bottom: 20px; background: white; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>Dashboard Statistik Ekonomi</h1>
    
    <div class="filter">
        <label><b>Pilih Periode Tahun:</b></label>
        <select>
            <option>2021 - 2026</option>
            <option>2016 - 2020</option>
            <option>2011 - 2015</option>
        </select>
    </div>

    <div class="grid">
        <div class="card">
            <h2>Laju Pertumbuhan Ekonomi</h2>
            <canvas id="lineChart"></canvas>
        </div>

        <div class="card">
            <h2>Distribusi ADHB</h2>
            <canvas id="pieChart"></canvas>
        </div>

        <div class="card">
            <h2>Sumber Pertumbuhan</h2>
            <canvas id="barSource"></canvas>
        </div>

        <div class="card">
            <h2>Nilai ADHB & ADHK</h2>
            <canvas id="barValue"></canvas>
        </div>
    </div>

    <script>
        // Data Dummy (Silakan ganti dengan data hasil audit Anda)
        const labelsYear = ['2021', '2022', '2023', '2024', '2025', '2026'];

        // Grafik Garis
        new Chart(document.getElementById('lineChart'), {
            type: 'line',
            data: { labels: labelsYear, datasets: [{ label: '% Pertumbuhan', data: [3.2, 4.5, 5.0, 4.8, 5.2, 5.5], borderColor: '#3498db', tension: 0.3 }] }
        });

        // Grafik Pie
        new Chart(document.getElementById('pieChart'), {
            type: 'pie',
            data: { labels: ['Sektor A', 'Sektor B', 'Sektor C'], datasets: [{ data: [40, 35, 25], backgroundColor: ['#e74c3c', '#2ecc71', '#f1c40f'] }] }
        });

        // Grafik Sumber Pertumbuhan
        new Chart(document.getElementById('barSource'), {
            type: 'bar',
            data: { labels: ['Sektor A', 'Sektor B', 'Sectors C'], datasets: [{ label: 'Kontribusi', data: [12, 19, 3], backgroundColor: '#9b59b6' }] }
        });

        // Grafik ADHB & ADHK
        new Chart(document.getElementById('barValue'), {
            type: 'bar',
            data: { 
                labels: labelsYear, 
                datasets: [
                    { label: 'ADHB', data: [100, 120, 130, 145, 160, 175], backgroundColor: '#34495e' },
                    { label: 'ADHK', data: [90, 100, 110, 115, 120, 130], backgroundColor: '#bdc3c7' }
                ] 
            }
        });
    </script>
</body>
</html>
