<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD STATISTIK EKONOMI KOTA PALU</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #FF8C00;
            --orange-dark: #e67e00;
            --orange-light: #ffa033;
            --green: #27ae60;
            --green-dark: #219a52;
            --bg: #f8fafc;
            --text: #0f172a;
            --text-muted: #64748b;
            --surface: #ffffff;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius: 20px;
            --radius-sm: 14px;
            --radius-xs: 10px;
        }
        
        .dark {
            --bg: #0f172a;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --surface: #1e293b;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #f1f5f9 100%);
            color: var(--text); 
            padding: 0;
            text-transform: uppercase; 
            min-height: 100vh;
            line-height: 1.6;
        }

        .dark body {
            background: linear-gradient(135deg, var(--bg) 0%, #1e293b 100%);
        }

        .container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 28px 32px;
        }

        .header { 
            background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
            color: white; 
            padding: 32px 40px; 
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            margin-bottom: 28px;
            display: flex; 
            align-items: center; 
            gap: 28px;
        }

        .logo-container { 
            background: white; 
            padding: 14px; 
            border-radius: var(--radius-sm);
            width: 92px; 
            height: 92px; 
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        .logo-img { 
            width: 70px; 
            height: 70px; 
            object-fit: contain; 
        }

        .header-text h1 { 
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 800;
            margin: 0;
            line-height: 1.2;
        }

        .header-text small {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            opacity: 0.98;
            font-size: 0.88rem;
            font-weight: 600;
            background: rgba(255,255,255,0.22);
            padding: 6px 16px;
            border-radius: 9999px;
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #fbbf24;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.success { 
            background: #22c55e; 
            animation: none;
        }

        .status-dot.error { 
            background: #ef4444; 
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
        }

        .controls { 
            background: var(--surface); 
            padding: 26px 34px; 
            border-radius: var(--radius);
            margin-bottom: 28px;
            box-shadow: var(--shadow-lg);
            display: flex; 
            gap: 24px; 
            flex-wrap: wrap; 
            align-items: flex-end;
            border: 1px solid var(--border);
        }

        .controls::before {
            content: '';
            position: absolute;
            top: 0;
            left: 34px;
            right: 34px;
            height: 3px;
            background: linear-gradient(90deg, var(--orange), var(--orange-light), var(--orange));
            border-radius: 0 0 6px 6px;
        }

        .control-group { 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            flex: 1;
            min-width: 220px;
        }

        label { 
            font-weight: 700; 
            font-size: 0.75rem; 
            color: var(--orange);
            letter-spacing: 1.5px;
        }

        select { 
            padding: 14px 20px; 
            border-radius: var(--radius-xs); 
            border: 2px solid var(--border); 
            font-weight: 600; 
            background: var(--surface); 
            color: var(--text); 
            cursor: pointer;
            font-size: 0.875rem;
            min-height: 48px;
        }

        select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        select:focus {
            outline: none;
            border-color: var(--orange);
        }

        .btn-group { 
            display: flex; 
            gap: 14px; 
            margin-left: auto;
        }

        button { 
            padding: 14px 26px; 
            border-radius: var(--radius-xs); 
            border: none; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-height: 48px;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: var(--shadow-lg); 
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-download { 
            background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
            color: white;
        }

        .btn-dark { 
            background: linear-gradient(135deg, #475569 0%, #334155 100%);
            color: white;
        }

        .card { 
            background: var(--surface); 
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg); 
            border: 1px solid var(--border);
        }

        .card-header {
            padding: 24px 36px 20px;
            border-bottom: 1px solid var(--border);
        }

        h3 { 
            color: var(--text); 
            margin: 0;
            font-size: 1.25rem;
            font-weight: 800;
        }

        .card-body {
            padding: 28px 36px 32px;
        }

        .chart-container { 
            position: relative; 
            height: 480px; 
            width: 100%;
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 24px;
        }

        /* Loading State */
        .loading-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
        }

        .error-box {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            padding: 16px 20px;
            border-radius: var(--radius-xs);
            margin-bottom: 20px;
            color: #dc2626;
            display: none;
        }

        .error-box.show {
            display: block;
        }

        .success-box {
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            padding: 16px 20px;
            border-radius: var(--radius-xs);
            margin-bottom: 20px;
            color: #16a34a;
            display: none;
        }

        .success-box.show {
            display: block;
        }

        @media (max-width: 768px) {
            .container { padding: 18px 20px; }
            .header { flex-direction: column; text-align: center; padding: 26px 24px; gap: 20px; }
            .header-text h1 { font-size: 1.4rem; }
            .logo-container { width: 78px; height: 78px; }
            .logo-img { width: 60px; height: 60px; }
            .controls { flex-direction: column; gap: 18px; padding: 22px 24px; }
            .control-group { width: 100%; }
            .btn-group { margin-left: 0; width: 100%; }
            button { flex: 1; }
            .chart-container { height: 340px; padding: 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/zulfikar-coder/dashboard-ekonomi/main/logo-bps.png" 
                 alt="BPS" class="logo-img"
                 onerror="this.style.display='none'">
        </div>
        <div class="header-text">
            <h1>DASHBOARD STATISTIK EKONOMI KOTA PALU</h1>
            <small id="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">MEMUAT DATA...</span>
            </small>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>JENIS GRAFIK</label>
            <select id="menuGrafik" onchange="handleFilterChange()" disabled>
                <option value="">Memuat...</option>
            </select>
        </div>
        <div class="control-group">
            <label>PILIH PERIODE</label>
            <select id="filterTahun" onchange="updateChart()" disabled>
                <option value="">Memuat...</option>
            </select>
        </div>
        <div class="btn-group">
            <button class="btn-download" onclick="downloadChart()" id="btnDownload" disabled>
                📥 UNDUH GRAFIK
            </button>
            <button class="btn-dark" onclick="toggleDarkMode()">🌙 MODE GELAP</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h3 id="judulGrafik">VISUALISASI DATA</h3>
        </div>
        <div class="card-body">
            <div id="errorBox" class="error-box"></div>
            <div id="successBox" class="success-box"></div>
            <div class="chart-container">
                <div class="loading-wrapper" id="loadingWrapper">
                    <div class="spinner"></div>
                    <div class="loading-text">Menghubungkan ke database...</div>
                </div>
                <canvas id="mainChart" style="display:none"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
// ===== CONFIG =====
const CONFIG = {
    sheetUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV7Av7slh5mSdhPbe1pp2ttvv2jCc992JE_t1KaVRBzj0m2_NfYRplK6evfXaG1g/pub?output=csv",
    timeout: 10000,
    useMockData: true
};

// ===== STATE =====
let state = {
    chart: null,
     { laju: {}, adhb: {}, adhk: {}, distribusi: {} },
    years: [],
    loaded: false
};

// ===== UTILITY =====
function cleanNumber(val) {
    if (!val || val === '-' || val === 'n.a') return 0;
    let s = String(val).trim().replace(/^"|"$/g, '');
    if (s.includes(',') && s.includes('.')) {
        s = s.replace(/\./g, '').replace(',', '.');
    } else if (s.includes(',')) {
        s = s.replace(',', '.');
    }
    return parseFloat(s) || 0;
}

function showMessage(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = (type === 'error' ? 'error-box' : 'success-box') + ' show';
    setTimeout(() => el.classList.remove('show'), 6000);
}

function updateStatus(text, type) {
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    txt.textContent = text;
    dot.className = 'status-dot ' + (type || 'loading');
}

// ===== DATA LOADING =====
async function loadData() {
    try {
        updateStatus('MENGUNDUH DATA...', 'loading');
        
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), CONFIG.timeout);
        
        const response = await fetch(CONFIG.sheetUrl, { 
            signal: controller.signal,
            headers: { 'Cache-Control': 'no-cache' }
        });
        clearTimeout(timeout);
        
        if (!response.ok) throw new Error('HTTP ' + response.status);
        
        const csv = await response.text();
        if (csv.length < 100) throw new Error('Data tidak valid');
        
        parseData(csv);
        
        if (state.years.length === 0) throw new Error('Tidak ada data tahun');
        
        // Success
        updateStatus('DATABASE TERHUBUNG - ' + state.years.length + ' TAHUN', 'success');
        showMessage('successBox', '✅ Data berhasil dimuat dari Google Sheets!');
        enableControls();
        document.getElementById('loadingWrapper').style.display = 'none';
        document.getElementById('mainChart').style.display = 'block';
        state.loaded = true;
        populateFilters();
        updateChart();
        
    } catch (error) {
        console.error('Load error:', error);
        
        if (CONFIG.useMockData) {
            updateStatus('MODE SIMULASI - DATA CONTOH', 'error');
            showMessage('errorBox', '⚠️ Menggunakan data simulasi (Google Sheets tidak dapat diakses). Pastikan spreadsheet sudah di-Publish to Web.');
            generateMockData();
            enableControls();
            document.getElementById('loadingWrapper').style.display = 'none';
            document.getElementById('mainChart').style.display = 'block';
            state.loaded = true;
            populateFilters();
            updateChart();
        } else {
            updateStatus('GAGAL MEMUAT DATA', 'error');
            showMessage('errorBox', '❌ Gagal: ' + error.message);
            document.getElementById('loadingWrapper').innerHTML = '<div class="loading-text">Gagal memuat data. Silakan refresh halaman.</div>';
        }
    }
}

function parseData(csv) {
    const rows = csv.split('\n').map(r => r.trim()).filter(r => r);
    const sep = rows[0].includes(';') ? ';' : ',';
    
    // Find header
    let headerIdx = -1;
    for (let i = 0; i < Math.min(10, rows.length); i++) {
        if (rows[i].includes('2011') || rows[i].includes('2020')) {
            headerIdx = i;
            break;
        }
    }
    
    if (headerIdx === -1) throw new Error('Header tidak ditemukan');
    
    const headers = rows[headerIdx].split(sep).map(h => h.trim());
    state.years = headers.slice(1).filter(h => /^\d{4}$/.test(h));
    
    // Parse data
    for (let i = headerIdx + 1; i < rows.length; i++) {
        const cols = rows[i].split(sep);
        const label = (cols[0] || '').toUpperCase();
        
        state.years.forEach((year, idx) => {
            const val = cleanNumber(cols[idx + 1]);
            
            if (label.includes('LAJU') && label.includes('PERTUMBUHAN')) {
                state.data.laju[year] = val;
            } else if (label.includes('ADHB') && !label.includes('DISTRIBUSI')) {
                state.data.adhb[year] = val;
            } else if (label.includes('ADHK')) {
                state.data.adhk[year] = val;
            } else if (label.includes('DISTRIBUSI')) {
                const match = label.match(/DISTRIBUSI\s+(\w+)/i);
                if (match && val !== 0) {
                    if (!state.data.distribusi[year]) state.data.distribusi[year] = {};
                    state.data.distribusi[year][match[1].toUpperCase()] = val;
                }
            }
        });
    }
    
    // Fallback
    state.years.forEach(year => {
        if (!state.data.distribusi[year] || Object.keys(state.data.distribusi[year]).length === 0) {
            state.data.distribusi[year] = {
                'PERTANIAN': 11.9, 'INDUSTRI': 11.3, 'KONSTRUKSI': 18.8,
                'PERDAGANGAN': 25.5, 'JASA': 32.5
            };
        }
    });
    
    console.log('Data loaded:', state.years);
}

function generateMockData() {
    state.years = ['2019','2020','2021','2022','2023','2024','2025','2026'];
    
    state.years.forEach((y, i) => {
        state.data.laju[y] = 4.5 + Math.sin(i) * 2 + (Math.random() - 0.5) * 1.5;
        state.data.adhb[y] = 12000 + i * 1800 + Math.random() * 1000;
        state.data.adhk[y] = 9000 + i * 1200 + Math.random() * 800;
        state.data.distribusi[y] = {
            'PERTANIAN': 10 + Math.random() * 3,
            'INDUSTRI': 10 + Math.random() * 3,
            'KONSTRUKSI': 17 + Math.random() * 3,
            'PERDAGANGAN': 23 + Math.random() * 4,
            'JASA': 30 + Math.random() * 5
        };
    });
}

// ===== UI FUNCTIONS =====
function enableControls() {
    document.getElementById('menuGrafik').disabled = false;
    document.getElementById('filterTahun').disabled = false;
    document.getElementById('btnDownload').disabled = false;
}

function populateFilters() {
    const menu = document.getElementById('menuGrafik');
    const filter = document.getElementById('filterTahun');
    
    menu.innerHTML = `
        <option value="laju">LAJU PERTUMBUHAN EKONOMI (GARIS)</option>
        <option value="nilai">NILAI ADHB & ADHK (BATANG)</option>
        <option value="distribusi">DISTRIBUSI ADHB (PIE)</option>
    `;
    
    filter.innerHTML = '';
    
    if (menu.value === 'distribusi') {
        [...state.years].reverse().forEach(y => {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = 'Tahun ' + y;
            filter.add(opt);
        });
    } else {
        const last = state.years[state.years.length - 1];
        const first = state.years[0];
        const ranges = [
            { t: '2021 - ' + last, v: '2021-' + last },
            { t: '2016 - 2020', v: '2016-2020' },
            { t: first + ' - 2015', v: first + '-2015' }
        ];
        ranges.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r.v;
            opt.textContent = r.t;
            filter.add(opt);
        });
    }
}

function handleFilterChange() {
    populateFilters();
    updateChart();
}

function getYears(range) {
    if (range.includes('-')) {
        const [s, e] = range.split('-').map(Number);
        return Array.from({length: e-s+1}, (_, i) => String(s+i));
    }
    return [range];
}

// ===== CHART =====
function updateChart() {
    if (!state.loaded) return;
    
    const ctx = document.getElementById('mainChart').getContext('2d');
    const menu = document.getElementById('menuGrafik').value;
    const periode = document.getElementById('filterTahun').value;
    const labels = getYears(periode);
    const isDark = document.body.classList.contains('dark');
    
    if (state.chart) { state.chart.destroy(); state.chart = null; }
    
    const textColor = isDark ? '#eee' : '#333';
    const gridColor = isDark ? '#444' : '#ddd';
    const dataLabelColor = isDark ? '#000' : '#333';
    const dataLabelBg = isDark ? '#fff' : 'rgba(255,255,255,0.85)';
    
    const baseConfig = {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 600 },
        plugins: {
            legend: { labels: { color: textColor, font: { weight: 'bold' } } },
            tooltip: {
                backgroundColor: 'rgba(30,30,40,0.95)',
                callbacks: {
                    label: (ctx) => {
                        const v = ctx.parsed.y ?? ctx.parsed;
                        if (menu === 'laju') return v.toFixed(2) + '%';
                        if (menu === 'nilai') return 'Rp ' + (v >= 1000 ? (v/1000).toFixed(1) + ' T' : v.toFixed(0) + ' M');
                        if (menu === 'distribusi') return v.toFixed(1) + '%';
                        return v.toLocaleString('id-ID');
                    }
                }
            },
            datalabels: {
                anchor: 'end', align: 'top',
                formatter: (val) => {
                    if (!val && val !== 0) return '';
                    if (menu === 'laju') return val.toFixed(1) + '%';
                    if (menu === 'nilai') return val >= 1000 ? (val/1000).toFixed(1) + 'T' : val.toFixed(0);
                    if (menu === 'distribusi') return val.toFixed(1) + '%';
                    return val.toLocaleString('id-ID');
                },
                font: { weight: 'bold', size: 10 },
                color: dataLabelColor,
                backgroundColor: dataLabelBg,
                borderRadius: 6,
                padding: 5
            }
        },
        scales: menu !== 'distribusi' ? {
            y: { beginAtZero: true, ticks: { color: textColor }, grid: { color: gridColor } },
            x: { ticks: { color: textColor }, grid: { display: false } }
        } : {}
    };
    
    let config;
    
    if (menu === 'nilai') {
        config = {
            type: 'bar',
             {
                labels: labels,
                datasets: [
                    { label: 'ADHB',  labels.map(t => state.data.adhb[t] || 0), backgroundColor: 'rgba(255,140,0,0.85)', borderColor: '#FF8C00', borderWidth: 2, borderRadius: 6 },
                    { label: 'ADHK',  labels.map(t => state.data.adhk[t] || 0), backgroundColor: 'rgba(39,174,96,0.85)', borderColor: '#27ae60', borderWidth: 2, borderRadius: 6 }
                ]
            },
            options: baseConfig
        };
        config.options.scales.y.ticks.callback = v => (v/1000).toFixed(0) + 'T';
    } else if (menu === 'laju') {
        config = {
            type: 'line',
             {
                labels: labels,
                datasets: [{
                    label: 'LAJU PERTUMBUHAN (%)',
                    data: labels.map(t => state.data.laju[t] || 0),
                    borderColor: '#27ae60',
                    backgroundColor: 'rgba(39,174,96,0.15)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 6,
                    pointBackgroundColor: '#27ae60'
                }]
            },
            options: baseConfig
        };
        config.options.scales.y.ticks.callback = v => v + '%';
    } else {
        const distData = state.data.distribusi[periode] || {};
        config = {
            type: 'doughnut',
             {
                labels: Object.keys(distData),
                datasets: [{
                     Object.values(distData),
                    backgroundColor: ['#FF8C00','#27ae60','#2980b9','#f1c40f','#8e44ad'],
                    borderWidth: 3,
                    borderColor: isDark ? '#1a1f2e' : '#fff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { color: textColor } },
                    datalabels: { 
                        anchor: 'center', align: 'center',
                        formatter: v => v >= 5 ? v.toFixed(1) + '%' : '',
                        color: '#fff', font: { weight: 'bold', size: 11 }
                    }
                },
                cutout: '55%'
            }
        };
    }
    
    Chart.register(ChartDataLabels);
    state.chart = new Chart(ctx, config);
    
    const menuText = document.getElementById('menuGrafik').options[document.getElementById('menuGrafik').selectedIndex].text;
    document.getElementById('judulGrafik').textContent = menuText.split('(')[0].trim() + ' (' + periode + ')';
}

function toggleDarkMode() {
    document.body.classList.toggle('dark');
    if (state.chart) updateChart();
}

function downloadChart() {
    const canvas = document.getElementById('mainChart');
    const link = document.createElement('a');
    link.download = 'Dashboard-Ekonomi-Palu-' + new Date().toISOString().slice(0,10) + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
}

// ===== INIT =====
window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
