<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD EKONOMI KOTA PALU</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</head>

<body>

<div class="controls">
    <select id="menuGrafik" onchange="sesuaikanFilter()">
        <option value="laju">LAJU</option>
        <option value="nilai">ADHB & ADHK</option>
        <option value="distribusi">DISTRIBUSI</option>
    </select>

    <select id="filterTahun" onchange="updateChart()"></select>
</div>

<canvas id="mainChart"></canvas>

<script>
const ctx = document.getElementById('mainChart').getContext('2d');

let currentChart;
let database = { laju: {}, adhb: {}, adhk: {}, distribusi: {} };

const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV7Av7slh5mSdhPbe1pp2ttvv2jCc992JE_t1KaVRBzj0m2_NfYRplK6evfXaG1g/pub?output=csv";

async function fetchData() {
    const res = await fetch(sheetUrl);
    const text = await res.text();

    const rows = text.split('\n').map(r => r.replace('\r','').trim());
    const headerRow = rows.find(r => r.includes('2011'));
    const sep = headerRow.includes(';') ? ';' : ',';

    const data = rows.map(r => r.split(sep));

    let listTahun = [];

    const cleanNum = (v) => {
        if (!v || v === "-" || v === "n.a") return 0;
        let s = v.replace(/\./g,'').replace(',','.');
        return parseFloat(s) || 0;
    };

    data.forEach(cols => {
        const cellA = cols[0] ? cols[0].toUpperCase() : "";

        // ✅ DETEKSI SEMUA TAHUN (GANJIL GENAP)
        if (cols.some(c => c.match(/20\d{2}/)) && listTahun.length === 0) {
            listTahun = cols
                .map(c => {
                    const m = c.match(/20\d{2}/);
                    return m ? m[0] : null;
                })
                .filter(t => t !== null);

            console.log("TAHUN:", listTahun);
        }

        // ✅ LAJU
        if (cellA.includes("LAJU")) {
            listTahun.forEach((t,i)=>{
                database.laju[t] = cleanNum(cols[i+1]);
            });
        }

        // ✅ ADHB
        else if (cellA.includes("ADHB") && !cellA.includes("DISTRIBUSI")) {
            listTahun.forEach((t,i)=>{
                database.adhb[t] = cleanNum(cols[i+1]);
            });
        }

        // ✅ ADHK
        else if (cellA.includes("ADHK")) {
            listTahun.forEach((t,i)=>{
                database.adhk[t] = cleanNum(cols[i+1]);
            });
        }

        // ✅ 🔥 DISTRIBUSI (FIX UTAMA)
        else if (cellA.includes("DISTRIBUSI")) {

            const kategori = cellA
                .replace("DISTRIBUSI","")
                .replace("(%)","")
                .trim();

            if (!database.distribusi[kategori]) {
                database.distribusi[kategori] = {};
            }

            listTahun.forEach((t,i)=>{
                database.distribusi[kategori][t] = cleanNum(cols[i+1]);
            });
        }
    });

    console.log("DISTRIBUSI:", database.distribusi);

    sesuaikanFilter();
}

function sesuaikanFilter(){
    const menu = document.getElementById('menuGrafik').value;
    const filter = document.getElementById('filterTahun');

    filter.innerHTML = "";

    if(menu === 'distribusi'){
        Object.keys(database.laju).forEach(t=>{
            let o = document.createElement('option');
            o.value = t;
            o.text = t;
            filter.add(o);
        });
    } else {
        ["2011-2015","2016-2020","2021-2026"].forEach(r=>{
            let o = document.createElement('option');
            o.value = r;
            o.text = r;
            filter.add(o);
        });
    }

    updateChart();
}

function updateChart(){
    const menu = document.getElementById('menuGrafik').value;
    const periode = document.getElementById('filterTahun').value;

    if(currentChart) currentChart.destroy();

    let labels = [];

    if(periode.includes("-")){
        const [a,b] = periode.split("-").map(Number);
        for(let i=a;i<=b;i++) labels.push(i.toString());
    } else {
        labels=[periode];
    }

    let config = { plugins:[ChartDataLabels] };

    if(menu === 'laju'){
        config.type = 'line';
        config.data = {
            labels,
            datasets:[{
                label:'LAJU',
                data: labels.map(t=>database.laju[t]||0),
                borderColor:'#27ae60'
            }]
        };
    }

    else if(menu === 'nilai'){
        config.type = 'bar';
        config.data = {
            labels,
            datasets:[
                {label:'ADHB', data: labels.map(t=>database.adhb[t]||0)},
                {label:'ADHK', data: labels.map(t=>database.adhk[t]||0)}
            ]
        };
    }

    else if(menu === 'distribusi'){
        const thn = periode;

        const kategori = Object.keys(database.distribusi);

        const dataPie = kategori.map(k=>{
            return database.distribusi[k] && database.distribusi[k][thn]
                ? database.distribusi[k][thn]
                : 0;
        });

        config.type = 'pie';
        config.data = {
            labels: kategori,
            datasets:[{
                data: dataPie,
                backgroundColor:[
                    '#FF8C00','#27ae60','#3498db','#f1c40f','#9b59b6'
                ]
            }]
        };
    }

    currentChart = new Chart(ctx, config);
}

fetchData();
</script>

</body>
</html>
