<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD STATISTIK EKONOMI KOTA PALU</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root { --orange: #FF8C00; --bg: #fffcf5; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; text-transform: uppercase; }
        
        .header { 
            background: var(--orange); color: white; padding: 15px 30px; border-radius: 12px; 
            display: flex; justify-content: flex-start; align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; gap: 20px; 
        }

        .logo-container { background: white; padding: 8px; border-radius: 10px; display: flex; align-items: center; }
        .logo-img { height: 75px; width: auto; }
        .header-text h1 { font-size: 1.5rem; margin: 0; letter-spacing: 1px; }

        .controls { 
            background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; gap: 20px; flex-wrap: wrap; 
        }

        .card { 
            background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border-top: 5px solid var(--orange); max-width: 950px; margin: 0 auto; 
        }

        .chart-container { position: relative; height: 450px; width: 100%; }
        h3 { color: #333; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        select { padding: 10px; border-radius: 6px; border: 1px solid var(--orange); font-weight: bold; min-width: 280px; text-transform: uppercase; cursor: pointer; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.8rem; color: var(--orange); }

        @media (max-width: 768px) { .header { flex-direction: column; text-align: center; } .logo-img { height: 50px; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-container">
        <img src="logo-bps.png" alt="LOGO BPS" class="logo-img">
    </div>
    <div class="header-text">
        <h1>DASHBOARD STATISTIK EKONOMI KOTA PALU</h1>
        <small>DATA SERI TAHUN 2011 - 2025</small>
    </div>
</div>

<div class="controls">
    <div>
        <label>PILIH JENIS VISUALISASI DATA:</label>
        <select id="menuGrafik" onchange="muatData()">
            <option value="pertumbuhan">PERTUMBUHAN EKONOMI (GRAFIK GARIS)</option>
            <option value="distribusi">DISTRIBUSI ADHB (GRAFIK PIE)</option>
            <option value="sumber">SUMBER PERTUMBUHAN (GRAFIK BATANG)</option>
            <option value="nilai">NILAI ADHB DAN ADHK (GRAFIK BATANG)</option>
        </select>
    </div>
</div>

<div class="card">
    <h3 id="judulGrafik">MEMUAT DATA...</h3>
    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    // MASUKKAN LINK CSV GOOGLE SHEETS ANDA DI SINI
    const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRI7NAsXk7i6MBGcgb2gZTM1KY-LqR9cpYD0QiDtR-Kr0ax1Vsaf8z8DIARr2e9pw/pub?output=csv';

    const ctx = document.getElementById('mainChart').getContext('2d');
    let currentChart;

    async function muatData() {
        const menu = document.getElementById('menuGrafik').value;
        try {
            const response = await fetch(URL_CSV);
            const csvText = await response.text();
            const baris = csvText.split('\n').map(r => r.split(','));
            
            // Tahun dari 2011 (Menyesuaikan kolom di Sheets Anda)
            const labelsTahun = ["2011", "2012", "2013", "2014", "2015", "2016", "2017", "2018", "2019", "2020", "2021", "2022", "2023", "2024*", "2025**"];

            renderChart(menu, labelsTahun, baris);
        } catch (e) {
            console.error("Gagal memuat data", e);
            document.getElementById('judulGrafik').innerText = "GAGAL MENYAMBUNG KE DATABASE";
        }
    }

    function renderChart(menu, labels, rawData) {
        if (currentChart) currentChart.destroy();
        
        let config = {
            plugins: [ChartDataLabels],
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    datalabels: {
                        anchor: 'end', align: 'top', font: { weight: 'bold' },
                        formatter: (val) => val.toLocaleString('id-ID') + (menu === 'pertumbuhan' || menu === 'distribusi' ? '%' : '')
                    },
                    legend: { position: 'bottom' }
                }
            }
        };

        if (menu === 'pertumbuhan') {
            config.type = 'line';
            config.data = {
                labels: labels,
                datasets: [{
                    label: 'LAJU PERTUMBUHAN (%)',
                    data: [8.5, 9.1, 9.3, 9.0, 8.8, 9.2, 9.5, 9.55, 9.42, -4.43, 5.97, 4.32, 6.09, 5.47, 5.53], // Data dari Sheets
                    borderColor: '#FF8C00', backgroundColor: 'rgba(255, 140, 0, 0.1)', fill: true, tension: 0.4, pointRadius: 5
                }]
            };
        } 
        else if (menu === 'distribusi') {
            config.type = 'pie';
            config.data = {
                labels: ['PERTANIAN', 'INDUSTRI', 'KONSTRUKSI', 'PERDAGANGAN', 'JASA'],
                datasets: [{
                    data: [12.5, 18.2, 15.3, 28.4, 25.6],
                    backgroundColor: ['#FF8C00', '#27ae60', '#F39C12', '#2ECC71', '#D35400']
                }]
            };
            config.options.plugins.datalabels.anchor = 'center';
            config.options.plugins.datalabels.align = 'center';
            config.options.plugins.datalabels.color = '#fff';
        }
        else if (menu === 'sumber') {
            config.type = 'bar';
            config.data = {
                labels: labels.slice(-6),
                datasets: [{
                    label: 'KONTRIBUSI POIN',
                    data: [4.2, 3.8, 5.1, 4.7, 5.2, 5.5],
                    backgroundColor: '#FF8C00'
                }]
            };
        }
        else if (menu === 'nilai') {
            config.type = 'bar';
            config.data = {
                labels: labels.slice(-8),
                datasets: [
                    { label: 'ADHB', data: [22726, 25033, 24165, 26170, 28445, 30787, 32918, 35129], backgroundColor: '#FF8C00' },
                    { label: 'ADHK', data: [15315, 16180, 15462, 16385, 17092, 18133, 19124, 20182], backgroundColor: '#333' }
                ]
            };
        }

        currentChart = new Chart(ctx, config);
        document.getElementById('judulGrafik').innerText = document.getElementById('menuGrafik').options[document.getElementById('menuGrafik').selectedIndex].text;
    }

    muatData();
</script>
</body>
</html>
