<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD EKONOMI KOTA PALU</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root { 
            --orange: #FF8C00; --green: #27ae60; --blue: #3498db; --bg: #fffcf5; 
            --text: #333; --card-bg: #ffffff; --border: #eee;
        }
        .dark { 
            --bg: #121212; --text: #eee; --card-bg: #1e1e1e; --border: #333;
        }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); 
            color: var(--text); margin: 0; padding: 20px; text-transform: uppercase; 
            transition: all 0.3s ease;
        }
        .header { 
            background: var(--orange); color: white; padding: 15px 30px; 
            border-radius: 12px; display: flex; align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; gap: 20px; 
        }
        .logo-container { background: white; padding: 8px; border-radius: 10px; display: flex; align-items: center; }
        .logo-img { height: 60px; }
        .controls { 
            background: var(--card-bg); padding: 20px; border-radius: 12px; 
            margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;
        }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: bold; font-size: 0.8rem; color: var(--orange); }
        select { 
            padding: 10px; border-radius: 6px; border: 1px solid var(--orange); 
            font-weight: bold; background: var(--card-bg); color: var(--text); cursor: pointer;
        }
        .btn-group { display: flex; gap: 10px; margin-left: auto; }
        button { 
            padding: 10px 15px; border-radius: 6px; border: none; 
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        .btn-dark { background: #333; color: white; }
        .card { 
            background: var(--card-bg); padding: 25px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid var(--orange);
            max-width: 1000px; margin: 0 auto; 
        }
        .chart-container { position: relative; height: 450px; width: 100%; }
        h3 { color: var(--text); margin-top: 0; padding-bottom: 10px; text-align: center; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body class="light">

<div class="header">
    <div class="logo-container"><img src="logo-bps.png" alt="BPS" class="logo-img"></div>
    <div class="header-text">
        <h1 style="margin:0; font-size: 1.5rem;">DASHBOARD EKONOMI KOTA PALU</h1>
        <small id="status">MENGHUBUNGKAN KE DATABASE...</small>
    </div>
</div>

<div class="controls">
    <div class="control-group">
        <label>JENIS GRAFIK</label>
        <select id="menuGrafik" onchange="sesuaikanFilter()">
            <option value="laju">LAJU PERTUMBUHAN EKONOMI (GARIS)</option>
            <option value="nilai">NILAI PDRB ADHB & ADHK (BATANG)</option>
            <option value="distribusi">DISTRIBUSI PDRB (PIE)</option>
            <option value="sumber">SUMBER PERTUMBUHAN (BATANG)</option>
        </select>
    </div>
    <div class="control-group">
        <label>PILIH PERIODE</label>
        <select id="filterTahun" onchange="updateChart()"></select>
    </div>
    <div class="btn-group">
        <button class="btn-dark" onclick="toggleDarkMode()">MODE TAMPILAN</button>
    </div>
</div>

<div class="card">
    <h3 id="judulGrafik">VISUALISASI DATA</h3>
    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    const ctx = document.getElementById('mainChart').getContext('2d');
    let currentChart;
    let database = { laju: {}, adhb: {}, adhk: {}, distribusi: {}, sumber: {} };
    let listTahun = [];

    // URL CSV dari Google Sheets (Pastikan dipublikasikan sebagai CSV)
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV7Av7slh5mSdhPbe1pp2ttvv2jCc992JE_t1KaVRBzj0m2_NfYRplK6evfXaG1g/pub?output=csv";

    async function fetchData() {
        try {
            const response = await fetch(sheetUrl);
            const csvText = await response.text();
            const rows = csvText.split('\n').map(row => row.replace('\r', '').trim());
            
            // Mencari baris yang mengandung tahun 2011 untuk header
            const headerRowIndex = rows.findIndex(r => r.includes('2011'));
            const dataMatrix = rows.map(row => row.split(','));
            
            // Deteksi Tahun
            if (headerRowIndex !== -1) {
                const headerCols = dataMatrix[headerRowIndex];
                listTahun = headerCols
                    .map(c => c.match(/20\d{2}/) ? c.match(/20\d{2}/)[0] : null)
                    .filter(t => t !== null);
            }

            const cleanNum = (val) => {
                if (!val || ["", "-", "n.a"].includes(val.trim())) return 0;
                let s = val.trim().replace(/\./g, '').replace(',', '.');
                return parseFloat(s) || 0;
            };

            // Mapping Data Lapangan Usaha & Indikator Makro
            dataMatrix.forEach((cols) => {
                const cellA = cols[0] ? cols[0].toUpperCase() : "";

                listTahun.forEach((thn, i) => {
                    const val = cleanNum(cols[i + 1]); // Data biasanya mulai di kolom ke-2
                    
                    if (cellA.includes("LAJU PERTUMBUHAN")) {
                        database.laju[thn] = val;
                    } else if (cellA.includes("ADHB") && !cellA.includes("DISTRIBUSI")) {
                        database.adhb[thn] = val;
                    } else if (cellA.includes("ADHK")) {
                        database.adhk[thn] = val;
                    } else if (cellA.includes("SUMBER PERTUMBUHAN")) {
                        database.sumber[thn] = val;
                    } else if (cellA.includes("DISTRIBUSI")) {
                        const kategori = cellA.replace("DISTRIBUSI", "").replace("(%)", "").trim();
                        if (!database.distribusi[kategori]) database.distribusi[kategori] = {};
                        database.distribusi[kategori][thn] = val;
                    }
                });
            });

            document.getElementById('status').innerText = "DATABASE TERHUBUNG (AKTIF)";
            sesuaikanFilter();
        } catch (error) {
            document.getElementById('status').innerText = "KONEKSI GAGAL";
        }
    }

    function sesuaikanFilter() {
        const menu = document.getElementById('menuGrafik').value;
        const filter = document.getElementById('filterTahun');
        filter.innerHTML = "";

        if (menu === 'distribusi') {
            // Pie Chart: Per Tahun Tunggal
            [...listTahun].reverse().forEach(t => {
                filter.add(new Option(t, t));
            });
        } else {
            // Batang/Garis: Per Rentang Periode
            const opsiRentang = ["2021-2026", "2016-2020", "2011-2015"];
            opsiRentang.forEach(r => filter.add(new Option(r, r)));
        }
        updateChart();
    }

    function updateChart() {
        const menu = document.getElementById('menuGrafik').value;
        const periode = document.getElementById('filterTahun').value;
        const isDark = document.body.classList.contains('dark');
        
        if (currentChart) currentChart.destroy();

        let labels = [];
        if (periode.includes("-")) {
            const [start, end] = periode.split("-").map(Number);
            labels = listTahun.filter(t => parseInt(t) >= start && parseInt(t) <= end);
        } else {
            labels = [periode];
        }

        let config = {
            plugins: [ChartDataLabels],
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: isDark ? '#fff' : '#333' }, position: 'bottom' },
                    datalabels: {
                        color: isDark ? '#fff' : '#444',
                        font: { weight: 'bold', size: 11 },
                        formatter: (val) => val.toLocaleString('id-ID') + (menu === 'laju' || menu === 'distribusi' ? '%' : ''),
                        anchor: 'end', align: 'top'
                    }
                },
                scales: menu !== 'distribusi' ? {
                    y: { grid: { color: isDark ? '#333' : '#eee' }, ticks: { color: isDark ? '#bbb' : '#666' } },
                    x: { ticks: { color: isDark ? '#bbb' : '#666' } }
                } : {}
            }
        };

        if (menu === 'laju') {
            config.type = 'line';
            config.data = {
                labels,
                datasets: [{
                    label: 'LAJU PERTUMBUHAN (%)',
                    data: labels.map(t => database.laju[t] || 0),
                    borderColor: '#27ae60', backgroundColor: 'rgba(39, 174, 96, 0.1)', fill: true, tension: 0.3, pointRadius: 5
                }]
            };
        } else if (menu === 'nilai') {
            config.type = 'bar';
            config.data = {
                labels,
                datasets: [
                    { label: 'ADHB (MIL AR RP)', data: labels.map(t => database.adhb[t] || 0), backgroundColor: '#FF8C00' },
                    { label: 'ADHK (MIL AR RP)', data: labels.map(t => database.adhk[t] || 0), backgroundColor: '#27ae60' }
                ]
            };
        } else if (menu === 'sumber') {
            config.type = 'bar';
            config.data = {
                labels,
                datasets: [{ label: 'SUMBER PERTUMBUHAN (POIN)', data: labels.map(t => database.sumber[t] || 0), backgroundColor: '#3498db' }]
            };
        } else if (menu === 'distribusi') {
            config.type = 'pie';
            const kategori = Object.keys(database.distribusi);
            config.data = {
                labels: kategori,
                datasets: [{
                    data: kategori.map(k => database.distribusi[k][periode] || 0),
                    backgroundColor: ['#FF8C00', '#27ae60', '#3498db', '#f1c40f', '#e74c3c', '#9b59b6']
                }]
            };
            config.options.plugins.datalabels.anchor = 'center';
            config.options.plugins.datalabels.align = 'center';
        }

        currentChart = new Chart(ctx, config);
        document.getElementById('judulGrafik').innerText = menu.replace('_', ' ') + " - PERIODE " + periode;
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark');
        updateChart();
    }

    fetchData();
</script>
</body>
</html>
