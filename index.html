<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD STATISTIK EKONOMI KOTA PALU</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --orange: #FF6B35; 
            --orange-dark: #E85A2D;
            --orange-light: #FF8C61;
            --green: #2ECC71; 
            --green-dark: #27AE60;
            --blue: #3498DB;
            --bg: #F5F7FA; 
            --text: #2C3E50; 
            --card-bg: #FFFFFF; 
            --border: #E8EEF4;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 12px;
        }
        
        .dark { 
            --bg: #0F172A; 
            --text: #F1F5F9; 
            --card-bg: #1E293B; 
            --border: #334155;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(135deg, var(--bg) 0%, #E8EEF4 100%);
            color: var(--text); 
            padding: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 100vh;
            line-height: 1.6;
        }

        .dark body {
            background: linear-gradient(135deg, var(--bg) 0%, #1E293B 100%);
        }

        /* HEADER - Modern Glassmorphism */
        .header { 
            background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
            color: white; 
            padding: 35px 45px; 
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            margin-bottom: 0;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        }

        .header-content {
            display: flex; 
            align-items: center; 
            gap: 30px;
            position: relative;
            z-index: 1;
        }

        .logo-container { 
            background: rgba(255,255,255,0.95); 
            padding: 12px; 
            border-radius: var(--radius);
            display: flex; 
            align-items: center; 
            justify-content: center;
            width: 100px; 
            height: 100px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .logo-container:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 32px rgba(0,0,0,0.2);
        }

        .logo-img { 
            width: 76px; 
            height: 76px; 
            object-fit: contain; 
            display: block; 
        }

        .logo-fallback { display: none; }

        .header-text {
            flex: 1;
        }

        .header-text h1 { 
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0;
            text-shadow: 0 2px 8px rgba(0,0,0,0.1);
            line-height: 1.2;
        }

        .header-text small {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            background: rgba(255,255,255,0.2);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ECC71;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.9); }
        }

        /* CONTROLS - Modern Card */
        .controls { 
            background: var(--card-bg); 
            padding: 28px 35px; 
            margin: 25px auto;
            max-width: 1400px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex; 
            gap: 24px; 
            flex-wrap: wrap; 
            align-items: flex-end;
            border: 1px solid var(--border);
            position: relative;
        }

        .controls::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--orange) 0%, var(--orange-light) 100%);
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .control-group { 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            flex: 1;
            min-width: 240px;
        }

        label { 
            font-weight: 700; 
            font-size: 0.75rem; 
            color: var(--orange);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        label::before {
            content: '▸';
            font-size: 0.9rem;
        }

        select { 
            padding: 14px 18px; 
            border-radius: var(--radius-sm); 
            border: 2px solid var(--border); 
            font-weight: 600; 
            background: var(--bg); 
            color: var(--text); 
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-family: inherit;
        }

        select:hover {
            border-color: var(--orange-light);
            background: var(--card-bg);
        }

        select:focus {
            outline: none;
            border-color: var(--orange);
            box-shadow: 0 0 0 4px rgba(255,107,53,0.12);
            background: var(--card-bg);
        }

        .btn-group { 
            display: flex; 
            gap: 14px; 
            margin-left: auto;
            flex-wrap: wrap;
        }

        button { 
            padding: 14px 28px; 
            border-radius: var(--radius-sm); 
            border: none; 
            font-weight: 700; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        button:active {
            transform: translateY(-1px);
        }

        .btn-download { 
            background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
            color: white;
        }

        .btn-dark { 
            background: linear-gradient(135deg, #64748B 0%, #475569 100%);
            color: white;
        }

        /* CARD - Enhanced */
        .card { 
            background: var(--card-bg); 
            padding: 35px; 
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg); 
            max-width: 1400px; 
            margin: 0 auto 30px;
            position: relative;
            border: 1px solid var(--border);
        }

        h3 { 
            color: var(--text); 
            margin: 0 0 25px 0; 
            padding: 0 0 18px 0; 
            border-bottom: 2px solid var(--border); 
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .chart-container { 
            position: relative; 
            height: 480px; 
            width: 100%;
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 25px;
            border: 1px solid var(--border);
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .header {
                padding: 28px 30px;
            }
            
            .header-text h1 {
                font-size: 1.6rem;
            }
            
            .logo-container {
                width: 85px;
                height: 85px;
            }
            
            .logo-img {
                width: 65px;
                height: 65px;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 25px 20px;
            }
            
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .header-text h1 {
                font-size: 1.4rem;
            }
            
            .logo-container {
                width: 80px;
                height: 80px;
            }
            
            .logo-img {
                width: 60px;
                height: 60px;
            }
            
            .controls { 
                flex-direction: column; 
                gap: 18px;
                padding: 22px;
                margin: 18px;
            }
            
            .control-group {
                width: 100%;
                min-width: unset;
            }
            
            .btn-group { 
                margin-left: 0; 
                width: 100%; 
                justify-content: stretch;
            }
            
            button {
                flex: 1;
                min-width: 120px;
            }
            
            .chart-container {
                height: 320px;
                padding: 15px;
            }
            
            .card {
                padding: 22px;
                margin: 0 18px 22px;
            }
            
            h3 {
                font-size: 1.2rem;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header, .controls, .card {
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .controls { animation-delay: 0.1s; }
        .card { animation-delay: 0.2s; }

        /* Loading State */
        .loading-skeleton {
            background: linear-gradient(90deg, var(--bg) 25%, var(--border) 50%, var(--bg) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: var(--radius-sm);
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="logo-container">
            <img id="bpsLogo" 
                 src="https://raw.githubusercontent.com/zulfikar-coder/dashboard-ekonomi/main/logo-bps.png" 
                 alt="BPS" 
                 class="logo-img"
                 onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';">
            <div id="logoFallback" class="logo-fallback">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width:76px;height:76px;">
                    <rect width="200" height="200" fill="white"/>
                    <path d="M 35 25 L 65 25 L 65 40 L 50 40 L 50 50 L 65 50 L 65 65 L 50 65 L 50 75 L 65 75 L 65 90 L 35 90 Z" fill="#0080D7"/>
                    <path d="M 75 90 L 75 65 L 85 65 C 98 65 105 58 105 45 C 105 32 98 25 85 25 L 75 25 L 75 10 L 85 10 C 105 10 120 25 120 45 C 120 62 108 75 90 78 L 85 78 L 85 90 Z" fill="#009543"/>
                    <path d="M 130 10 L 155 10 L 155 25 C 155 38 145 48 132 48 L 125 48 L 125 40 L 132 40 C 138 40 142 36 142 30 L 142 23 L 125 23 L 125 10 Z M 130 55 L 130 63 C 130 68 134 72 140 72 L 148 72 L 148 80 L 140 80 C 130 80 122 72 122 62 L 122 55 Z M 142 80 L 142 88 C 142 94 138 98 132 98 L 125 98 L 125 106 L 132 106 C 145 106 155 96 155 83 L 155 80 Z" fill="#F48024"/>
                    <path d="M 20 120 Q 40 140, 70 135 Q 100 130, 130 135 Q 160 140, 180 125" stroke="#0080D7" stroke-width="8" fill="none" stroke-linecap="round"/>
                    <path d="M 25 80 Q 45 60, 75 65 Q 105 70, 135 60 Q 165 50, 175 70" stroke="#F48024" stroke-width="6" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
        </div>
        <div class="header-text">
            <h1>DASHBOARD STATISTIK EKONOMI KOTA PALU</h1>
            <small><span class="status-dot"></span><span id="status">MENGHUBUNGKAN KE SPREADSHEET...</span></small>
        </div>
    </div>
</div>

<div class="controls">
    <div class="control-group">
        <label>JENIS GRAFIK</label>
        <select id="menuGrafik" onchange="sesuaikanFilter()">
            <option value="laju">📈 LAJU PERTUMBUHAN EKONOMI (GARIS)</option>
            <option value="nilai">📊 NILAI ADHB & ADHK (BATANG)</option>
            <option value="distribusi">🥧 DISTRIBUSI ADHB (PIE)</option>
        </select>
    </div>
    <div class="control-group">
        <label>PILIH PERIODE</label>
        <select id="filterTahun" onchange="updateChart()"></select>
    </div>
    <div class="btn-group">
        <button class="btn-download" onclick="downloadChart()">📥 UNDUH GRAFIK</button>
        <button class="btn-dark" onclick="toggleDarkMode()">🌙 MODE GELAP</button>
    </div>
</div>

<div class="card">
    <h3 id="judulGrafik">VISUALISASI DATA</h3>
    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
// ===== GLOBAL VARIABLES =====
var ctx = document.getElementById('mainChart').getContext('2d');
var currentChart = null;
var database = { laju: {}, adhb: {}, adhk: {}, distribusi: {} };
var availableYears = [];
var isDataLoaded = false;

// ===== CONFIG =====
var CONFIG = {
    sheetUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV7Av7slh5mSdhPbe1pp2ttvv2jCc992JE_t1KaVRBzj0m2_NfYRplK6evfXaG1g/pub?output=csv",
    timeout: 15000,
    useMockData: true
};

// ===== UTILITY FUNCTIONS =====
function cleanIndonesianNumber(val) {
    if (!val || val === '' || val === '-' || val === 'n.a' || val === 'N/A') return 0;
    var s = String(val).trim().replace(/^"|"$/g, '');
    
    if (s.includes(',') && s.includes('.')) {
        s = s.replace(/\./g, '').replace(',', '.');
    } else if (s.includes(',') && !s.includes('.')) {
        s = s.replace(',', '.');
    } else if (s.includes('.')) {
        var parts = s.split('.');
        if (parts.length > 1 && parts[parts.length - 1].length === 3) {
            s = s.replace(/\./g, '');
        }
    }
    var num = parseFloat(s);
    return isNaN(num) ? 0 : num;
}

function parseCSV(csvText) {
    var rows = csvText.split('\n').map(function(r) { return r.replace('\r', '').trim(); }).filter(function(r) { return r.length > 0; });
    if (rows.length === 0) throw new Error('CSV kosong');
    
    var separator = rows[0].includes(';') ? ';' : ',';
    
    var matrix = rows.map(function(row) {
        var result = [];
        var current = '', inQuotes = false;
        for (var i = 0; i < row.length; i++) {
            var char = row[i];
            if (char === '"') inQuotes = !inQuotes;
            else if (char === separator && !inQuotes) { result.push(current.trim()); current = ''; }
            else current += char;
        }
        result.push(current.trim());
        return result;
    });
    
    var headerIndex = -1;
    for (var i = 0; i < Math.min(10, matrix.length); i++) {
        if (matrix[i].some(function(cell) { return /^\d{4}$/.test(cell.trim()); })) { 
            headerIndex = i; 
            break; 
        }
    }
    if (headerIndex === -1) throw new Error('Header tahun tidak ditemukan');
    
    var headers = matrix[headerIndex].map(function(h) { return h.trim().replace(/\*/g, ''); });
    var years = headers.slice(1).filter(function(h) { return /^\d{4}$/.test(h); });
    if (years.length === 0) throw new Error('Tidak ada kolom tahun valid');
    
    return { matrix: matrix, headers: headers, years: years };
}

function extractData(matrix, headers, years) {
    var data = { laju: {}, adhb: {}, adhk: {}, distribusi: {} };
    
    years.forEach(function(year) {
        data.distribusi[year] = {};
    });
    
    matrix.forEach(function(cols) {
        if (headers.some(function(h) { return cols[0] && cols[0].trim() === h; })) return;
        var label = (cols[0] || '').trim().toUpperCase();
        if (!label) return;
        
        years.forEach(function(year, idx) {
            var value = cleanIndonesianNumber(cols[idx + 1]);
            
            if (label.includes('LAJU') && label.includes('PERTUMBUHAN')) {
                data.laju[year] = value;
            } else if (label.includes('ADHB') && !label.includes('DISTRIBUSI')) {
                data.adhb[year] = value;
            } else if (label.includes('ADHK')) {
                data.adhk[year] = value;
            } else if (label.includes('DISTRIBUSI')) {
                var match = label.match(/DISTRIBUSI\s+([^\(]+)/i);
                if (match) {
                    var sector = match[1].trim().toUpperCase();
                    if (sector && value !== 0) {
                        if (!data.distribusi[year]) data.distribusi[year] = {};
                        data.distribusi[year][sector] = value;
                    }
                }
            }
        });
    });
    
    years.forEach(function(year) {
        if (Object.keys(data.distribusi[year]).length === 0) {
            data.distribusi[year] = {
                'PERTANIAN': 11.9, 'INDUSTRI': 11.3, 'KONSTRUKSI': 18.8,
                'PERDAGANGAN': 25.5, 'JASA': 32.5
            };
        }
    });
    
    return data;
}

function generateMockData() {
    var years = ['2011','2012','2013','2014','2015','2016','2017','2018','2019','2020','2021','2022','2023','2024','2025','2026'];
    var data = { laju: {}, adhb: {}, adhk: {}, distribusi: {} };
    
    years.forEach(function(y, i) {
        data.laju[y] = Math.max(-2, Math.min(10, 5 + Math.sin(i/2)*2.5 + (Math.random()-0.5)*1.5));
        data.adhb[y] = 10000 + i * 1200 + Math.random() * 1500;
        data.adhk[y] = 7500 + i * 900 + Math.random() * 1000;
        data.distribusi[y] = {
            'PERTANIAN': 10 + Math.random() * 3,
            'INDUSTRI': 10 + Math.random() * 3,
            'KONSTRUKSI': 17 + Math.random() * 3,
            'PERDAGANGAN': 23 + Math.random() * 4,
            'JASA': 30 + Math.random() * 5
        };
    });
    
    return { data: data, years: years };
}

async function fetchData() {
    var statusEl = document.getElementById('status');
    try {
        statusEl.textContent = "MENGUNDUH DATA DARI GOOGLE SHEETS...";
        var controller = new AbortController();
        var timeoutId = setTimeout(function() { controller.abort(); }, CONFIG.timeout);
        var response = await fetch(CONFIG.sheetUrl, { signal: controller.signal, headers: { 'Cache-Control': 'no-cache' } });
        clearTimeout(timeoutId);
        if (!response.ok) throw new Error('HTTP ' + response.status);
        
        var csvText = await response.text();
        if (!csvText || csvText.length < 100) throw new Error('Data CSV tidak valid');
        
        var parsed = parseCSV(csvText);
        database = extractData(parsed.matrix, parsed.headers, parsed.years);
        availableYears = parsed.years;
        
        if (availableYears.length === 0) throw new Error('Tidak ada data tahun');
        
        statusEl.textContent = "DATABASE TERHUBUNG (AKTIF) - " + availableYears.length + " TAHUN";
        isDataLoaded = true;
        sesuaikanFilter();
        
    } catch (error) {
        console.error('Fetch error:', error.message);
        if (CONFIG.useMockData) {
            statusEl.textContent = "MODE SIMULASI - DATA CONTOH";
            var mock = generateMockData();
            database = mock.data;
            availableYears = mock.years;
            isDataLoaded = true;
            sesuaikanFilter();
        } else {
            statusEl.textContent = "KONEKSI GAGAL: " + error.message;
        }
    }
}

function sesuaikanFilter() {
    var menu = document.getElementById('menuGrafik').value;
    var filter = document.getElementById('filterTahun');
    filter.innerHTML = ""; 
    
    if (menu === 'distribusi') {
        var years = availableYears.filter(function(t) { return t && t.length === 4; }).reverse();
        years.forEach(function(t) { 
            var el = document.createElement("option"); 
            el.text = "📅 Tahun " + t; el.value = t; 
            filter.add(el); 
        });
        if (filter.options.length === 0) { 
            var el = document.createElement("option"); 
            el.text = "📅 Tahun 2024"; el.value = "2024"; 
            filter.add(el); 
        }
    } else {
        var lastYear = availableYears[availableYears.length - 1] || '2026';
        var firstYear = availableYears[0] || '2011';
        var opsi = [
            {text: "📊 2021 - " + lastYear, val: "2021-" + lastYear}, 
            {text: "📊 2016 - 2020", val: "2016-2020"}, 
            {text: "📊 " + firstYear + " - 2015", val: firstYear + "-2015"}
        ];
        opsi.forEach(function(o) { 
            var el = document.createElement("option"); 
            el.text = o.text; el.value = o.val; 
            filter.add(el); 
        });
    }
    updateChart();
}

function getYearsInRange(range) {
    if (range.includes("-")) {
        var parts = range.split("-");
        var start = parseInt(parts[0]);
        var end = parseInt(parts[1]);
        var labels = [];
        for(var i = start; i <= end; i++) labels.push(i.toString());
        return labels;
    }
    return [range];
}

function updateChart() {
    if (!isDataLoaded) return;
    
    var menu = document.getElementById('menuGrafik').value;
    var periode = document.getElementById('filterTahun').value;
    
    if (currentChart) { currentChart.destroy(); currentChart = null; }
    
    var labels = getYearsInRange(periode);
    var isDark = document.body.classList.contains('dark');
    var textColor = isDark ? '#F1F5F9' : '#2C3E50';
    var gridColor = isDark ? '#334155' : '#E8EEF4';
    
    var dataLabelColor = isDark ? '#000000' : '#2C3E50';
    var dataLabelBg = isDark ? '#FFFFFF' : 'rgba(255,255,255,0.9)';
    var dataLabelBorder = isDark ? '#FFFFFF' : 'rgba(200,200,200,0.5)';

    var baseConfig = {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 1000, easing: 'easeOutQuart' },
        plugins: {
            legend: { 
                labels: { 
                    color: textColor, 
                    font: { weight: '600', size: 11, family: 'Inter' },
                    padding: 15
                } 
            },
            tooltip: {
                backgroundColor: isDark ? 'rgba(15,23,42,0.95)' : 'rgba(255,255,255,0.98)',
                titleColor: textColor,
                bodyColor: textColor,
                borderColor: isDark ? '#334155' : '#E8EEF4',
                borderWidth: 1,
                padding: 14,
                cornerRadius: 10,
                titleFont: { weight: '700', size: 13, family: 'Inter' },
                bodyFont: { weight: '500', size: 12, family: 'Inter' },
                callbacks: {
                    label: function(ctx) {
                        var v = ctx.parsed.y !== undefined ? ctx.parsed.y : ctx.parsed;
                        if (menu === 'laju') return ' ' + v.toFixed(2) + '%';
                        if (menu === 'nilai') return ' Rp ' + (v >= 1000 ? (v/1000).toFixed(1)+' T' : v.toFixed(0)+' M');
                        if (menu === 'distribusi') return ' ' + v.toFixed(1) + '%';
                        return ' ' + v.toLocaleString('id-ID');
                    }
                }
            },
            datalabels: {
                anchor: 'end', align: 'top',
                formatter: function(val) {
                    if (!val && val !== 0) return '';
                    if (menu === 'laju') return val.toFixed(1) + '%';
                    if (menu === 'nilai') return val >= 1000 ? (val/1000).toFixed(1)+'T' : val.toFixed(0);
                    if (menu === 'distribusi') return val.toFixed(1) + '%';
                    return val.toLocaleString('id-ID');
                },
                font: { weight: '700', size: 10, family: 'Inter' },
                color: dataLabelColor,
                backgroundColor: dataLabelBg,
                borderColor: dataLabelBorder,
                borderWidth: 1,
                borderRadius: 6,
                padding: 6
            }
        },
        scales: menu !== 'distribusi' ? {
            y: { 
                beginAtZero: true, 
                ticks: { color: textColor, font: { size: 10, family: 'Inter' } }, 
                grid: { color: gridColor, drawBorder: false } 
            },
            x: { 
                ticks: { color: textColor, font: { size: 10, family: 'Inter' } }, 
                grid: { display: false, drawBorder: false } 
            }
        } : {}
    };

    var config;
    if (menu === 'nilai') {
        var adhbData = labels.map(function(t) { return database.adhb[t] || 0; });
        var adhkData = labels.map(function(t) { return database.adhk[t] || 0; });
        
        config = {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { 
                        label: 'ADHB', 
                        data: adhbData, 
                        backgroundColor: 'rgba(255,107,53,0.85)', 
                        borderColor: '#FF6B35', 
                        borderWidth: 2, 
                        borderRadius: 8, 
                        borderSkipped: false 
                    },
                    { 
                        label: 'ADHK', 
                        data: adhkData, 
                        backgroundColor: 'rgba(46,204,113,0.85)', 
                        borderColor: '#2ECC71', 
                        borderWidth: 2, 
                        borderRadius: 8, 
                        borderSkipped: false 
                    }
                ]
            },
            options: JSON.parse(JSON.stringify(baseConfig))
        };
        config.options.scales.y.ticks.callback = function(v) { return (v/1000).toFixed(0)+'T'; };
    } else if (menu === 'laju') {
        var lajuData = labels.map(function(t) { return database.laju[t] || 0; });
        
        config = {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'LAJU PERTUMBUHAN (%)', 
                    data: lajuData,
                    borderColor: '#2ECC71', 
                    backgroundColor: 'rgba(46,204,113,0.12)', 
                    borderWidth: 3, 
                    fill: true, 
                    tension: 0.4,
                    pointRadius: 7, 
                    pointBackgroundColor: '#2ECC71', 
                    pointBorderColor: isDark ? '#1E293B' : '#FFFFFF', 
                    pointBorderWidth: 3, 
                    pointHoverRadius: 10,
                    pointHoverBackgroundColor: '#2ECC71',
                    pointHoverBorderColor: isDark ? '#1E293B' : '#FFFFFF',
                    pointHoverBorderWidth: 3
                }]
            },
            options: JSON.parse(JSON.stringify(baseConfig))
        };
        config.options.scales.y.ticks.callback = function(v) { return v+'%'; };
    } else if (menu === 'distribusi') {
        var selectedYear = periode;
        var distribusiData = database.distribusi[selectedYear] || {};
        
        if (Object.keys(distribusiData).length === 0) {
            distribusiData = {
                'PERTANIAN': 11.9, 'INDUSTRI': 11.3, 'KONSTRUKSI': 18.8,
                'PERDAGANGAN': 25.5, 'JASA': 32.5
            };
        }
        
        config = {
            type: 'doughnut',
            data: {
                labels: Object.keys(distribusiData),
                datasets: [{
                    data: Object.values(distribusiData),
                    backgroundColor: ['#FF6B35','#2ECC71','#3498DB','#F1C40F','#9B59B6'],
                    borderColor: isDark ? '#1E293B' : '#FFFFFF',
                    borderWidth: 4,
                    hoverOffset: 15,
                    hoverBorderColor: isDark ? '#FFFFFF' : '#2C3E50',
                    hoverBorderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { 
                    duration: 1200,
                    animateScale: true,
                    animateRotate: true
                },
                plugins: {
                    legend: { 
                        position: 'bottom', 
                        labels: { 
                            color: textColor, 
                            font: { weight: '600', size: 10, family: 'Inter' }, 
                            padding: 18,
                            usePointStyle: true,
                            pointStyle: 'circle'
                        } 
                    },
                    tooltip: { 
                        backgroundColor: isDark ? 'rgba(15,23,42,0.95)' : 'rgba(255,255,255,0.98)',
                        callbacks: { 
                            label: function(ctx) { 
                                return ' ' + ctx.parsed.toFixed(1) + '%'; 
                            } 
                        },
                        cornerRadius: 10,
                        padding: 14
                    },
                    datalabels: { 
                        anchor: 'center', 
                        align: 'center', 
                        formatter: function(v) { 
                            return v >= 5 ? v.toFixed(1)+'%' : ''; 
                        }, 
                        font: { weight: '700', size: 11, family: 'Inter' }, 
                        color: '#FFFFFF',
                        textShadow: 2
                    }
                },
                cutout: '60%'
            }
        };
    }

    Chart.register(ChartDataLabels);
    currentChart = new Chart(ctx, config);
    
    var menuText = document.getElementById('menuGrafik').options[document.getElementById('menuGrafik').selectedIndex].text;
    document.getElementById('judulGrafik').textContent = menuText.split('(')[0].trim() + " (" + periode + ")";
}

function toggleDarkMode() {
    document.body.classList.toggle('dark');
    if (currentChart) updateChart();
}

function downloadChart() {
    var canvas = document.getElementById('mainChart');
    if (!canvas) return;
    var link = document.createElement('a');
    link.download = 'Dashboard-Ekonomi-Palu-' + new Date().toISOString().slice(0,10) + '.png';
    link.href = canvas.toDataURL('image/png', 1.0);
    link.click();
}

function init() {
    if (typeof ChartDataLabels !== 'undefined') Chart.register(ChartDataLabels);
    
    var logoImg = document.getElementById('bpsLogo');
    logoImg.onerror = function() {
        this.style.display = 'none';
        document.getElementById('logoFallback').style.display = 'block';
    };
    
    fetchData();
    document.addEventListener('keydown', function(e) { 
        if (e.ctrlKey && e.key === 's') { e.preventDefault(); downloadChart(); } 
    });
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
</body>
</html>
