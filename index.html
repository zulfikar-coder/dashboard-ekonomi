<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD STATISTIK EKONOMI KOTA PALU</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <style>
        :root { 
            --orange: #FF8C00; --green: #27ae60; --bg: #fffcf5; 
            --text: #333; --card-bg: #ffffff; --border: #eee;
        }
        
        .dark { 
            --bg: #121212; --text: #eee; --card-bg: #1e1e1e; --border: #333;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); 
            color: var(--text); margin: 0; padding: 20px; text-transform: uppercase; 
            transition: all 0.3s ease;
        }

        .header { 
            background: var(--orange); color: white; padding: 15px 30px; 
            border-radius: 12px; display: flex; align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; gap: 20px; 
        }

        .logo-container { 
            background: white; padding: 8px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center;
            width: 85px; height: 85px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .logo-img { 
            width: 70px; height: 70px; object-fit: contain; display: block; 
        }
        .logo-fallback {
            display: none; width: 100%; height: 100%;
        }

        .controls { 
            background: var(--card-bg); padding: 20px; border-radius: 12px; 
            margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: bold; font-size: 0.8rem; color: var(--orange); }

        select { 
            padding: 10px; border-radius: 6px; border: 1px solid var(--orange); 
            font-weight: bold; background: var(--card-bg); color: var(--text); cursor: pointer;
        }

        .btn-group { display: flex; gap: 10px; margin-left: auto; }
        button { 
            padding: 10px 15px; border-radius: 6px; border: none; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn-download { background: var(--green); color: white; }
        .btn-dark { background: #333; color: white; }

        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid var(--orange);
            max-width: 900px; margin: 0 auto; 
        }

        .chart-container { position: relative; height: 400px; width: 100%; }
        h3 { color: var(--text); margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; text-align: center; }

        @media (max-width: 768px) {
            .btn-group { margin-left: 0; width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-container">
        <!-- Logo BPS dengan SVG Fallback yang AKURAT -->
        <img id="bpsLogo" 
             src="https://palukota.bps.go.id/backend/images/logo-bps.png" 
             alt="BPS" 
             class="logo-img"
             onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';">
        
        <!-- Fallback SVG Logo BPS - DESAIN AKURAT -->
        <div id="logoFallback" class="logo-fallback">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Background putih -->
                <rect width="200" height="200" fill="white"/>
                
                <!-- Huruf B (Biru #0080D7) -->
                <path d="M 35 25 L 65 25 L 65 40 L 50 40 L 50 50 L 65 50 L 65 65 L 50 65 L 50 75 L 65 75 L 65 90 L 35 90 Z" 
                      fill="#0080D7"/>
                
                <!-- Huruf P (Hijau #009543) -->
                <path d="M 75 90 L 75 65 L 85 65 C 98 65 105 58 105 45 C 105 32 98 25 85 25 L 75 25 L 75 10 L 85 10 C 105 10 120 25 120 45 C 120 62 108 75 90 78 L 85 78 L 85 90 Z" 
                      fill="#009543"/>
                
                <!-- Huruf S (Oranye #F48024) -->
                <path d="M 130 10 L 155 10 L 155 25 C 155 38 145 48 132 48 L 125 48 L 125 40 L 132 40 C 138 40 142 36 142 30 L 142 23 L 125 23 L 125 10 Z M 130 55 L 130 63 C 130 68 134 72 140 72 L 148 72 L 148 80 L 140 80 C 130 80 122 72 122 62 L 122 55 Z M 142 80 L 142 88 C 142 94 138 98 132 98 L 125 98 L 125 106 L 132 106 C 145 106 155 96 155 83 L 155 80 Z" 
                      fill="#F48024"/>
                
                <!-- Kurva/elips biru (bawah kiri ke kanan) -->
                <path d="M 20 120 Q 40 140, 70 135 Q 100 130, 130 135 Q 160 140, 180 125" 
                      stroke="#0080D7" stroke-width="8" fill="none" stroke-linecap="round"/>
                
                <!-- Kurva/elips oranye (atas kiri ke kanan) -->
                <path d="M 25 80 Q 45 60, 75 65 Q 105 70, 135 60 Q 165 50, 175 70" 
                      stroke="#F48024" stroke-width="6" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
    </div>
    <div class="header-text">
        <h1>DASHBOARD STATISTIK EKONOMI KOTA PALU</h1>
        <small id="status">MENGHUBUNGKAN KE SPREADSHEET...</small>
    </div>
</div>

<div class="controls">
    <div class="control-group">
        <label>JENIS GRAFIK</label>
        <select id="menuGrafik" onchange="sesuaikanFilter()">
            <option value="laju">LAJU PERTUMBUHAN EKONOMI (GARIS)</option>
            <option value="nilai">NILAI ADHB & ADHK (BATANG)</option>
            <option value="distribusi">DISTRIBUSI ADHB (PIE)</option>
        </select>
    </div>
    <div class="control-group">
        <label>PILIH PERIODE</label>
        <select id="filterTahun" onchange="updateChart()"></select>
    </div>
    <div class="btn-group">
        <button class="btn-download" onclick="downloadChart()">UNDUH GRAFIK</button>
        <button class="btn-dark" onclick="toggleDarkMode()">MODE GELAP</button>
    </div>
</div>

<div class="card">
    <h3 id="judulGrafik">VISUALISASI DATA</h3>
    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
// ===== GLOBAL VARIABLES =====
const ctx = document.getElementById('mainChart').getContext('2d');
let currentChart = null;
let database = { laju: {}, adhb: {}, adhk: {}, distribusi: {} };
let availableYears = [];
let isDataLoaded = false;

// ===== CONFIG =====
const CONFIG = {
    sheetUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV7Av7slh5mSdhPbe1pp2ttvv2jCc992JE_t1KaVRBzj0m2_NfYRplK6evfXaG1g/pub?output=csv",
    timeout: 15000,
    useMockData: true
};

// ===== UTILITY: Clean Indonesian Number Format =====
function cleanIndonesianNumber(val) {
    if (!val || val === '' || val === '-' || val === 'n.a' || val === 'N/A') return 0;
    let s = String(val).trim().replace(/^"|"$/g, '');
    
    if (s.includes(',') && s.includes('.')) {
        s = s.replace(/\./g, '').replace(',', '.');
    } else if (s.includes(',') && !s.includes('.')) {
        s = s.replace(',', '.');
    } else if (s.includes('.')) {
        const parts = s.split('.');
        if (parts.length > 1 && parts[parts.length - 1].length === 3) {
            s = s.replace(/\./g, '');
        }
    }
    const num = parseFloat(s);
    return isNaN(num) ? 0 : num;
}

// ===== UTILITY: Parse CSV =====
function parseCSV(csvText) {
    const rows = csvText.split('\n').map(r => r.replace('\r', '').trim()).filter(r => r.length > 0);
    if (rows.length === 0) throw new Error('CSV kosong');
    
    const separator = rows[0].includes(';') ? ';' : ',';
    
    const matrix = rows.map(row => {
        const result = [];
        let current = '', inQuotes = false;
        for (let char of row) {
            if (char === '"') inQuotes = !inQuotes;
            else if (char === separator && !inQuotes) { result.push(current.trim()); current = ''; }
            else current += char;
        }
        result.push(current.trim());
        return result;
    });
    
    let headerIndex = -1;
    for (let i = 0; i < Math.min(10, matrix.length); i++) {
        if (matrix[i].some(cell => /^\d{4}$/.test(cell.trim()))) { headerIndex = i; break; }
    }
    if (headerIndex === -1) throw new Error('Header tahun tidak ditemukan');
    
    const headers = matrix[headerIndex].map(h => h.trim().replace(/\*/g, ''));
    const years = headers.slice(1).filter(h => /^\d{4}$/.test(h));
    if (years.length === 0) throw new Error('Tidak ada kolom tahun valid');
    
    console.log('✅ Tahun ditemukan:', years);
    return { matrix, headers, years };
}

// ===== UTILITY: Extract Data =====
function extractData(matrix, headers, years) {
    const data = { laju: {}, adhb: {}, adhk: {}, distribusi: {} };
    
    matrix.forEach((cols) => {
        if (headers.some(h => cols[0] && cols[0].trim() === h)) return;
        const label = (cols[0] || '').trim().toUpperCase();
        if (!label) return;
        
        years.forEach((year, idx) => {
            const value = cleanIndonesianNumber(cols[idx + 1]);
            if (label.includes('LAJU') && label.includes('PERTUMBUHAN')) data.laju[year] = value;
            else if (label.includes('ADHB') && !label.includes('DISTRIBUSI')) data.adhb[year] = value;
            else if (label.includes('ADHK')) data.adhk[year] = value;
            else if (label.includes('DISTRIBUSI')) {
                const match = label.match(/DISTRIBUSI\s+([^\(]+)/i);
                if (match) {
                    const sector = match[1].trim().toUpperCase();
                    if (sector && !data.distribusi[sector]) data.distribusi[sector] = value;
                }
            }
        });
    });
    
    if (Object.keys(data.distribusi).length === 0) {
        data.distribusi = { 'PERTANIAN': 11.9, 'INDUSTRI': 11.3, 'KONSTRUKSI': 18.8, 'PERDAGANGAN': 25.5, 'JASA': 32.5 };
    }
    return data;
}

// ===== MOCK DATA FALLBACK =====
function generateMockData() {
    const years = ['2011','2012','2013','2014','2015','2016','2017','2018','2019','2020','2021','2022','2023','2024','2025','2026'];
    const data = { laju: {}, adhb: {}, adhk: {}, distribusi: {} };
    years.forEach((y, i) => {
        data.laju[y] = Math.max(-2, Math.min(10, 5 + Math.sin(i/2)*2.5 + (Math.random()-0.5)*1.5));
        data.adhb[y] = 10000 + i * 1200 + Math.random() * 1500;
        data.adhk[y] = 7500 + i * 900 + Math.random() * 1000;
    });
    data.distribusi = { 'PERTANIAN': 11.9, 'INDUSTRI': 11.3, 'KONSTRUKSI': 18.8, 'PERDAGANGAN': 25.5, 'JASA': 32.5 };
    return { data, years };
}

// ===== FETCH DATA =====
async function fetchData() {
    const statusEl = document.getElementById('status');
    try {
        statusEl.innerText = "MENGUNDUH DATA DARI GOOGLE SHEETS...";
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), CONFIG.timeout);
        const response = await fetch(CONFIG.sheetUrl, { signal: controller.signal, headers: { 'Cache-Control': 'no-cache' } });
        clearTimeout(timeoutId);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const csvText = await response.text();
        if (!csvText || csvText.length < 100) throw new Error('Data CSV tidak valid');
        
        const { matrix, headers, years } = parseCSV(csvText);
        database = extractData(matrix, headers, years);
        availableYears = years;
        
        if (availableYears.length === 0) throw new Error('Tidak ada data tahun');
        
        console.log('✅ Data loaded:', availableYears);
        statusEl.innerText = "DATABASE TERHUBUNG (AKTIF) • " + availableYears.length + " TAHUN";
        isDataLoaded = true;
        sesuaikanFilter();
        
    } catch (error) {
        console.error('❌ Fetch error:', error.message);
        if (CONFIG.useMockData) {
            console.log('🔄 Using mock data fallback...');
            statusEl.innerText = "MODE SIMULASI • DATA CONTOH";
            const mock = generateMockData();
            database = mock.data;
            availableYears = mock.years;
            isDataLoaded = true;
            sesuaikanFilter();
        } else {
            statusEl.innerText = "KONEKSI GAGAL: " + error.message;
        }
    }
}

// ===== FILTER FUNCTIONS =====
function sesuaikanFilter() {
    const menu = document.getElementById('menuGrafik').value;
    const filter = document.getElementById('filterTahun');
    filter.innerHTML = ""; 
    
    if (menu === 'distribusi') {
        const years = availableYears.filter(t => t && t.length === 4).reverse();
        years.forEach(t => { let el = document.createElement("option"); el.text = t; el.value = t; filter.add(el); });
        if (filter.options.length === 0) { let el = document.createElement("option"); el.text = "2024"; el.value = "2024"; filter.add(el); }
    } else {
        const lastYear = availableYears[availableYears.length - 1] || '2026';
        const firstYear = availableYears[0] || '2011';
        const opsi = [
            {text: "2021 - " + lastYear, val: "2021-" + lastYear}, 
            {text: "2016 - 2020", val: "2016-2020"}, 
            {text: firstYear + " - 2015", val: firstYear + "-2015"}
        ];
        opsi.forEach(o => { let el = document.createElement("option"); el.text = o.text; el.value = o.val; filter.add(el); });
    }
    updateChart();
}

function getYearsInRange(range) {
    if (range.includes("-")) {
        const [start, end] = range.split("-").map(Number);
        const labels = [];
        for(let i = start; i <= end; i++) labels.push(i.toString());
        return labels;
    }
    return [range];
}

// ===== CHART RENDER =====
function updateChart() {
    if (!isDataLoaded) return;
    
    const menu = document.getElementById('menuGrafik').value;
    const periode = document.getElementById('filterTahun').value;
    
    if (currentChart) { currentChart.destroy(); currentChart = null; }
    
    const labels = getYearsInRange(periode);
    const isDark = document.body.classList.contains('dark');
    const textColor = isDark ? '#eee' : '#333';
    const gridColor = isDark ? '#444' : '#ddd';
    
    // 🌙 FIX: Angka HITAM + background PUTIH di mode gelap
    const dataLabelColor = isDark ? '#000000' : '#333333';
    const dataLabelBg = isDark ? '#FFFFFF' : 'rgba(255,255,255,0.85)';
    const dataLabelBorder = isDark ? '#FFFFFF' : 'rgba(200,200,200,0.5)';

    const baseConfig = {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 800, easing: 'easeOutQuart' },
        plugins: {
            legend: { labels: { color: textColor, font: { weight: 'bold', size: 10 } } },
            tooltip: {
                backgroundColor: 'rgba(30,30,40,0.95)', titleColor: '#fff', bodyColor: '#eee',
                borderColor: isDark ? '#555' : '#ddd', borderWidth: 1, padding: 10,
                callbacks: {
                    label: function(ctx) {
                        let v = ctx.parsed.y !== undefined ? ctx.parsed.y : ctx.parsed;
                        if (menu === 'laju') return ' ' + v.toFixed(2) + '%';
                        if (menu === 'nilai') return ' Rp ' + (v >= 1000 ? (v/1000).toFixed(1)+' T' : v.toFixed(0)+' M');
                        if (menu === 'distribusi') return ' ' + v.toFixed(1) + '%';
                        return ' ' + v.toLocaleString('id-ID');
                    }
                }
            },
            datalabels: {
                anchor: 'end', align: 'top',
                formatter: function(val) {
                    if (!val && val !== 0) return '';
                    if (menu === 'laju') return val.toFixed(1) + '%';
                    if (menu === 'nilai') return val >= 1000 ? (val/1000).toFixed(1)+'T' : val.toFixed(0);
                    if (menu === 'distribusi') return val.toFixed(1) + '%';
                    return val.toLocaleString('id-ID');
                },
                font: { weight: 'bold', size: 10 },
                color: dataLabelColor,
                backgroundColor: dataLabelBg,
                borderColor: dataLabelBorder,
                borderWidth: 1,
                borderRadius: 6,
                padding: 5
            }
        },
        scales: menu !== 'distribusi' ? {
            y: { beginAtZero: true, ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor } },
            x: { ticks: { color: textColor, font: { size: 10 } }, grid: { display: false } }
        } : {}
    };

    let config;
    if (menu === 'nilai') {
        config = {
            type: 'bar',
             {
                labels: labels,
                datasets: [
                    { label: 'ADHB',  labels.map(t => database.adhb[t] || 0), backgroundColor: 'rgba(255,140,0,0.85)', borderColor: '#FF8C00', borderWidth: 2, borderRadius: 6, borderSkipped: false },
                    { label: 'ADHK', data: labels.map(t => database.adhk[t] || 0), backgroundColor: 'rgba(39,174,96,0.85)', borderColor: '#27ae60', borderWidth: 2, borderRadius: 6, borderSkipped: false }
                ]
            },
            options: { ...baseConfig, scales: { ...baseConfig.scales, y: { ...baseConfig.scales.y, ticks: { ...baseConfig.scales.y.ticks, callback: v => (v/1000).toFixed(0)+'T' } } } }
        };
    } else if (menu === 'laju') {
        config = {
            type: 'line',
             {
                labels: labels,
                datasets: [{
                    label: 'LAJU PERTUMBUHAN (%)', 
                    data: labels.map(t => database.laju[t] || 0),
                    borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,0.15)', borderWidth: 3, fill: true, tension: 0.4,
                    pointRadius: 6, pointBackgroundColor: '#27ae60', pointBorderColor: isDark ? '#fff' : '#27ae60', pointBorderWidth: 2, pointHoverRadius: 8
                }]
            },
            options: { ...baseConfig, scales: { ...baseConfig.scales, y: { ...baseConfig.scales.y, ticks: { ...baseConfig.scales.y.ticks, callback: v => v+'%' } } } }
        };
    } else {
        config = {
            type: 'doughnut',
             {
                labels: Object.keys(database.distribusi),
                datasets: [{  Object.values(database.distribusi), backgroundColor: ['#FF8C00','#27ae60','#2980b9','#f1c40f','#8e44ad'], borderColor: isDark ? '#1e1e1e' : '#fff', borderWidth: 3, hoverOffset: 10 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false, animation: { duration: 1000 },
                plugins: {
                    legend: { position: 'bottom', labels: { color: textColor, font: { weight: 'bold', size: 9 }, padding: 10 } },
                    tooltip: { backgroundColor: 'rgba(30,30,40,0.95)', callbacks: { label: ctx => ' ' + ctx.parsed.toFixed(1) + '%' } },
                    datalabels: { anchor: 'center', align: 'center', formatter: v => v >= 5 ? v.toFixed(1)+'%' : '', font: { weight: 'bold', size: 11 }, color: '#fff' }
                },
                cutout: '55%'
            }
        };
    }

    Chart.register(ChartDataLabels);
    currentChart = new Chart(ctx, config);
    
    const menuText = document.getElementById('menuGrafik').options[document.getElementById('menuGrafik').selectedIndex].text;
    document.getElementById('judulGrafik').innerText = menuText + " (" + periode + ")";
}

// ===== UI FUNCTIONS =====
function toggleDarkMode() {
    document.body.classList.toggle('dark');
    if (currentChart) updateChart();
}

function downloadChart() {
    const canvas = document.getElementById('mainChart');
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = 'Dashboard-Ekonomi-Palu-' + new Date().toISOString().slice(0,10) + '.png';
    link.href = canvas.toDataURL('image/png', 1.0);
    link.click();
}

// ===== INIT =====
function init() {
    console.log('🚀 Dashboard initializing...');
    if (typeof ChartDataLabels !== 'undefined') Chart.register(ChartDataLabels);
    
    // Logo error handler
    const logoImg = document.getElementById('bpsLogo');
    logoImg.onerror = function() {
        console.log('Logo BPS gagal load, menggunakan SVG fallback');
        this.style.display = 'none';
        document.getElementById('logoFallback').style.display = 'block';
    };
    
    fetchData();
    document.addEventListener('keydown', function(e) { 
        if (e.ctrlKey && e.key === 's') { e.preventDefault(); downloadChart(); } 
    });
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
</body>
</html>
