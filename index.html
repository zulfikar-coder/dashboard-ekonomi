<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD EKONOMI KOTA PALU</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root { 
            --orange: #FF8C00; --green: #27ae60; --bg: #fffcf5; 
            --text: #333; --card-bg: #ffffff; --border: #eee;
        }
        .dark { 
            --bg: #121212; --text: #eee; --card-bg: #1e1e1e; --border: #333;
        }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); 
            color: var(--text); margin: 0; padding: 20px; text-transform: uppercase; 
            transition: 0.3s;
        }
        .header { background: var(--orange); color: white; padding: 15px 30px; border-radius: 12px; display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .logo-container { background: white; padding: 5px; border-radius: 8px; }
        .logo-img { height: 50px; }
        .controls { 
            background: var(--card-bg); padding: 20px; border-radius: 12px; 
            margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;
        }
        select { padding: 10px; border-radius: 6px; border: 1px solid var(--orange); background: var(--card-bg); color: var(--text); font-weight: bold; }
        .btn-group { display: flex; gap: 10px; margin-left: auto; }
        button { padding: 10px 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-download { background: var(--green); color: white; }
        .btn-dark { background: #444; color: white; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; border-top: 4px solid var(--orange); box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 900px; margin: 0 auto; }
        .chart-container { position: relative; height: 400px; width: 100%; }
    </style>
</head>
<body class="light">

<div class="header">
    <div class="logo-container"><img src="logo-bps.png" alt="BPS" class="logo-img"></div>
    <div class="header-text"><h1>DASHBOARD EKONOMI KOTA PALU</h1><small id="status">MEMUAT DATABASE...</small></div>
</div>

<div class="controls">
    <div style="display:flex; flex-direction:column; gap:5px;">
        <label style="font-weight:bold; font-size:0.7rem; color:var(--orange);">JENIS GRAFIK</label>
        <select id="menuGrafik" onchange="sesuaikanFilter()">
            <option value="nilai">ADHB & ADHK (BATANG)</option>
            <option value="laju">LAJU PERTUMBUHAN (GARIS)</option>
            <option value="distribusi">DISTRIBUSI PDRB (PIE)</option>
            <option value="sumber">SUMBER PERTUMBUHAN (BATANG)</option>
        </select>
    </div>
    <div style="display:flex; flex-direction:column; gap:5px;">
        <label style="font-weight:bold; font-size:0.7rem; color:var(--orange);">PERIODE</label>
        <select id="filterTahun" onchange="updateChart()"></select>
    </div>
    <div class="btn-group">
        <button class="btn-download" onclick="downloadChart()">UNDUH</button>
        <button class="btn-dark" onclick="toggleDarkMode()">MODE</button>
    </div>
</div>

<div class="card">
    <h3 id="judulGrafik" style="text-align:center; font-size:1rem;">VISUALISASI DATA</h3>
    <div class="chart-container"><canvas id="mainChart"></canvas></div>
</div>

<script>
    const ctx = document.getElementById('mainChart').getContext('2d');
    let currentChart;
    // Inisialisasi database untuk menampung semua indikator
    let database = { laju: {}, adhb: {}, adhk: {}, distribusi: {}, sumber: {} };
    
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV7Av7slh5mSdhPbe1pp2ttvv2jCc992JE_t1KaVRBzj0m2_NfYRplK6evfXaG1g/pub?output=csv";

    async function fetchData() {
        try {
            const response = await fetch(sheetUrl);
            const csvText = await response.text();
            
            // Perbaikan: Membersihkan karakter \r (carriage return) yang sering merusak parsing CSV
            const rows = csvText.split('\n').map(row => row.replace('\r', '').trim()).filter(row => row !== "");
            
            // Deteksi pemisah secara dinamis (titik koma atau koma)
            const headerRow = rows.find(r => r.includes('2011')) || rows[0];
            const separator = headerRow.includes(';') ? ';' : ',';
            const dataMatrix = rows.map(row => row.split(separator));
            
            let listTahun = [];
            
            // Fungsi pembersih angka: Menangani format Indonesia (Titik ribuan, Koma desimal)
            const cleanNum = (val) => {
                if (!val || ["", "-", "n.a"].includes(val.trim())) return 0;
                let s = val.trim();
                // Jika titik muncul lebih dari sekali, itu pemisah ribuan
                if ((s.match(/\./g) || []).length > 1) s = s.replace(/\./g, '');
                // Jika hanya satu titik tapi ada koma, titik itu ribuan
                else if (s.includes('.') && s.includes(',')) s = s.replace(/\./g, '');
                
                s = s.replace(',', '.');
                return parseFloat(s) || 0;
            };

            dataMatrix.forEach((cols) => {
                const cellA = cols[0] ? cols[0].trim().toUpperCase() : "";
                
                // Cari Baris Tahun (Contoh: Indikator, 2011, 2012, ...)
                if (cols.some(c => c.trim() === "2011") && listTahun.length === 0) {
                    // Ambil kolom B sampai Q (Tahun 2011-2026)
                    listTahun = cols.slice(1, 17).map(t => t.trim().replace(/\*/g, ''));
                }

                // Pemetaan Data Berdasarkan Teks di Kolom A
                if (cellA.includes("LAJU") || cellA.includes("PERTUMBUHAN EKONOMI")) {
                    listTahun.forEach((thn, idx) => { database.laju[thn] = cleanNum(cols[idx + 1]); });
                } else if (cellA.includes("ADHB")) {
                    listTahun.forEach((thn, idx) => { database.adhb[thn] = cleanNum(cols[idx + 1]); });
                } else if (cellA.includes("ADHK")) {
                    listTahun.forEach((thn, idx) => { database.adhk[thn] = cleanNum(cols[idx + 1]); });
                } else if (cellA.includes("SUMBER")) {
                    listTahun.forEach((thn, idx) => { database.sumber[thn] = cleanNum(cols[idx + 1]); });
                } else if (cellA.includes("DISTRIBUSI")) {
                    // Ambil kategori distribusi (Pertanian, Industri, dll)
                    const kategori = cellA.replace("DISTRIBUSI", "").replace("(%)", "").trim();
                    if (!database.distribusi[kategori]) database.distribusi[kategori] = {};
                    listTahun.forEach((thn, idx) => { database.distribusi[kategori][thn] = cleanNum(cols[idx + 1]); });
                }
            });

            document.getElementById('status').innerText = "DATABASE TERHUBUNG (AKTIF)";
            sesuaikanFilter();
        } catch (error) {
            document.getElementById('status').innerText = "KONEKSI GAGAL";
            console.error(error);
        }
    }

    function sesuaikanFilter() {
        const menu = document.getElementById('menuGrafik').value;
        const filter = document.getElementById('filterTahun');
        filter.innerHTML = ""; 
        const opsiRentang = [
            {text: "2021 - 2026", val: "2021-2026"},
            {text: "2016 - 2020", val: "2016-2020"},
            {text: "2011 - 2015", val: "2011-2015"}
        ];
        
        if (menu !== 'distribusi') {
            opsiRentang.forEach(o => {
                let el = document.createElement("option");
                el.text = o.text; el.value = o.val; filter.add(el);
            });
        } else {
            // Untuk Pie Chart, pilih tahun tunggal secara menurun
            Object.keys(database.adhb).reverse().forEach(t => {
                if(t) { let el = document.createElement("option"); el.text = t; el.value = t; filter.add(el); }
            });
        }
        updateChart();
    }

    function updateChart() {
        const menu = document.getElementById('menuGrafik').value;
        const periode = document.getElementById('filterTahun').value;
        const isDark = document.body.classList.contains('dark');
        
        if (currentChart) currentChart.destroy();
        
        let labels = [];
        if (periode.includes("-")) {
            const [start, end] = periode.split("-").map(Number);
            for(let i=start; i<=end; i++) labels.push(i.toString());
        } else { labels = [periode]; }

        let config = {
            plugins: [ChartDataLabels],
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    datalabels: {
                        color: isDark ? '#fff' : '#444',
                        font: { weight: 'bold', size: 10 },
                        formatter: (val) => val.toLocaleString('id-ID') + (menu === 'laju' || menu === 'distribusi' ? '%' : ''),
                        // Sembunyikan label jika nilainya 0 agar tidak berantakan
                        display: (context) => context.dataset.data[context.dataIndex] !== 0
                    },
                    legend: { 
                        position: 'bottom',
                        labels: { color: isDark ? '#eee' : '#333', padding: 20 }
                    }
                }
            }
        };

        if (menu === 'nilai') {
            config.type = 'bar';
            config.data = {
                labels: labels,
                datasets: [
                    { label: 'ADHB', data: labels.map(t => database.adhb[t] || 0), backgroundColor: '#FF8C00' },
                    { label: 'ADHK', data: labels.map(t => database.adhk[t] || 0), backgroundColor: '#27ae60' }
                ]
            };
        } else if (menu === 'laju') {
            config.type = 'line';
            config.data = {
                labels: labels,
                datasets: [{
                    label: 'LAJU PERTUMBUHAN (%)',
                    data: labels.map(t => database.laju[t] || 0),
                    borderColor: '#27ae60', backgroundColor: 'rgba(39, 174, 96, 0.1)',
                    fill: true, tension: 0.3, pointRadius: 5
                }]
            };
        } else if (menu === 'distribusi') {
            config.type = 'pie';
            const thn = periode;
            const kategoriList = Object.keys(database.distribusi);
            const dataPie = kategoriList.map(kat => database.distribusi[kat][thn] || 0);
            
            config.data = {
                labels: kategoriList,
                datasets: [{ 
                    data: dataPie, 
                    backgroundColor: ['#FF8C00', '#27ae60', '#F39C12', '#2ECC71', '#3498DB', '#9B59B6'] 
                }]
            };
            config.options.plugins.datalabels.color = '#fff'; // Putih agar kontras di dalam pie
            config.options.plugins.datalabels.anchor = 'center';
        } else if (menu === 'sumber') {
            config.type = 'bar';
            config.data = {
                labels: labels,
                datasets: [{ 
                    label: 'SUMBER PERTUMBUHAN (POIN)', 
                    data: labels.map(t => database.sumber[t] || 0), 
                    backgroundColor: '#FF8C00' 
                }]
            };
        }

        currentChart = new Chart(ctx, config);
        document.getElementById('judulGrafik').innerText = document.getElementById('menuGrafik').options[document.getElementById('menuGrafik').selectedIndex].text + " (" + periode + ")";
    }

    // Fungsi Tambahan: Download & Dark Mode
    function toggleDarkMode() {
        document.body.classList.toggle("dark");
        updateChart(); // Gambar ulang chart dengan warna teks yang sesuai
    }

    function downloadChart() {
        const link = document.createElement('a');
        link.href = document.getElementById('mainChart').toDataURL('image/png');
        link.download = `Grafik_Ekonomi_Palu_${new Date().getTime()}.png`;
        link.click();
    }

    fetchData();
</script>
</body>
</html>
