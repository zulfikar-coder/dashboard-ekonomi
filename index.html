<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ekonomi - Orange & Hijau</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --orange: #FF8C00; 
            --green: #27ae60;
            --light-bg: #fff5e6;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light-bg); margin: 0; padding: 20px; }
        
        /* Header dengan warna Orange */
        .header { 
            background: var(--orange); 
            color: white; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Bagian Filter Tahun */
        .filter-section { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            border-left: 5px solid var(--green);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); 
            gap: 25px; 
        }

        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 4px solid var(--orange);
        }

        h3 { color: #333; margin-top: 0; font-size: 1.1em; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        select { padding: 10px; border-radius: 6px; border: 1px solid var(--orange); width: 220px; outline: none; }
        
        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <h1>Dashboard Statistik Ekonomi</h1>
</div>

<div class="filter-section">
    <label><strong>Pilih Periode Tahun:</strong></label><br><br>
    <select id="tahunFilter">
        <option>2021 - 2026</option>
        <option>2016 - 2020</option>
        <option>2011 - 2015</option>
    </select>
</div>

<div class="grid-container">
    <div class="card">
        <h3>Laju Pertumbuhan Ekonomi (Grafik Garis)</h3>
        <canvas id="chartLaju"></canvas>
    </div>

    <div class="card">
        <h3>Distribusi ADHB (Grafik PIE)</h3>
        <canvas id="chartDistribusi"></canvas>
    </div>

    <div class="card">
        <h3>Sumber Pertumbuhan (Grafik Batang)</h3>
        <canvas id="chartSumber"></canvas>
    </div>

    <div class="card">
        <h3>Nilai ADHB & ADHK (Grafik Batang)</h3>
        <canvas id="chartNilai"></canvas>
    </div>
</div>

<script>
    const labelsTahun = ['2021', '2022', '2023', '2024', '2025', '2026'];

    // 1. Laju Pertumbuhan (Garis Hijau)
    new Chart(document.getElementById('chartLaju'), {
        type: 'line',
        data: {
            labels: labelsTahun,
            datasets: [{
                label: '% Pertumbuhan',
                data: [3.5, 4.2, 5.0, 4.9, 5.3, 5.5],
                borderColor: '#27ae60',
                backgroundColor: 'rgba(39, 174, 96, 0.1)',
                fill: true,
                tension: 0.4
            }]
        }
    });

    // 2. Distribusi ADHB (Pie Orange & Hijau)
    new Chart(document.getElementById('chartDistribusi'), {
        type: 'pie',
        data: {
            labels: ['Sektor Pertanian', 'Sektor Industri', 'Sektor Jasa', 'Lainnya'],
            datasets: [{
                data: [25, 30, 35, 10],
                backgroundColor: ['#FF8C00', '#27ae60', '#F39C12', '#2ECC71']
            }]
        }
    });

    // 3. Sumber Pertumbuhan (Batang Orange)
    new Chart(document.getElementById('chartSumber'), {
        type: 'bar',
        data: {
            labels: ['Konsumsi', 'Investasi', 'Ekspor', 'Pemerintah'],
            datasets: [{
                label: 'Kontribusi',
                data: [2.1, 1.5, 0.8, 0.6],
                backgroundColor: '#FF8C00'
            }]
        }
    });

    // 4. Nilai ADHB & ADHK (Batang Orange vs Hijau)
    new Chart(document.getElementById('chartNilai'), {
        type: 'bar',
        data: {
            labels: labelsTahun,
            datasets: [
                {
                    label: 'Nilai ADHB',
                    data: [1500, 1620, 1750, 1880, 2010, 2150],
                    backgroundColor: '#FF8C00'
                },
                {
                    label: 'Nilai ADHK',
                    data: [1200, 1250, 1310, 1370, 1430, 1500],
                    backgroundColor: '#27ae60'
                }
            ]
        }
    });
</script>

</body>
</html>
