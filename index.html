<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD EKONOMI KOTA PALU</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root { 
            --orange: #FF8C00; --green: #27ae60; --bg: #fffcf5; 
            --text: #333; --card-bg: #ffffff; --border: #eee;
        }
        
        .dark { 
            --bg: #121212; --text: #eee; --card-bg: #1e1e1e; --border: #333;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); 
            color: var(--text); margin: 0; padding: 20px; text-transform: uppercase; 
            transition: all 0.3s ease;
        }

        .header { 
            background: var(--orange); color: white; padding: 15px 30px; 
            border-radius: 12px; display: flex; align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; gap: 20px; 
        }
        .logo-container { background: white; padding: 8px; border-radius: 10px; display: flex; align-items: center; }
        .logo-img { height: 65px; }

        .controls { 
            background: var(--card-bg); padding: 20px; border-radius: 12px; 
            margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: bold; font-size: 0.8rem; color: var(--orange); }

        select { 
            padding: 10px; border-radius: 6px; border: 1px solid var(--orange); 
            font-weight: bold; background: var(--card-bg); color: var(--text); cursor: pointer;
        }

        .btn-group { display: flex; gap: 10px; margin-left: auto; }
        button { 
            padding: 10px 15px; border-radius: 6px; border: none; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn-download { background: var(--green); color: white; }
        .btn-dark { background: #333; color: white; }

        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid var(--orange);
            max-width: 900px; margin: 0 auto; 
        }

        .chart-container { position: relative; height: 400px; width: 100%; }
        h3 { color: var(--text); margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; text-align: center; }

        @media (max-width: 768px) {
            .btn-group { margin-left: 0; width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-container"><img src="logo-bps.png" alt="BPS" class="logo-img"></div>
    <div class="header-text">
        <h1>DASHBOARD STATISTIK EKONOMI KOTA PALU</h1>
        <small id="status">MENGHUBUNGKAN KE SPREADSHEET...</small>
    </div>
</div>

<div class="controls">
    <div class="control-group">
        <label>JENIS GRAFIK</label>
        <select id="menuGrafik" onchange="sesuaikanFilter()">
            <option value="laju">LAJU PERTUMBUHAN EKONOMI (GARIS)</option>
            <option value="nilai">NILAI ADHB & ADHK (BATANG)</option>
            <option value="distribusi">DISTRIBUSI ADHB (PIE)</option>
            <option value="sumber">SUMBER PERTUMBUHAN (BATANG)</option>
        </select>
    </div>
    <div class="control-group">
        <label>PILIH PERIODE</label>
        <select id="filterTahun" onchange="updateChart()"></select>
    </div>
    <div class="btn-group">
        <button class="btn-download" onclick="downloadChart()">UNDUH GRAFIK</button>
        <button class="btn-dark" onclick="toggleDarkMode()">MODE GELAP</button>
    </div>
</div>

<div class="card">
    <h3 id="judulGrafik">VISUALISASI DATA</h3>
    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    const ctx = document.getElementById('mainChart').getContext('2d');
    let currentChart;
    let database = { laju: {}, adhb: {}, adhk: {}, distribusi: {}, sumber: {} };
    let listTahun = [];
    
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV7Av7slh5mSdhPbe1pp2ttvv2jCc992JE_t1KaVRBzj0m2_NfYRplK6evfXaG1g/pub?output=csv";

    async function fetchData() {
        try {
            const response = await fetch(sheetUrl);
            const csvText = await response.text();
            const rows = csvText.split('\n').map(row => row.replace('\r', '').trim());
            
            const headerRow = rows.find(r => r.includes('2011'));
            const separator = headerRow && headerRow.includes(';') ? ';' : ',';
            const dataMatrix = rows.map(row => row.split(separator));
            
            const cleanNum = (val) => {
                if (!val || ["", "-", "n.a"].includes(val.trim())) return 0;
                let s = val.trim().replace(/\./g, '').replace(',', '.');
                return parseFloat(s) || 0;
            };

            dataMatrix.forEach((cols) => {
                const cellA = cols[0] ? cols[0].trim().toUpperCase() : "";
                
                // Ambil daftar tahun
                if (cols.some(c => c.trim().includes("2011")) && listTahun.length === 0) {
                    listTahun = cols.slice(1, 17).map(t => t.trim().replace(/\*/g, ''));
                }

                if (cellA.includes("LAJU") || cellA.includes("PERTUMBUHAN EKONOMI")) {
                    listTahun.forEach((thn, idx) => { database.laju[thn] = cleanNum(cols[idx + 1]); });
                } else if (cellA.includes("ADHB") && !cellA.includes("DISTRIBUSI")) {
                    listTahun.forEach((thn, idx) => { database.adhb[thn] = cleanNum(cols[idx + 1]); });
                } else if (cellA.includes("ADHK")) {
                    listTahun.forEach((thn, idx) => { database.adhk[thn] = cleanNum(cols[idx + 1]); });
                } else if (cellA.includes("SUMBER")) {
                    listTahun.forEach((thn, idx) => { database.sumber[thn] = cleanNum(cols[idx + 1]); });
                } else if (cellA.includes("DISTRIBUSI")) {
                    const kategori = cellA.replace("DISTRIBUSI", "").replace("(%)", "").trim();
                    if (!database.distribusi[kategori]) database.distribusi[kategori] = {};
                    listTahun.forEach((thn, idx) => { 
                        database.distribusi[kategori][thn] = cleanNum(cols[idx + 1]); 
                    });
                }
            });

            document.getElementById('status').innerText = "DATABASE TERHUBUNG (AKTIF)";
            sesuaikanFilter();
        } catch (error) {
            document.getElementById('status').innerText = "KONEKSI GAGAL";
        }
    }

    function sesuaikanFilter() {
        const menu = document.getElementById('menuGrafik').value;
        const filter = document.getElementById('filterTahun');
        filter.innerHTML = ""; 
        
        if (menu === 'distribusi') {
            [...listTahun].reverse().forEach(t => {
                if(t) { let el = document.createElement("option"); el.text = t; el.value = t; filter.add(el); }
            });
        } else {
            const opsi = [{text: "2021 - 2026", val: "2021-2026"}, {text: "2016 - 2020", val: "2016-2020"}, {text: "2011 - 2015", val: "2011-2015"}];
            opsi.forEach(o => { 
                let el = document.createElement("option"); el.text = o.text; el.value = o.val; filter.add(el); 
            });
        }
        updateChart();
    }

    function updateChart() {
        const menu = document.getElementById('menuGrafik').value;
        const periode = document.getElementById('filterTahun').value;
        const isDark = document.body.classList.contains('dark');
        
        if (currentChart) currentChart.destroy();
        
        let labels = [];
        if (periode.includes("-")) {
            const [start, end] = periode.split("-").map(Number);
            labels = listTahun.filter(t => parseInt(t) >= start && parseInt(t) <= end);
        } else {
            labels = [periode];
        }

        let config = {
            plugins: [ChartDataLabels],
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: isDark ? '#eee' : '#333' }, position: 'bottom' },
                    datalabels: {
                        color: isDark ? '#fff' : '#444',
                        anchor: menu === 'distribusi' ? 'center' : 'end',
                        align: menu === 'distribusi' ? 'center' : 'top',
                        formatter: (val) => val.toLocaleString('id-ID') + (menu === 'laju' || menu === 'distribusi' ? '%' : ''),
                        font: { weight: 'bold', size: 11 }
                    }
                }
            }
        };

        if (menu === 'nilai') {
            config.type = 'bar';
            config.data = {
                labels: labels,
                datasets: [
                    { label: 'ADHB (MIL Rp)', data: labels.map(t => database.adhb[t] || 0), backgroundColor: '#FF8C00' },
                    { label: 'ADHK (MIL Rp)', data: labels.map(t => database.adhk[t] || 0), backgroundColor: '#27ae60' }
                ]
            };
        } else if (menu === 'laju') {
            config.type = 'line';
            config.data = {
                labels: labels,
                datasets: [{ 
                    label: 'LAJU PERTUMBUHAN (%)', 
                    data: labels.map(t => database.laju[t] || 0), 
                    borderColor: '#27ae60', 
                    backgroundColor: 'rgba(39, 174, 96, 0.1)',
                    fill: true, tension: 0.3, pointRadius: 5
                }]
            };
        } else if (menu === 'distribusi') {
            config.type = 'pie';
            const kategori = Object.keys(database.distribusi);
            config.data = {
                labels: kategori,
                datasets: [{
                    data: kategori.map(k => database.distribusi[k][periode] || 0),
                    backgroundColor: ['#FF8C00', '#27ae60', '#3498db', '#f1c40f', '#e74c3c', '#8e44ad']
                }]
            };
        } else if (menu === 'sumber') {
            config.type = 'bar';
            config.data = {
                labels: labels,
                datasets: [{ label: 'SUMBER PERTUMBUHAN (POIN)', data: labels.map(t => database.sumber[t] || 0), backgroundColor: '#3498db' }]
            };
        }

        currentChart = new Chart(ctx, config);
        document.getElementById('judulGrafik').innerText = document.getElementById('menuGrafik').options[document.getElementById('menuGrafik').selectedIndex].text + " (" + periode + ")";
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark');
        updateChart();
    }

    function downloadChart() {
        const link = document.createElement('a');
        link.download = 'grafik_ekonomi_palu.png';
        link.href = document.getElementById('mainChart').toDataURL('image/png');
        link.click();
    }

    fetchData();
</script>
</body>
</html>
