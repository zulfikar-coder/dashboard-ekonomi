<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD STATISTIK EKONOMI KOTA PALU</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <style>
        :root { 
            --orange: #FF8C00; --green: #27ae60; --bg: #fffcf5; 
            --text: #333; --card-bg: #ffffff; --border: #eee;
        }
        
        .dark { 
            --bg: #121212; --text: #eee; --card-bg: #1e1e1e; --border: #333;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); 
            color: var(--text); margin: 0; padding: 20px; text-transform: uppercase; 
            transition: all 0.3s ease;
        }

        .header { 
            background: var(--orange); color: white; padding: 15px 30px; 
            border-radius: 12px; display: flex; align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; gap: 20px; 
        }

        .logo-container { 
            background: white; padding: 8px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center;
            width: 85px; height: 85px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .logo-img { 
            width: 70px; height: 70px; object-fit: contain; display: block; 
        }
        .logo-fallback { display: none; }

        .controls { 
            background: var(--card-bg); padding: 20px; border-radius: 12px; 
            margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: bold; font-size: 0.8rem; color: var(--orange); }

        select { 
            padding: 10px; border-radius: 6px; border: 1px solid var(--orange); 
            font-weight: bold; background: var(--card-bg); color: var(--text); cursor: pointer;
        }

        .btn-group { display: flex; gap: 10px; margin-left: auto; }
        button { 
            padding: 10px 15px; border-radius: 6px; border: none; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn-download { background: var(--green); color: white; }
        .btn-dark { background: #333; color: white; }

        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid var(--orange);
            max-width: 900px; margin: 0 auto; 
        }

        .chart-container { position: relative; height: 400px; width: 100%; }
        h3 { color: var(--text); margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; text-align: center; }

        @media (max-width: 768px) {
            .btn-group { margin-left: 0; width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-container">
        <img id="bpsLogo" 
             src="https://raw.githubusercontent.com/zulfikar-coder/dashboard-ekonomi/main/logo-bps.png" 
             alt="BPS" 
             class="logo-img"
             onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';">
        <div id="logoFallback" class="logo-fallback">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width:70px;height:70px;">
                <rect width="200" height="200" fill="white"/>
                <path d="M 35 25 L 65 25 L 65 40 L 50 40 L 50 50 L 65 50 L 65 65 L 50 65 L 50 75 L 65 75 L 65 90 L 35 90 Z" fill="#0080D7"/>
                <path d="M 75 90 L 75 65 L 85 65 C 98 65 105 58 105 45 C 105 32 98 25 85 25 L 75 25 L 75 10 L 85 10 C 105 10 120 25 120 45 C 120 62 108 75 90 78 L 85 78 L 85 90 Z" fill="#009543"/>
                <path d="M 130 10 L 155 10 L 155 25 C 155 38 145 48 132 48 L 125 48 L 125 40 L 132 40 C 138 40 142 36 142 30 L 142 23 L 125 23 L 125 10 Z M 130 55 L 130 63 C 130 68 134 72 140 72 L 148 72 L 148 80 L 140 80 C 130 80 122 72 122 62 L 122 55 Z M 142 80 L 142 88 C 142 94 138 98 132 98 L 125 98 L 125 106 L 132 106 C 145 106 155 96 155 83 L 155 80 Z" fill="#F48024"/>
                <path d="M 20 120 Q 40 140, 70 135 Q 100 130, 130 135 Q 160 140, 180 125" stroke="#0080D7" stroke-width="8" fill="none" stroke-linecap="round"/>
                <path d="M 25 80 Q 45 60, 75 65 Q 105 70, 135 60 Q 165 50, 175 70" stroke="#F48024" stroke-width="6" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
    </div>
    <div class="header-text">
        <h1>DASHBOARD STATISTIK EKONOMI KOTA PALU</h1>
        <small id="status">MENGHUBUNGKAN KE SPREADSHEET...</small>
    </div>
</div>

<div class="controls">
    <div class="control-group">
        <label>JENIS GRAFIK</label>
        <select id="menuGrafik" onchange="Dashboard.handleFilterChange()">
            <option value="laju">LAJU PERTUMBUHAN EKONOMI (GARIS)</option>
            <option value="nilai">NILAI ADHB & ADHK (BATANG)</option>
            <option value="distribusi">DISTRIBUSI ADHB (PIE)</option>
        </select>
    </div>
    <div class="control-group">
        <label>PILIH PERIODE</label>
        <select id="filterTahun" onchange="Dashboard.updateChart()"></select>
    </div>
    <div class="btn-group">
        <button class="btn-download" onclick="Dashboard.downloadChart()">UNDUH GRAFIK</button>
        <button class="btn-dark" onclick="Dashboard.toggleDarkMode()">MODE GELAP</button>
    </div>
</div>

<div class="card">
    <h3 id="judulGrafik">VISUALISASI DATA</h3>
    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
/**
 * 🎯 DASHBOARD EKONOMI KOTA PALU - PROFESSIONAL VERSION
 * 
 * @author BPS Kota Palu
 * @version 2.0.0
 * @description Dashboard interaktif untuk visualisasi data ekonomi
 * 
 * Fitur:
 * - Modular architecture dengan namespace Dashboard
 * - Error handling & logging terstruktur
 * - Fallback data & retry logic
 * - Dark mode dengan persistensi
 * - Export chart ke PNG
 * - Format angka Indonesia yang robust
 */

(function(global) {
    'use strict';

    // ===== KONFIGURASI APLIKASI =====
    const CONFIG = Object.freeze({
        DATA_SOURCE: {
            SHEET_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV7Av7slh5mSdhPbe1pp2ttvv2jCc992JE_t1KaVRBzj0m2_NfYRplK6evfXaG1g/pub?output=csv",
            TIMEOUT_MS: 15000,
            USE_MOCK_FALLBACK: true,
            MAX_RETRIES: 3
        },
        CHART: {
            ANIMATION_DURATION: 800,
            DATA_LABEL_FONT_SIZE: 10,
            POINT_RADIUS: 6,
            COLORS: {
                ADHB: '#FF8C00',
                ADHK: '#27ae60',
                LINE: '#27ae60',
                PIE: ['#FF8C00', '#27ae60', '#2980b9', '#f1c40f', '#8e44ad']
            }
        },
        STORAGE: {
            DARK_MODE_KEY: 'dashboard_dark_mode',
            CACHE_TTL_MS: 24 * 60 * 60 * 1000 // 24 jam
        }
    });

    // ===== STATE MANAGEMENT =====
    const state = {
        chart: null,
        data: { laju: {}, adhb: {}, adhk: {}, distribusi: {} },
        availableYears: [],
        isLoaded: false,
        retryCount: 0,
        lastFetch: null
    };

    // ===== UTILITY MODULE =====
    const Utils = {
        /**
         * Membersihkan angka format Indonesia: "10.452,12" → 10452.12
         * @param {string|number} val - Nilai input
         * @returns {number} Nilai numerik yang sudah dibersihkan
         */
        cleanIndonesianNumber: function(val) {
            if (!val || val === '' || val === '-' || val === 'n.a' || val === 'N/A') return 0;
            
            let s = String(val).trim().replace(/^"|"$/g, '');
            
            if (s.includes(',') && s.includes('.')) {
                s = s.replace(/\./g, '').replace(',', '.');
            } else if (s.includes(',') && !s.includes('.')) {
                s = s.replace(',', '.');
            } else if (s.includes('.')) {
                const parts = s.split('.');
                if (parts.length > 1 && parts[parts.length - 1].length === 3) {
                    s = s.replace(/\./g, '');
                }
            }
            
            const num = parseFloat(s);
            return isNaN(num) ? 0 : num;
        },

        /**
         * Format angka untuk display
         * @param {number} value - Nilai numerik
         * @param {string} type - Tipe format: 'pct', 'rupiah', 'number'
         * @returns {string} Nilai terformat
         */
        formatValue: function(value, type) {
            if (value === null || value === undefined || isNaN(value)) return '-';
            
            switch(type) {
                case 'pct':
                    return new Intl.NumberFormat('id-ID', { 
                        minimumFractionDigits: 2, 
                        maximumFractionDigits: 2 
                    }).format(value) + '%';
                case 'rupiah':
                    if (value >= 1000) {
                        return 'Rp ' + new Intl.NumberFormat('id-ID', {
                            minimumFractionDigits: 1,
                            maximumFractionDigits: 1
                        }).format(value / 1000) + ' T';
                    }
                    return 'Rp ' + new Intl.NumberFormat('id-ID', {
                        minimumFractionDigits: 1,
                        maximumFractionDigits: 1
                    }).format(value) + ' M';
                default:
                    return new Intl.NumberFormat('id-ID').format(value);
            }
        },

        /**
         * Debounce function untuk optimasi performa
         * @param {Function} func - Fungsi yang akan didebounce
         * @param {number} wait - Delay dalam milidetik
         * @returns {Function} Fungsi terdebounce
         */
        debounce: function(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        },

        /**
         * Logging terstruktur dengan level
         * @param {string} level - Level log: 'info', 'warn', 'error'
         * @param {string} message - Pesan log
         * @param {*} [data] - Data tambahan (opsional)
         */
        log: function(level, message, data) {
            const timestamp = new Date().toISOString();
            const prefix = `[${timestamp}] [${level.toUpperCase()}]`;
            
            if (level === 'error') {
                console.error(prefix, message, data || '');
            } else if (level === 'warn') {
                console.warn(prefix, message, data || '');
            } else {
                console.log(prefix, message, data || '');
            }
        },

        /**
         * Update status indicator di UI
         * @param {string} message - Pesan status
         * @param {'loading'|'success'|'error'} type - Tipe status
         */
        updateStatus: function(message, type) {
            const statusEl = document.getElementById('status');
            if (!statusEl) return;
            
            statusEl.textContent = message;
            
            // Visual feedback berdasarkan tipe
            const colors = {
                loading: '#ffd700',
                success: '#2ecc71',
                error: '#e74c3c'
            };
            statusEl.style.color = colors[type] || '#fff';
        }
    };

    // ===== DATA MODULE =====
    const DataManager = {
        /**
         * Parse CSV text menjadi structured data
         * @param {string} csvText - Raw CSV content
         * @returns {Object} Parsed data dengan years
         */
        parseCSV: function(csvText) {
            const rows = csvText.split('\n')
                .map(r => r.replace('\r', '').trim())
                .filter(r => r.length > 0);
            
            if (rows.length === 0) {
                throw new Error('CSV kosong atau tidak valid');
            }
            
            const separator = rows[0].includes(';') ? ';' : ',';
            
            // Parse matrix dengan handling quoted values
            const matrix = rows.map(row => {
                const result = [];
                let current = '', inQuotes = false;
                
                for (let i = 0; i < row.length; i++) {
                    const char = row[i];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === separator && !inQuotes) {
                        result.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current.trim());
                return result;
            });
            
            // Find header row with years
            let headerIndex = -1;
            for (let i = 0; i < Math.min(10, matrix.length); i++) {
                if (matrix[i].some(cell => /^\d{4}$/.test(cell.trim()))) {
                    headerIndex = i;
                    break;
                }
            }
            
            if (headerIndex === -1) {
                throw new Error('Header dengan tahun tidak ditemukan');
            }
            
            const headers = matrix[headerIndex].map(h => h.trim().replace(/\*/g, ''));
            const years = headers.slice(1).filter(h => /^\d{4}$/.test(h));
            
            if (years.length === 0) {
                throw new Error('Tidak ada kolom tahun valid ditemukan');
            }
            
            return { matrix, headers, years };
        },

        /**
         * Extract economic data from parsed CSV
         * @param {Array} matrix - CSV matrix
         * @param {Array} headers - Column headers
         * @param {Array} years - Available years
         * @returns {Object} Structured economic data
         */
        extractData: function(matrix, headers, years) {
            const data = { laju: {}, adhb: {}, adhk: {}, distribusi: {} };
            
            matrix.forEach((cols) => {
                // Skip header rows
                if (headers.some(h => cols[0] && cols[0].trim() === h)) return;
                
                const label = (cols[0] || '').trim().toUpperCase();
                if (!label) return;
                
                years.forEach((year, idx) => {
                    const value = Utils.cleanIndonesianNumber(cols[idx + 1]);
                    
                    if (label.includes('LAJU') && label.includes('PERTUMBUHAN')) {
                        data.laju[year] = value;
                    } else if (label.includes('ADHB') && !label.includes('DISTRIBUSI')) {
                        data.adhb[year] = value;
                    } else if (label.includes('ADHK')) {
                        data.adhk[year] = value;
                    } else if (label.includes('DISTRIBUSI')) {
                        const match = label.match(/DISTRIBUSI\s+([^\(]+)/i);
                        if (match) {
                            const sector = match[1].trim().toUpperCase();
                            if (sector && !data.distribusi[sector]) {
                                data.distribusi[sector] = value;
                            }
                        }
                    }
                });
            });
            
            // Fallback distribusi jika kosong
            if (Object.keys(data.distribusi).length === 0) {
                data.distribusi = {
                    'PERTANIAN': 11.9, 'INDUSTRI': 11.3, 'KONSTRUKSI': 18.8,
                    'PERDAGANGAN': 25.5, 'JASA': 32.5
                };
            }
            
            return data;
        },

        /**
         * Generate mock data untuk fallback
         * @returns {Object} Mock data dengan years
         */
        generateMockData: function() {
            const years = ['2011','2012','2013','2014','2015','2016','2017','2018','2019','2020','2021','2022','2023','2024','2025','2026'];
            const data = { laju: {}, adhb: {}, adhk: {}, distribusi: {} };
            
            years.forEach((y, i) => {
                data.laju[y] = Math.max(-2, Math.min(10, 5 + Math.sin(i/2)*2.5 + (Math.random()-0.5)*1.5));
                data.adhb[y] = 10000 + i * 1200 + Math.random() * 1500;
                data.adhk[y] = 7500 + i * 900 + Math.random() * 1000;
            });
            
            data.distribusi = {
                'PERTANIAN': 11.9, 'INDUSTRI': 11.3, 'KONSTRUKSI': 18.8,
                'PERDAGANGAN': 25.5, 'JASA': 32.5
            };
            
            return { data, years };
        },

        /**
         * Fetch data dari Google Sheets dengan retry logic
         * @returns {Promise<boolean>} Success status
         */
        fetchData: async function() {
            Utils.updateStatus('MENGUNDUH DATA DARI GOOGLE SHEETS...', 'loading');
            Utils.log('info', 'Starting data fetch', { url: CONFIG.DATA_SOURCE.SHEET_URL });
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), CONFIG.DATA_SOURCE.TIMEOUT_MS);
                
                const response = await fetch(CONFIG.DATA_SOURCE.SHEET_URL, {
                    signal: controller.signal,
                    headers: { 'Cache-Control': 'no-cache' },
                    mode: 'cors'
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const csvText = await response.text();
                
                if (!csvText || csvText.length < 100) {
                    throw new Error('Data CSV tidak valid (terlalu pendek)');
                }
                
                // Parse dan extract data
                const parsed = this.parseCSV(csvText);
                state.data = this.extractData(parsed.matrix, parsed.headers, parsed.years);
                state.availableYears = parsed.years;
                
                if (state.availableYears.length === 0) {
                    throw new Error('Tidak ada data tahun yang berhasil diekstrak');
                }
                
                // Success
                state.isLoaded = true;
                state.lastFetch = Date.now();
                state.retryCount = 0;
                
                Utils.log('info', 'Data loaded successfully', { 
                    years: state.availableYears,
                    count: state.availableYears.length 
                });
                
                Utils.updateStatus(
                    `DATABASE TERHUBUNG (AKTIF) - ${state.availableYears.length} TAHUN`, 
                    'success'
                );
                
                return true;
                
            } catch (error) {
                Utils.log('error', 'Fetch failed', { 
                    message: error.message, 
                    retryCount: state.retryCount 
                });
                
                // Retry logic
                if (state.retryCount < CONFIG.DATA_SOURCE.MAX_RETRIES) {
                    state.retryCount++;
                    Utils.log('warn', `Retrying fetch (${state.retryCount}/${CONFIG.DATA_SOURCE.MAX_RETRIES})`);
                    await new Promise(resolve => setTimeout(resolve, 1000 * state.retryCount));
                    return this.fetchData();
                }
                
                // Fallback ke mock data
                if (CONFIG.DATA_SOURCE.USE_MOCK_FALLBACK) {
                    Utils.log('warn', 'Using mock data fallback');
                    const mock = this.generateMockData();
                    state.data = mock.data;
                    state.availableYears = mock.years;
                    state.isLoaded = true;
                    
                    Utils.updateStatus('MODE SIMULASI - DATA CONTOH', 'success');
                    return true;
                }
                
                // Final error
                Utils.updateStatus(`KONEKSI GAGAL: ${error.message}`, 'error');
                return false;
            }
        }
    };

    // ===== CHART MODULE =====
    const ChartManager = {
        /**
         * Get base Chart.js configuration
         * @param {boolean} isDark - Dark mode status
         * @param {string} menu - Chart type
         * @returns {Object} Base chart config
         */
        getBaseConfig: function(isDark, menu) {
            const textColor = isDark ? '#eee' : '#333';
            const gridColor = isDark ? '#444' : '#ddd';
            const dataLabelColor = isDark ? '#000000' : '#333333';
            const dataLabelBg = isDark ? '#FFFFFF' : 'rgba(255,255,255,0.85)';
            
            return {
                responsive: true,
                maintainAspectRatio: false,
                animation: { 
                    duration: CONFIG.CHART.ANIMATION_DURATION, 
                    easing: 'easeOutQuart' 
                },
                plugins: {
                    legend: { 
                        labels: { 
                            color: textColor, 
                            font: { weight: 'bold', size: 10 } 
                        } 
                    },
                    tooltip: {
                        backgroundColor: 'rgba(30,30,40,0.95)',
                        titleColor: '#fff',
                        bodyColor: '#eee',
                        borderColor: isDark ? '#555' : '#ddd',
                        borderWidth: 1,
                        padding: 10,
                        callbacks: {
                            label: function(ctx) {
                                const v = ctx.parsed.y !== undefined ? ctx.parsed.y : ctx.parsed;
                                if (menu === 'laju') return ' ' + Utils.formatValue(v, 'pct');
                                if (menu === 'nilai') return ' ' + Utils.formatValue(v, 'rupiah');
                                if (menu === 'distribusi') return ' ' + Utils.formatValue(v, 'pct');
                                return ' ' + Utils.formatValue(v, 'number');
                            }
                        }
                    },
                    datalabels: {
                        anchor: 'end',
                        align: 'top',
                        formatter: function(val) {
                            if (!val && val !== 0) return '';
                            if (menu === 'laju') return val.toFixed(1) + '%';
                            if (menu === 'nilai') return val >= 1000 ? (val/1000).toFixed(1)+'T' : val.toFixed(0);
                            if (menu === 'distribusi') return val.toFixed(1) + '%';
                            return Utils.formatValue(val, 'number');
                        },
                        font: { weight: 'bold', size: CONFIG.CHART.DATA_LABEL_FONT_SIZE },
                        color: dataLabelColor,
                        backgroundColor: dataLabelBg,
                        borderColor: isDark ? '#FFFFFF' : 'rgba(200,200,200,0.5)',
                        borderWidth: 1,
                        borderRadius: 6,
                        padding: 5
                    }
                },
                scales: menu !== 'distribusi' ? {
                    y: { 
                        beginAtZero: true, 
                        ticks: { color: textColor, font: { size: 10 } }, 
                        grid: { color: gridColor } 
                    },
                    x: { 
                        ticks: { color: textColor, font: { size: 10 } }, 
                        grid: { display: false } 
                    }
                } : {}
            };
        },

        /**
         * Render chart based on selected type
         */
        render: function() {
            if (!state.isLoaded) return;
            
            const ctx = document.getElementById('mainChart');
            if (!ctx) return;
            
            const menu = document.getElementById('menuGrafik').value;
            const periode = document.getElementById('filterTahun').value;
            const labels = this.getYearsInRange(periode);
            const isDark = document.body.classList.contains('dark');
            
            // Destroy existing chart
            if (state.chart) {
                state.chart.destroy();
                state.chart = null;
            }
            
            const baseConfig = this.getBaseConfig(isDark, menu);
            let config;
            
            switch(menu) {
                case 'nilai':
                    config = this.createBarChart(labels, baseConfig, isDark);
                    break;
                case 'laju':
                    config = this.createLineChart(labels, baseConfig, isDark);
                    break;
                case 'distribusi':
                    config = this.createPieChart(baseConfig, isDark);
                    break;
                default:
                    Utils.log('warn', 'Unknown chart type', { menu });
                    return;
            }
            
            // Register plugin and create chart
            if (typeof ChartDataLabels !== 'undefined') {
                Chart.register(ChartDataLabels);
            }
            
            state.chart = new Chart(ctx.getContext('2d'), config);
            
            // Update title
            const menuText = document.getElementById('menuGrafik').options[
                document.getElementById('menuGrafik').selectedIndex
            ].text;
            document.getElementById('judulGrafik').textContent = 
                menuText.split('(')[0].trim() + " (" + periode + ")";
        },

        /**
         * Create bar chart configuration
         */
        createBarChart: function(labels, baseConfig, isDark) {
            const adhbData = labels.map(t => state.data.adhb[t] || 0);
            const adhkData = labels.map(t => state.data.adhk[t] || 0);
            
            const config = {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'ADHB',
                            data: adhbData,
                            backgroundColor: 'rgba(255,140,0,0.85)',
                            borderColor: CONFIG.CHART.COLORS.ADHB,
                            borderWidth: 2,
                            borderRadius: 6,
                            borderSkipped: false
                        },
                        {
                            label: 'ADHK',
                            data: adhkData,
                            backgroundColor: 'rgba(39,174,96,0.85)',
                            borderColor: CONFIG.CHART.COLORS.ADHK,
                            borderWidth: 2,
                            borderRadius: 6,
                            borderSkipped: false
                        }
                    ]
                },
                options: JSON.parse(JSON.stringify(baseConfig))
            };
            
            // Custom y-axis formatting
            config.options.scales.y.ticks.callback = function(v) {
                return (v/1000).toFixed(0) + 'T';
            };
            
            return config;
        },

        /**
         * Create line chart configuration
         */
        createLineChart: function(labels, baseConfig, isDark) {
            const lajuData = labels.map(t => state.data.laju[t] || 0);
            
            const config = {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'LAJU PERTUMBUHAN (%)',
                        data: lajuData,
                        borderColor: CONFIG.CHART.COLORS.LINE,
                        backgroundColor: 'rgba(39,174,96,0.15)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: CONFIG.CHART.POINT_RADIUS,
                        pointBackgroundColor: CONFIG.CHART.COLORS.LINE,
                        pointBorderColor: isDark ? '#fff' : CONFIG.CHART.COLORS.LINE,
                        pointBorderWidth: 2,
                        pointHoverRadius: 8
                    }]
                },
                options: JSON.parse(JSON.stringify(baseConfig))
            };
            
            config.options.scales.y.ticks.callback = function(v) {
                return v + '%';
            };
            
            return config;
        },

        /**
         * Create pie/doughnut chart configuration
         */
        createPieChart: function(baseConfig, isDark) {
            return {
                type: 'doughnut',
                data: {
                    labels: Object.keys(state.data.distribusi),
                    datasets: [{
                        data: Object.values(state.data.distribusi),
                        backgroundColor: CONFIG.CHART.COLORS.PIE,
                        borderColor: isDark ? '#1e1e1e' : '#fff',
                        borderWidth: 3,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 1000 },
                    plugins: {
                        legend: { 
                            position: 'bottom', 
                            labels: { 
                                color: isDark ? '#eee' : '#333', 
                                font: { weight: 'bold', size: 9 }, 
                                padding: 10 
                            } 
                        },
                        tooltip: { 
                            backgroundColor: 'rgba(30,30,40,0.95)', 
                            callbacks: { 
                                label: function(ctx) { 
                                    return ' ' + ctx.parsed.toFixed(1) + '%'; 
                                } 
                            } 
                        },
                        datalabels: { 
                            anchor: 'center', 
                            align: 'center', 
                            formatter: function(v) { 
                                return v >= 5 ? v.toFixed(1)+'%' : ''; 
                            }, 
                            font: { weight: 'bold', size: 11 }, 
                            color: '#fff' 
                        }
                    },
                    cutout: '55%'
                }
            };
        },

        /**
         * Get years array from range string
         */
        getYearsInRange: function(range) {
            if (range.includes("-")) {
                const parts = range.split("-");
                const start = parseInt(parts[0], 10);
                const end = parseInt(parts[1], 10);
                const labels = [];
                for(let i = start; i <= end; i++) {
                    labels.push(i.toString());
                }
                return labels;
            }
            return [range];
        }
    };

    // ===== UI MODULE =====
    const UIManager = {
        /**
         * Populate filter dropdowns based on chart type
         */
        populateFilters: function() {
            const menu = document.getElementById('menuGrafik');
            const filter = document.getElementById('filterTahun');
            
            if (!menu || !filter) return;
            
            filter.innerHTML = '';
            
            if (menu.value === 'distribusi') {
                // Single year selector for pie chart
                const years = state.availableYears
                    .filter(t => t && t.length === 4)
                    .reverse();
                
                years.forEach(t => {
                    const el = document.createElement("option");
                    el.textContent = t;
                    el.value = t;
                    filter.add(el);
                });
                
                if (filter.options.length === 0) {
                    const el = document.createElement("option");
                    el.textContent = "2024";
                    el.value = "2024";
                    filter.add(el);
                }
            } else {
                // Range selector for line/bar charts
                const lastYear = state.availableYears[state.availableYears.length - 1] || '2026';
                const firstYear = state.availableYears[0] || '2011';
                
                const ranges = [
                    { text: "2021 - " + lastYear, value: "2021-" + lastYear },
                    { text: "2016 - 2020", value: "2016-2020" },
                    { text: firstYear + " - 2015", value: firstYear + "-2015" }
                ];
                
                ranges.forEach(r => {
                    const el = document.createElement("option");
                    el.textContent = r.text;
                    el.value = r.value;
                    filter.add(el);
                });
            }
        },

        /**
         * Toggle dark mode with persistence
         */
        toggleDarkMode: function() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            
            // Persist preference
            try {
                localStorage.setItem(
                    CONFIG.STORAGE.DARK_MODE_KEY, 
                    JSON.stringify({ enabled: isDark, timestamp: Date.now() })
                );
            } catch(e) {
                Utils.log('warn', 'Failed to save dark mode preference', e);
            }
            
            // Re-render chart with new theme
            if (state.chart) {
                ChartManager.render();
            }
        },

        /**
         * Load dark mode preference from storage
         */
        loadDarkModePreference: function() {
            try {
                const saved = localStorage.getItem(CONFIG.STORAGE.DARK_MODE_KEY);
                if (saved) {
                    const { enabled } = JSON.parse(saved);
                    if (enabled) {
                        document.body.classList.add('dark');
                    }
                }
            } catch(e) {
                Utils.log('warn', 'Failed to load dark mode preference', e);
            }
        },

        /**
         * Download chart as PNG image
         */
        downloadChart: function() {
            const canvas = document.getElementById('mainChart');
            if (!canvas) return;
            
            try {
                const link = document.createElement('a');
                link.download = 'Dashboard-Ekonomi-Palu-' + 
                    new Date().toISOString().slice(0,10) + '.png';
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                
                Utils.log('info', 'Chart downloaded');
            } catch(error) {
                Utils.log('error', 'Failed to download chart', error);
                alert('Gagal mengunduh grafik: ' + error.message);
            }
        }
    };

    // ===== PUBLIC API =====
    const Dashboard = {
        /**
         * Initialize the dashboard
         */
        init: function() {
            Utils.log('info', 'Dashboard initializing');
            
            // Register Chart.js plugin
            if (typeof ChartDataLabels !== 'undefined') {
                Chart.register(ChartDataLabels);
            }
            
            // Load user preferences
            UIManager.loadDarkModePreference();
            
            // Setup logo fallback
            const logoImg = document.getElementById('bpsLogo');
            if (logoImg) {
                logoImg.onerror = function() {
                    Utils.log('warn', 'Logo BPS failed to load, using SVG fallback');
                    this.style.display = 'none';
                    const fallback = document.getElementById('logoFallback');
                    if (fallback) fallback.style.display = 'block';
                };
            }
            
            // Setup keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 's') {
                    e.preventDefault();
                    Dashboard.downloadChart();
                }
            });
            
            // Fetch data and render
            DataManager.fetchData().then(function(success) {
                if (success) {
                    UIManager.populateFilters();
                    ChartManager.render();
                }
            });
        },

        /**
         * Handle filter change event (debounced)
         */
        handleFilterChange: Utils.debounce(function() {
            UIManager.populateFilters();
            Dashboard.updateChart();
        }, 150),

        /**
         * Update chart based on current selections
         */
        updateChart: function() {
            ChartManager.render();
        },

        /**
         * Toggle dark mode
         */
        toggleDarkMode: function() {
            UIManager.toggleDarkMode();
        },

        /**
         * Download chart as PNG
         */
        downloadChart: function() {
            UIManager.downloadChart();
        }
    };

    // Expose to global scope
    global.Dashboard = Dashboard;

    // Auto-initialize when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            Dashboard.init();
        });
    } else {
        Dashboard.init();
    }

})(typeof window !== 'undefined' ? window : this);
</script>
</body>
</html>
