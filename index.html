<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DASHBOARD EKONOMI KOTA PALU</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
:root{
--orange:#FF8C00;
--green:#27ae60;
}

body{
font-family:'Segoe UI';
background:linear-gradient(135deg,#fff7e6,#ffe0b3);
margin:0;
padding:20px;
}

/* HEADER */
.header{
background:var(--orange);
color:white;
padding:15px 25px;
border-radius:12px;
display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;
}

/* KPI */
.kpi{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.kpi-card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.kpi-card h4{margin:0;color:#777;}
.kpi-card p{font-size:22px;font-weight:bold;margin:5px;}

.naik{color:green;}
.turun{color:red;}

/* CONTROL */
.controls{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
display:flex;
gap:15px;
flex-wrap:wrap;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
transition:.3s;
}
.card:hover{
transform:translateY(-5px);
}

canvas{
width:100%!important;
height:350px!important;
}

</style>
</head>

<body>

<div class="header">
<h2>DASHBOARD STATISTIK EKONOMI KOTA PALU</h2>
</div>

<!-- KPI -->
<div class="kpi">
<div class="kpi-card">
<h4>ADHB TERBARU</h4>
<p id="kpiAdhb">-</p>
</div>

<div class="kpi-card">
<h4>ADHK TERBARU</h4>
<p id="kpiAdhk">-</p>
</div>

<div class="kpi-card">
<h4>PERTUMBUHAN</h4>
<p id="kpiGrowth">-</p>
</div>
</div>

<!-- FILTER -->
<div class="controls">
<select id="filterTahun" onchange="updateDashboard()">
<option value="all">SEMUA TAHUN</option>
<option value="2021-2026">2021-2026</option>
<option value="2016-2020">2016-2020</option>
<option value="2011-2015">2011-2015</option>
</select>
</div>

<!-- CHART -->
<div class="card">
<h3>LAJU PERTUMBUHAN</h3>
<canvas id="chartLaju"></canvas>
</div>

<div class="card">
<h3>ADHB vs ADHK</h3>
<canvas id="chartNilai"></canvas>
</div>

<div class="card">
<h3>DISTRIBUSI EKONOMI</h3>
<canvas id="chartPie"></canvas>
</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRxFyk-OotNf1VPI4Ly66xecHZ_CbRQN2T3vpdMT2FXfIqcj18BQWiz9TWk71Ome2G4VrZByb8PhUxG/pub?output=csv";

let dataSheet=[];
let chart1,chart2,chart3;

function format(n){
return new Intl.NumberFormat('id-ID').format(n);
}

// FETCH DATA
async function getData(){
let res=await fetch(sheetURL);
let txt=await res.text();

dataSheet=txt.split("\n").slice(1).map(r=>{
let c=r.split(",");
return{
tahun:c[0].trim(),
adhb:parseFloat(c[1])||0,
adhk:parseFloat(c[2])||0
}
});

dataSheet.sort((a,b)=>a.tahun-b.tahun);

updateDashboard();
updateKPI();
}

// KPI
function updateKPI(){
let last=dataSheet[dataSheet.length-1];
let prev=dataSheet[dataSheet.length-2];

document.getElementById("kpiAdhb").innerText=format(last.adhb);
document.getElementById("kpiAdhk").innerText=format(last.adhk);

let growth=((last.adhk-prev.adhk)/prev.adhk)*100;
let el=document.getElementById("kpiGrowth");
el.innerText=growth.toFixed(2)+"%";
el.className=growth>=0?"naik":"turun";
}

// FILTER DATA
function getFiltered(){
let f=document.getElementById("filterTahun").value;

if(f==="all") return dataSheet;

let range=f.split("-");
return dataSheet.filter(d=>d.tahun>=range[0]&&d.tahun<=range[1]);
}

// LAJU
function calcGrowth(data){
let res=[];
for(let i=1;i<data.length;i++){
let g=((data[i].adhk-data[i-1].adhk)/data[i-1].adhk)*100;
res.push(g.toFixed(2));
}
return res;
}

// UPDATE DASHBOARD
function updateDashboard(){

let data=getFiltered();
let labels=data.map(d=>d.tahun);

if(chart1)chart1.destroy();
if(chart2)chart2.destroy();
if(chart3)chart3.destroy();

// LAJU
chart1=new Chart(chartLaju,{
type:'line',
data:{
labels:labels.slice(1),
datasets:[{
label:'Growth %',
data:calcGrowth(data),
borderColor:'#27ae60',
fill:true,
backgroundColor:'rgba(39,174,96,0.1)'
}]
}
});

// NILAI
chart2=new Chart(chartNilai,{
type:'bar',
data:{
labels:labels,
datasets:[
{label:'ADHB',data:data.map(d=>d.adhb),backgroundColor:'#FF8C00'},
{label:'ADHK',data:data.map(d=>d.adhk),backgroundColor:'#27ae60'}
]
}
});

// PIE
let totalAdhb=data.reduce((a,b)=>a+b.adhb,0);

chart3=new Chart(chartPie,{
type:'pie',
data:{
labels:['TOTAL ADHB','SISA'],
datasets:[{
data:[totalAdhb,100000-totalAdhb],
backgroundColor:['#FF8C00','#eee']
}]
},
options:{
plugins:{
datalabels:{
color:'#fff',
anchor:'center',
align:'center',
formatter:v=>format(v)
}
}
},
plugins:[ChartDataLabels]
});

}

// START
getData();

</script>

</body>
</html>
