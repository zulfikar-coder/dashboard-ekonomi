<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 DASHBOARD EKONOMI KOTA PALU</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <style>
        :root {
            --orange: #FF8C00; --green: #27ae60; --blue: #3498db;
            --bg: #fffcf5; --text: #2c3e50; --card-bg: #ffffff;
            --border: #e0e0e0; --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .dark {
            --bg: #0f0f12; --text: #f1f1f1; --card-bg: #1e1e25;
            --border: #333340;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            padding: 16px; transition: all 0.3s ease;
        }
        .header {
            background: linear-gradient(135deg, var(--orange), #cc7000);
            color: white; padding: 24px; border-radius: 16px;
            margin-bottom: 20px; box-shadow: var(--shadow);
        }
        .header h1 { font-size: clamp(1.3rem, 4vw, 1.8rem); margin-bottom: 12px; }
        .status {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 16px; background: rgba(255,255,255,0.25);
            border-radius: 20px; font-size: 0.9rem;
        }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #ffd700; animation: pulse 1.5s infinite;
        }
        .status-dot.success { background: #2ecc71; animation: none; }
        .status-dot.error { background: #e74c3c; animation: none; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        
        .controls {
            background: var(--card-bg); padding: 20px; border-radius: 16px;
            margin-bottom: 20px; box-shadow: var(--shadow);
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; align-items: end;
        }
        .control-group label {
            font-weight: 600; font-size: 0.85rem; color: var(--orange);
            text-transform: uppercase; display: block; margin-bottom: 6px;
        }
        select {
            width: 100%; padding: 12px; border-radius: 10px;
            border: 2px solid var(--border); background: var(--bg);
            color: var(--text); font-size: 0.95rem; cursor: pointer;
        }
        select:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button {
            padding: 12px 20px; border-radius: 10px; border: none;
            font-weight: 600; cursor: pointer; color: white;
            transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-png { background: var(--green); }
        .btn-pdf { background: var(--blue); }
        .btn-dark { background: #555; }
        
        .card {
            background: var(--card-bg); padding: 24px; border-radius: 16px;
            box-shadow: var(--shadow); max-width: 1200px; margin: 0 auto;
            border-top: 4px solid var(--orange);
        }
        .card h3 { margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
        .chart-container { 
            position: relative; height: clamp(350px, 50vh, 500px); 
            background: var(--bg); border-radius: 12px; padding: 16px;
        }
        .error-message {
            background: #fee; border-left: 4px solid #e74c3c;
            padding: 16px; border-radius: 8px; margin: 20px 0;
            color: #c0392b; display: none;
        }
        .error-message.show { display: block; }
        .loading {
            text-align: center; padding: 60px 20px; color: var(--orange);
            font-size: 1.1rem;
        }
        @media (max-width: 768px) {
            .controls { grid-template-columns: 1fr; }
            .btn-group { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📊 DASHBOARD STATISTIK EKONOMI KOTA PALU</h1>
    <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Memuat data...</span>
    </div>
</div>

<div class="controls">
    <div class="control-group">
        <label>📈 Jenis Grafik</label>
        <select id="menuGrafik" onchange="handleFilterChange()" disabled>
            <option value="">Memuat...</option>
        </select>
    </div>
    <div class="control-group">
        <label>📅 Periode</label>
        <select id="filterTahun" onchange="updateChart()" disabled>
            <option value="">Memuat...</option>
        </select>
    </div>
    <div class="btn-group">
        <button class="btn-png" onclick="downloadChart('png')" id="btnPng" disabled>📥 PNG</button>
        <button class="btn-pdf" onclick="downloadChart('pdf')" id="btnPdf" disabled>📄 PDF</button>
        <button class="btn-dark" onclick="toggleDarkMode()">🌙 Gelap</button>
        <button onclick="retryFetch()" id="btnRetry" style="background:#e67e22;display:none">🔄 Retry</button>
    </div>
</div>

<div class="card">
    <h3 id="judulGrafik">Visualisasi Data Ekonomi</h3>
    <div class="error-message" id="errorMsg"></div>
    <div class="chart-container" id="chartContainer">
        <div class="loading" id="loadingText">⏳ Menghubungkan ke data BPS...</div>
        <canvas id="mainChart" style="display:none"></canvas>
    </div>
</div>

<script>
// ===== STATE =====
const state = {
    chart: null,
     { laju: {}, adhb: {}, adhk: {}, distribusi: {} },
    years: [],
    isLoaded: false,
    config: {
        url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV7Av7slh5mSdhPbe1pp2ttvv2jCc992JE_t1KaVRBzj0m2_NfYRplK6evfXaG1g/pub?output=csv"
    }
};

// ===== UTILITIES =====
const fmt = {
    id: (n, d=1) => {
        if(n===null || n===undefined || isNaN(n)) return '-';
        return new Intl.NumberFormat('id-ID',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n);
    },
    pct: n => fmt.id(n,2)+'%',
    rp: n => {
        if(n===null || n===undefined) return '-';
        return n>=1000?`Rp ${fmt.id(n/1000,1)} T`:`Rp ${fmt.id(n,1)} M`;
    },
    showError: (msg) => {
        const el = document.getElementById('errorMsg');
        el.textContent = '⚠️ ' + msg;
        el.classList.add('show');
        setTimeout(()=>el.classList.remove('show'), 8000);
    },
    updateStatus: (text, type='loading') => {
        const dot = document.getElementById('statusDot');
        const txt = document.getElementById('statusText');
        txt.textContent = text;
        dot.className = 'status-dot ' + (type==='success'?'success':type==='error'?'error':'');
    }
};

// ===== CLEAN NUMBER (FORMAT INDONESIA) =====
const cleanNumber = (val) => {
    if(!val || val==='' || val==='-' || val==='n.a' || val==='N/A') return 0;
    let s = String(val).replace(/^"|"$/g,'').trim();
    
    // Handle format Indonesia: "10.452,12" -> 10452.12
    if(s.includes('.') && s.includes(',')) {
        s = s.replace(/\./g,'').replace(',','.');
    } else if(s.includes(',') && !s.includes('.')) {
        s = s.replace(',','.');
    } else if(s.includes('.')) {
        const parts = s.split('.');
        if(parts.length>1 && parts[parts.length-1].length===3) {
            s = s.replace(/\./g,'');
        }
    }
    return parseFloat(s) || 0;
};

// ===== FETCH DATA =====
async function fetchData() {
    try {
        fmt.updateStatus('Mengunduh data dari Google Sheets...', 'loading');
        document.getElementById('loadingText').style.display = 'block';
        document.getElementById('mainChart').style.display = 'none';
        
        // Fetch dengan timeout
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);
        
        const response = await fetch(state.config.url, {
            signal: controller.signal,
            headers: { 'Cache-Control': 'no-cache' }
        });
        clearTimeout(timeoutId);
        
        if(!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const csvText = await response.text();
        
        if(!csvText || csvText.length < 100) {
            throw new Error('Data CSV kosong atau tidak valid');
        }
        
        parseCSV(csvText);
        
        if(state.years.length === 0) {
            throw new Error('Tidak ada data tahun yang ditemukan');
        }
        
        // Success
        fmt.updateStatus(`✅ Data aktif • ${state.years.length} tahun tersedia`, 'success');
        document.getElementById('loadingText').style.display = 'none';
        document.getElementById('mainChart').style.display = 'block';
        
        // Enable controls
        document.getElementById('menuGrafik').disabled = false;
        document.getElementById('filterTahun').disabled = false;
        document.getElementById('btnPng').disabled = false;
        document.getElementById('btnPdf').disabled = false;
        
        populateFilters();
        updateChart();
        state.isLoaded = true;
        
        console.log('✅ Data berhasil dimuat:', state.years);
        
    } catch(error) {
        console.error('❌ Fetch error:', error);
        fmt.updateStatus('⚠️ Gagal memuat data • Menggunakan data contoh', 'error');
        fmt.showError(`Gagal mengambil data: ${error.message}. Menggunakan data simulasi.`);
        
        document.getElementById('loadingText').style.display = 'none';
        document.getElementById('mainChart').style.display = 'block';
        document.getElementById('btnRetry').style.display = 'inline-flex';
        
        // Fallback ke mock data
        loadMockData();
    }
}

// ===== PARSE CSV =====
function parseCSV(csvText) {
    const rows = csvText.split('\n').map(r=>r.replace('\r','').trim()).filter(r=>r);
    const sep = rows[0].includes(';') ? ';' : ',';
    
    // Parse ke matrix
    const matrix = rows.map(row => {
        const result = []; let cur='', inQ=false;
        for(let c of row) {
            if(c==='"') inQ=!inQ;
            else if(c===sep && !inQ) { result.push(cur.trim()); cur=''; }
            else cur+=c;
        }
        result.push(cur.trim());
        return result;
    });
    
    // Cari header dengan tahun
    let headerIdx = -1;
    for(let i=0; i<Math.min(10, matrix.length); i++) {
        if(matrix[i].some(c=>/^\d{4}$/.test(c.trim()))) {
            headerIdx = i;
            break;
        }
    }
    
    if(headerIdx === -1) {
        console.warn('Header tidak ditemukan, menggunakan baris pertama');
        headerIdx = 0;
    }
    
    const headers = matrix[headerIdx].map(h=>h.trim().replace(/\*/g,''));
    state.years = headers.slice(1).filter(h=>/^\d{4}$/.test(h));
    
    console.log('Tahun ditemukan:', state.years);
    
    // Parse data
    matrix.forEach((cols, idx) => {
        if(idx <= headerIdx) return;
        const label = (cols[0]||'').trim().toUpperCase();
        if(!label) return;
        
        state.years.forEach((year, yIdx) => {
            const val = cleanNumber(cols[yIdx+1]);
            
            if(label.includes('LAJU') && label.includes('PERTUMBUHAN')) {
                state.data.laju[year] = val;
            }
            else if(label.includes('ADHB')) {
                state.data.adhb[year] = val;
            }
            else if(label.includes('ADHK')) {
                state.data.adhk[year] = val;
            }
        });
    });
    
    // Fallback distribusi
    if(Object.keys(state.data.distribusi).length === 0) {
        state.data.distribusi = {
            'Pertanian': 11.9, 'Industri': 11.3, 'Konstruksi': 18.8,
            'Perdagangan': 25.5, 'Jasa': 32.5
        };
    }
}

// ===== MOCK DATA =====
function loadMockData() {
    state.years = ['2019','2020','2021','2022','2023','2024','2025','2026'];
    
    state.years.forEach((y, i) => {
        state.data.laju[y] = 4.5 + Math.sin(i)*2 + (Math.random()-0.5)*1.5;
        state.data.adhb[y] = 12000 + i*1800 + Math.random()*1000;
        state.data.adhk[y] = 9000 + i*1200 + Math.random()*800;
    });
    
    state.data.distribusi = {
        'Pertanian': 11.9, 'Industri': 11.3, 'Konstruksi': 18.8,
        'Perdagangan': 25.5, 'Jasa': 32.5
    };
    
    document.getElementById('menuGrafik').disabled = false;
    document.getElementById('filterTahun').disabled = false;
    document.getElementById('btnPng').disabled = false;
    document.getElementById('btnPdf').disabled = false;
    
    populateFilters();
    updateChart();
    state.isLoaded = true;
}

// ===== FILTERS =====
function populateFilters() {
    const menu = document.getElementById('menuGrafik');
    const filter = document.getElementById('filterTahun');
    
    // Populate menu grafik
    menu.innerHTML = `
        <option value="laju">📈 Laju Pertumbuhan (%)</option>
        <option value="nilai">📊 PDRB ADHB & ADHK</option>
        <option value="distribusi">🥧 Distribusi Sektor</option>
    `;
    
    // Populate tahun
    filter.innerHTML = '';
    
    if(menu.value === 'distribusi') {
        [...state.years].reverse().forEach(y => {
            const opt = document.createElement('option');
            opt.value = y; opt.textContent = `Tahun ${y}`;
            filter.add(opt);
        });
    } else {
        const ranges = [
            {t:'5 Tahun Terakhir', v:`${Math.max(2021, parseInt(state.years[0])||2021)}-${state.years[state.years.length-1]}`},
            {t:'2016-2020', v:'2016-2020'},
            {t:'2011-2015', v:'2011-2015'}
        ];
        ranges.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r.v; opt.textContent = r.t;
            filter.add(opt);
        });
    }
    
    if(filter.options.length > 0) filter.value = filter.options[0].value;
}

function handleFilterChange() {
    populateFilters();
    updateChart();
}

function getYearsInRange(range) {
    if(range.includes('-')) {
        const [s,e] = range.split('-').map(Number);
        return Array.from({length:e-s+1}, (_,i)=>String(s+i));
    }
    return [range];
}

// ===== CHART =====
function updateChart() {
    if(!state.isLoaded) return;
    
    const ctx = document.getElementById('mainChart').getContext('2d');
    const menu = document.getElementById('menuGrafik').value;
    const range = document.getElementById('filterTahun').value;
    const labels = getYearsInRange(range);
    
    if(state.chart) state.chart.destroy();
    
    const isDark = document.body.classList.contains('dark');
    const textColor = isDark ? '#eee' : '#333';
    const gridColor = isDark ? '#444' : '#ddd';
    
    const commonOpts = {
        responsive: true, maintainAspectRatio: false,
        plugins: {
            legend: { labels: { color: textColor, padding: 12 } },
            tooltip: {
                backgroundColor: 'rgba(30,30,40,0.95)',
                titleColor: '#fff', bodyColor: '#eee',
                callbacks: {
                    label: (ctx) => {
                        const v = ctx.parsed.y ?? ctx.parsed;
                        if(menu==='laju') return ` ${fmt.pct(v)}`;
                        if(menu==='nilai') return ` ${fmt.rp(v)}`;
                        if(menu==='distribusi') return ` ${fmt.pct(v)}`;
                        return ` ${fmt.id(v)}`;
                    }
                }
            },
            datalabels: {
                anchor: 'end', align: 'top',
                formatter: (v) => {
                    if(!v && v!==0) return '';
                    if(menu==='laju') return fmt.pct(v);
                    if(menu==='nilai') return v>=1000?`${(v/1000).toFixed(1)}T`:v.toFixed(0);
                    if(menu==='distribusi') return `${v.toFixed(1)}%`;
                    return fmt.id(v);
                },
                font: { weight: 'bold', size: 9 }, color: textColor,
                backgroundColor: 'rgba(255,255,255,0.9)', borderRadius: 4, padding: 4
            }
        },
        scales: menu!=='distribusi' ? {
            y: { beginAtZero: true, grid: { color: gridColor }, ticks: { color: textColor } },
            x: { grid: { display: false }, ticks: { color: textColor } }
        }:{}
    };
    
    let config;
    if(menu==='nilai') {
        config = {
            type: 'bar',
            data: {
                labels,
                datasets: [
                    { label: 'ADHB', data: labels.map(y=>state.data.adhb[y]||0), backgroundColor: 'rgba(255,140,0,0.85)', borderColor: '#FF8C00', borderWidth: 2, borderRadius: 4 },
                    { label: 'ADHK', data: labels.map(y=>state.data.adhk[y]||0), backgroundColor: 'rgba(39,174,96,0.85)', borderColor: '#27ae60', borderWidth: 2, borderRadius: 4 }
                ]
            },
            options: commonOpts
        };
    } else if(menu==='laju') {
        config = {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'Laju Pertumbuhan (%)',
                    data: labels.map(y=>state.data.laju[y]||0),
                    borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,0.15)',
                    borderWidth: 3, fill: true, tension: 0.4,
                    pointRadius: 5, pointBackgroundColor: '#27ae60'
                }]
            },
            options: commonOpts
        };
    } else {
        config = {
            type: 'doughnut',
            data: {
                labels: Object.keys(state.data.distribusi),
                datasets: [{
                    data: Object.values(state.data.distribusi),
                    backgroundColor: ['#FF8C00','#27ae60','#3498db','#f1c40f','#9b59b6'],
                    borderColor: isDark?'#1e1e25':'#fff', borderWidth: 3
                }]
            },
            options: {
                ...commonOpts,
                plugins: {
                    ...commonOpts.plugins,
                    datalabels: { ...commonOpts.plugins.datalabels, anchor:'center', align:'center', color:'#fff' }
                },
                cutout: '55%'
            }
        };
        delete config.options.scales;
    }
    
    Chart.register(ChartDataLabels);
    state.chart = new Chart(ctx, config);
    
    const menuText = document.getElementById('menuGrafik').options[document.getElementById('menuGrafik').selectedIndex].text;
    document.getElementById('judulGrafik').textContent = `${menuText.split('(')[0].trim()} • ${range}`;
}

// ===== EXPORT =====
function downloadChart(format) {
    const canvas = document.getElementById('mainChart');
    try {
        if(format==='png') {
            const link = document.createElement('a');
            link.download = `Ekonomi-Palu-${new Date().toISOString().slice(0,10)}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } else {
            window.print();
        }
    } catch(e) {
        fmt.showError('Gagal export: ' + e.message);
    }
}

function toggleDarkMode() {
    document.body.classList.toggle('dark');
    if(state.chart) updateChart();
}

function retryFetch() {
    document.getElementById('btnRetry').style.display = 'none';
    fetchData();
}

// ===== INIT =====
window.addEventListener('DOMContentLoaded', fetchData);
</script>
</body>
</html>
