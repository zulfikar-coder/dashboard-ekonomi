<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD EKONOMI KOTA PALU</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root { 
            --orange: #FF8C00; --green: #27ae60; --bg: #f8f9fa; 
            --text: #333; --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .header { background: var(--orange); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .controls { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; cursor: pointer; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .chart-container { position: relative; height: 450px; width: 100%; }
        #status { font-weight: bold; color: var(--green); }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0;">Dashboard Statistik Ekonomi Kota Palu</h1>
    <p style="margin:5px 0 0 0;">Visualisasi Data Berdasarkan File: Dashboard_Ekonomi_Palu_2011_2026.xlsx</p>
</div>

<div class="controls">
    <div style="display:flex; flex-direction:column; gap:5px;">
        <label style="font-size:12px; color:var(--orange); font-weight:bold;">PILIH INDIKATOR</label>
        <select id="menuGrafik" onchange="sesuaikanFilter()">
            <option value="laju">LAJU PERTUMBUHAN (%)</option>
            <option value="nilai">PDRB ADHB & ADHK (Miliar Rp)</option>
            <option value="distribusi">DISTRIBUSI PDRB (%)</option>
            <option value="sumber">SUMBER PERTUMBUHAN (Poin)</option>
        </select>
    </div>
    <div style="display:flex; flex-direction:column; gap:5px;">
        <label style="font-size:12px; color:var(--orange); font-weight:bold;">PERIODE/TAHUN</label>
        <select id="filterTahun" onchange="updateChart()"></select>
    </div>
    <div style="margin-left:auto; align-self:center;">
        <span id="status">MEMUAT DATA...</span>
    </div>
</div>

<div class="card">
    <h3 id="judulGrafik" style="text-align:center; color:var(--orange); text-transform:uppercase; margin-top:0;">Grafik Ekonomi</h3>
    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    const ctx = document.getElementById('mainChart').getContext('2d');
    let currentChart;
    let database = { laju: {}, adhb: {}, adhk: {}, distribusi: {}, sumber: {} };
    let listTahun = [];

    // URL CSV yang dipublikasikan dari Google Sheets (Export dari file Dashboard_Ekonomi_Palu_2011_2026.xlsx)
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV7Av7slh5mSdhPbe1pp2ttvv2jCc992JE_t1KaVRBzj0m2_NfYRplK6evfXaG1g/pub?output=csv";

    async function fetchData() {
        try {
            const response = await fetch(sheetUrl);
            const csvText = await response.text();
            const rows = csvText.split('\n').map(r => r.split(',').map(c => c.trim()));

            // Mencari baris Header (Tahun) - Berdasarkan file, ada di baris dengan kata "Indikator"
            const headerRow = rows.find(r => r.some(cell => cell.includes("Indikator")));
            if (!headerRow) throw new Error("Format file tidak sesuai");

            // Ambil semua tahun dari header
            listTahun = headerRow.filter(cell => cell.match(/\d{4}/)).map(t => t.replace(/[*]/g, ''));
            const startCol = headerRow.findIndex(cell => cell.match(/\d{4}/));

            const cleanNum = (val) => {
                if (!val || val === "-" || val === "") return 0;
                return parseFloat(val.replace(/[^\d.-]/g, '')) || 0;
            };

            rows.forEach(cols => {
                const label = cols[0] ? cols[0].toUpperCase() : "";
                
                listTahun.forEach((thn, i) => {
                    const value = cleanNum(cols[startCol + i]);
                    
                    if (label.includes("LAJU PERTUMBUHAN")) {
                        database.laju[thn] = value;
                    } else if (label.includes("ADHB")) {
                        database.adhb[thn] = value;
                    } else if (label.includes("ADHK")) {
                        database.adhk[thn] = value;
                    } else if (label.includes("SUMBER PERTUMBUHAN")) {
                        database.sumber[thn] = value;
                    } else if (label.includes("DISTRIBUSI")) {
                        const kat = label.replace("DISTRIBUSI", "").replace("(%)", "").trim();
                        if (!database.distribusi[kat]) database.distribusi[kat] = {};
                        database.distribusi[kat][thn] = value;
                    }
                });
            });

            document.getElementById('status').innerText = "DATABASE AKTIF";
            sesuaikanFilter();
        } catch (error) {
            console.error(error);
            document.getElementById('status').innerText = "GAGAL MEMUAT DATA";
            document.getElementById('status').style.color = "red";
        }
    }

    function sesuaikanFilter() {
        const menu = document.getElementById('menuGrafik').value;
        const filter = document.getElementById('filterTahun');
        filter.innerHTML = "";

        if (menu === 'distribusi') {
            // Untuk Pie Chart, pilih satu tahun saja
            [...listTahun].reverse().forEach(t => {
                filter.add(new Option(t, t));
            });
        } else {
            // Untuk grafik batang/garis, gunakan rentang periode
            const ranges = ["2011-2015", "2016-2020", "2021-2026"];
            ranges.forEach(r => filter.add(new Option(r, r)));
        }
        updateChart();
    }

    function updateChart() {
        const menu = document.getElementById('menuGrafik').value;
        const periode = document.getElementById('filterTahun').value;
        
        if (currentChart) currentChart.destroy();

        let labels = [];
        if (periode.includes("-")) {
            const [start, end] = periode.split("-").map(Number);
            labels = listTahun.filter(t => parseInt(t) >= start && parseInt(t) <= end);
        } else {
            labels = [periode];
        }

        let config = {
            plugins: [ChartDataLabels],
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    datalabels: {
                        anchor: 'end', align: 'top', font: { weight: 'bold' },
                        formatter: (v) => v ? v.toLocaleString('id-ID') : ''
                    }
                }
            }
        };

        if (menu === 'laju') {
            config.type = 'line';
            config.data = {
                labels,
                datasets: [{
                    label: 'LAJU PERTUMBUHAN (%)',
                    data: labels.map(t => database.laju[t]),
                    borderColor: '#27ae60', backgroundColor: 'rgba(39, 174, 96, 0.1)', fill: true, tension: 0.3
                }]
            };
        } else if (menu === 'nilai') {
            config.type = 'bar';
            config.data = {
                labels,
                datasets: [
                    { label: 'ADHB (Miliar Rp)', data: labels.map(t => database.adhb[t]), backgroundColor: '#FF8C00' },
                    { label: 'ADHK (Miliar Rp)', data: labels.map(t => database.adhk[t]), backgroundColor: '#27ae60' }
                ]
            };
        } else if (menu === 'sumber') {
            config.type = 'bar';
            config.data = {
                labels,
                datasets: [{ label: 'SUMBER PERTUMBUHAN (Poin)', data: labels.map(t => database.sumber[t]), backgroundColor: '#3498db' }]
            };
        } else if (menu === 'distribusi') {
            config.type = 'pie';
            const kategori = Object.keys(database.distribusi);
            config.data = {
                labels: kategori,
                datasets: [{
                    data: kategori.map(k => database.distribusi[k][periode]),
                    backgroundColor: ['#FF8C00', '#27ae60', '#3498db', '#f1c40f', '#e74c3c']
                }]
            };
            config.options.plugins.datalabels.formatter = (v) => v ? v + '%' : '';
        }

        currentChart = new Chart(ctx, config);
        document.getElementById('judulGrafik').innerText = 
            document.getElementById('menuGrafik').options[document.getElementById('menuGrafik').selectedIndex].text + " (" + periode + ")";
    }

    fetchData();
</script>
</body>
</html>
